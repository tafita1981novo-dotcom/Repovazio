name: Hub psidanielacoelho — Sincronização Total

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */4 * * *"   # A cada 4h — sync todas plataformas

jobs:
  hub-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests --break-system-packages

      - name: Hub PT-BR — canal principal + live + funil
        env:
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python3 scripts/hub_psidanielacoelho.py || true
        continue-on-error: true

      - name: Sincronizar todas as plataformas
        env:
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 scripts/daniela_iris.py || true
          python3 scripts/viral_content_engine.py || true
          python3 scripts/seo_global_stream.py || true
        continue-on-error: true

      - name: Comentários YouTube PT-BR
        env:
          YT_REFRESH_TOKEN:  ${{ secrets.YT_REFRESH_TOKEN }}
          YT_CLIENT_ID:      ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET:  ${{ secrets.YT_CLIENT_SECRET }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
        run: python3 scripts/youtube_comments_responder.py || true
        continue-on-error: true
