name: 🎭 Playwright Form Filler — Every 3h
on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:
jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - name: Install Python + Playwright
        run: |
          pip install playwright reportlab
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Verify CV
        run: |
          ls -la .github/assets/rafael_cv.pdf
          python3 -c "import os; s=os.path.getsize('.github/assets/rafael_cv.pdf'); print(f'CV: {s:,} bytes'); assert s>1000"

      - name: Run Playwright Form Filler v2
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python3 .github/scripts/playwright_hunter.py
