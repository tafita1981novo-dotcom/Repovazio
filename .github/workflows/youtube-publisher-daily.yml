name: Publicador YouTube — 18h BRT @psidanicoelho

on:
  workflow_dispatch:
  schedule:
    - cron: "0 21 * * *"   # 18h BRT (UTC-3) = 21h UTC

jobs:
  publicar:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests --break-system-packages -q

      - name: Publicar vídeos no @psidanicoelho
        env:
          YT_CLIENT_ID:        ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET:    ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN:    ${{ secrets.YT_REFRESH_TOKEN }}
          YOUTUBE_CHANNEL_ID:  ${{ secrets.YOUTUBE_CHANNEL_ID }}
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python3 scripts/youtube_publisher.py || true
