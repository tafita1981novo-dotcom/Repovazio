name: 🔴 Live Broadcast v2 — 24/7 Neural Stream

on:
  schedule:
    - cron: '0 12 * * *'   # 09:00 BR
    - cron: '0 18 * * *'   # 15:00 BR
    - cron: '0 21 * * *'   # 18:00 BR (pico)
    - cron: '0 0  * * *'   # 21:00 BR (noturno)
  workflow_dispatch:
    inputs:
      duration_hours:
        description: 'Duração em horas (default: 5)'
        default: '5'

jobs:
  live:
    name: 🔴 Live 4500kbps Broadcast
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6h máximo por job GH Actions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: |
          sudo apt-get install -y ffmpeg -q 2>/dev/null || true
          pip install edge-tts --break-system-packages -q

      - name: 🔑 Verificar stream key
        id: check_key
        env:
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          if [ -z "$YOUTUBE_STREAM_KEY" ]; then
            echo "⚠️ YOUTUBE_STREAM_KEY não configurada!"
            echo "👉 Instruções em SETUP.md"
            echo "has_key=false" >> $GITHUB_OUTPUT
          else
            echo "✅ Stream key configurada"
            echo "has_key=true" >> $GITHUB_OUTPUT
          fi

      - name: 🔴 Live stream
        if: steps.check_key.outputs.has_key == 'true'
        env:
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DURATION_HOURS: ${{ inputs.duration_hours || '5' }}
        run: python3 scripts/live_stream_viral_v2.py

      - name: ℹ️ Configurar stream key
        if: steps.check_key.outputs.has_key == 'false'
        run: |
          echo "## 🔑 Stream Key Necessária" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Para ativar a live 24/7:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Acesse **YouTube Studio** → **Ir ao vivo**" >> $GITHUB_STEP_SUMMARY
          echo "2. Vá em **Transmissão ao vivo** → **Gerenciar**" >> $GITHUB_STEP_SUMMARY
          echo "3. Copie a **Chave de stream**" >> $GITHUB_STEP_SUMMARY
          echo "4. Vá em GitHub → **Settings** → **Secrets** → **Actions**" >> $GITHUB_STEP_SUMMARY
          echo "5. Crie o secret: \`YOUTUBE_STREAM_KEY\`" >> $GITHUB_STEP_SUMMARY
