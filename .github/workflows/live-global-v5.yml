name: LIVE 24/7 — Tela Preta + Binaural 432Hz + SEO Global

on:
  workflow_dispatch:
    inputs:
      lang:
        default: 'pt'
        description: 'Idioma do SEO'
      duration_h:
        default: '6'
        description: 'Duração em horas (máx 6 no GH Actions free)'
  schedule:
    - cron: '0 0 * * *'   # 21h BR — máximo audiência noturna
    - cron: '0 6 * * *'   # 03h BR — audiência mundial (EUA tarde, AU manhã)
    - cron: '0 12 * * *'  # 09h BR — EUA/EU acordando (máximo CPM)
    - cron: '0 18 * * *'  # 15h BR — pico BR + EUA trabalho

concurrency:
  group: live-24h-black
  cancel-in-progress: false

jobs:
  live_black:
    runs-on: ubuntu-latest
    timeout-minutes: 410

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Instalar dependências
        run: |
          pip install imageio-ffmpeg Pillow --quiet
          python3 -c "import imageio_ffmpeg, PIL; print('FFmpeg OK:', imageio_ffmpeg.get_ffmpeg_exe())"

      - name: 🔴 LIVE Tela Preta + Binaural 432Hz
        timeout-minutes: 400
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DURATION_H: ${{ inputs.duration_h || '6' }}
          LANG_CODE: ${{ inputs.lang || 'pt' }}
        run: python3 scripts/live_black_v1.py
