name: LIVE 24/7 — Psicologia Doc

on:
  workflow_dispatch:
    inputs:
      lang:
        default: 'pt'
        description: 'Idioma (pt/en/es/de/fr)'
      duration_h:
        default: '6'
        description: 'Duração em horas'
  schedule:
    - cron: '0 0 * * *'   # Slot 0 — 00h UTC = 21h BR
    - cron: '0 6 * * *'   # Slot 1 — 06h UTC = 03h BR
    - cron: '0 12 * * *'  # Slot 2 — 12h UTC = 09h BR
    - cron: '0 18 * * *'  # Slot 3 — 18h UTC = 15h BR

concurrency:
  group: live-24h
  cancel-in-progress: false

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 410

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Instalar dependências
        run: pip install imageio-ffmpeg --quiet && python3 -c "import imageio_ffmpeg; print('FFmpeg OK:', imageio_ffmpeg.get_ffmpeg_exe())"

      - name: Live 24/7 — Transmissão
        timeout-minutes: 400
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DURATION_H: ${{ inputs.duration_h || '6' }}
          LANG_CODE: ${{ inputs.lang || 'pt' }}
        run: python3 scripts/live_loop_v1.py
