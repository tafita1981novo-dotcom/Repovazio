name: Live Global V5 - 24/7 Multilingual PT EN ES DE FR JA KO IT

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

concurrency:
  group: live-global-v5-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Instalar dependencias
        run: pip install edge-tts imageio-ffmpeg Pillow --quiet

      - name: Verificar ffmpeg
        run: python3 -c "import imageio_ffmpeg; print('FFmpeg:', imageio_ffmpeg.get_ffmpeg_exe())"

      - name: Verificar stream key
        env:
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          if [ -z "$YOUTUBE_STREAM_KEY" ]; then
            echo "ERRO: YOUTUBE_STREAM_KEY nao configurada!"
            exit 1
          fi
          echo "Stream key OK: ${YOUTUBE_STREAM_KEY:0:8}***"

      - name: Live Multilingual 6h
        timeout-minutes: 355
        env:
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python3 scripts/live_global_v4.py
