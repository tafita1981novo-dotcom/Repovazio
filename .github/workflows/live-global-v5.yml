name: LIVE 24/7 — Psicologia Doc

on:
  workflow_dispatch:
    inputs:
      lang: {default: 'pt', description: 'Idioma'}
      duration_h: {default: '6', description: 'Horas'}
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 6 * * *'
    - cron: '0 12 * * *'
    - cron: '0 18 * * *'

concurrency:
  group: live-24h
  cancel-in-progress: false

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 410
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install imageio-ffmpeg --quiet && python3 -c "import imageio_ffmpeg; print('OK:', imageio_ffmpeg.get_ffmpeg_exe())"
      - name: Live 24/7
        timeout-minutes: 400
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DURATION_H: ${{ inputs.duration_h || '6' }}
          LANG_CODE: ${{ inputs.lang || 'pt' }}
        run: python3 scripts/live_loop_v3.py
