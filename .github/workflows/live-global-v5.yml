name: LIVE 24/7 — WHITE NOISE + BROWN NOISE | SEO 15 IDIOMAS | @psidanicoelho

on:
  workflow_dispatch:
    inputs:
      duration_h: {default: '6', description: 'Hours'}
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 6 * * *'
    - cron: '0 12 * * *'
    - cron: '0 18 * * *'

concurrency:
  group: live-viral-24h
  cancel-in-progress: true

jobs:
  live_viral:
    runs-on: ubuntu-latest
    timeout-minutes: 410
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}

      - name: Instalar dependências (ffmpeg sistema + imageio fallback)
        run: |
          # Sistema ffmpeg com drawtext + fontes para símbolo ψ
          sudo apt-get install -y ffmpeg fonts-dejavu-core 2>/dev/null || true
          # imageio-ffmpeg como fallback
          pip install imageio-ffmpeg --quiet
          # Verificar
          ffmpeg -version 2>&1 | head -1 || true
          python3 -c "import imageio_ffmpeg; print('imageio-ffmpeg:', imageio_ffmpeg.get_ffmpeg_exe())"
          fc-list | grep -i dejavu | head -3 || true

      - name: "🔴 WHITE+BROWN NOISE | ψ piscando | SEO 15 IDIOMAS | 24/7"
        timeout-minutes: 400
        env:
          YT_CLIENT_ID:      ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET:  ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN:  ${{ secrets.YT_REFRESH_TOKEN }}
          DURATION_H:        ${{ inputs.duration_h || '6' }}
        run: python3 scripts/full_reset.py
        continue-on-error: false
