name: "YouTube Live PT-BR — Psicologia 24h @psidanicoelho"

on:
  workflow_dispatch:
    inputs:
      horas:
        description: "Duracao horas (max 6)"
        default: "6"
  schedule:
    - cron: "0 0,6,12,18 * * *"

concurrency:
  group: live-viral-24h
  cancel-in-progress: false

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 370
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: |
          pip install imageio-ffmpeg Pillow requests --break-system-packages -q
          python3 -c "import imageio_ffmpeg; print('FFmpeg OK:', imageio_ffmpeg.get_ffmpeg_exe())"
      - name: Live PT 24h
        env:
          LANG_CODE:          PT
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          YT_CLIENT_ID:       ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET:   ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN:   ${{ secrets.YT_REFRESH_TOKEN }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
        run: |
          H="${{ inputs.horas || '6' }}"
          timeout $((H * 3600)) python3 scripts/live_v6.py || true
        continue-on-error: true
