name: oracle-vm-micro
on:
  workflow_dispatch:
  schedule:
    - cron: '30 */6 * * *'

jobs:
  create-micro:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Setup OCI
        env:
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
        run: |
          pip3 install oci-cli -q
          mkdir -p ~/.oci ~/.ssh
          printf '%s' "$OCI_PRIVATE_KEY" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          cat > ~/.oci/config << OCIEOF
          [DEFAULT]
          user=$OCI_USER_OCID
          fingerprint=$OCI_FINGERPRINT
          tenancy=$OCI_TENANCY_OCID
          region=$OCI_REGION
          key_file=$HOME/.oci/oci_api_key.pem
          OCIEOF
          chmod 600 ~/.oci/config
          ssh-keygen -t rsa -b 2048 -f ~/.ssh/oracle_stream -N '' -q
          echo "OCI_TENANCY: $OCI_TENANCY_OCID"
          echo 'OCI OK'

      - name: Conectar VMs e iniciar stream
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          SUPABASE_URL: https://tpjvalzwkqwttvmszvie.supabase.co
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
        run: |
          set +e

          notify_whatsapp() {
            MSG="$1"
            ENC=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$MSG" 2>/dev/null)
            [ "$CALLMEBOT_APIKEY" != "PENDING_ACTIVATION" ] &&               curl -s "https://api.callmebot.com/whatsapp.php?phone=${CALLMEBOT_PHONE}&text=${ENC}&apikey=${CALLMEBOT_APIKEY}" -o /dev/null
          }

          echo "=== Listando instancias (JSON bruto) ==="
          oci compute instance list             --compartment-id "$OCI_TENANCY_OCID"             --all 2>/dev/null | python3 -c "
import sys, json
data = json.load(sys.stdin)
instances = data.get('data', [])
print(f'Total instancias: {len(instances)}')
for inst in instances:
    print(f'  ID={inst["id"]}')
    print(f'  Name={inst["display-name"]}')
    print(f'  Shape={inst["shape"]}')
    print(f'  State={inst["lifecycle-state"]}')
    print()
" 2>/dev/null || echo "Falha ao listar instancias"

          echo "=== Buscando IPs via VNIC ==="
          # Listar todas as VNICs diretamente — independe de compartimento
          oci network vnic-attachment list             --compartment-id "$OCI_TENANCY_OCID"             --all 2>/dev/null | python3 -c "
import sys, json
data = json.load(sys.stdin)
vnics = data.get('data', [])
print(f'VNICs encontradas: {len(vnics)}')
for v in vnics:
    print(f'  InstanceID={v.get("instance-id","?")} VnicID={v.get("vnic-id","?")} State={v.get("lifecycle-state","?")}')
" 2>/dev/null || echo "Falha ao listar VNICs"

          echo "=== Buscando IPs publicos ==="
          oci network public-ip list             --compartment-id "$OCI_TENANCY_OCID"             --scope REGION             --all 2>/dev/null | python3 -c "
import sys, json
data = json.load(sys.stdin)
ips = data.get('data', [])
print(f'IPs publicos encontrados: {len(ips)}')
for ip in ips:
    print(f'  IP={ip.get("ip-address","?")} AssignedTo={ip.get("assigned-entity-id","?")} State={ip.get("lifecycle-state","?")}')
" 2>/dev/null || echo "Falha ao listar IPs publicos"
