name: oracle-vm-micro
on:
  workflow_dispatch:
  schedule:
    - cron: '30 */6 * * *'

jobs:
  create-micro:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Setup OCI
        env:
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
        run: |
          pip3 install oci-cli -q
          mkdir -p ~/.oci ~/.ssh
          printf '%s' "$OCI_PRIVATE_KEY" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          cat > ~/.oci/config << OCIEOF
          [DEFAULT]
          user=$OCI_USER_OCID
          fingerprint=$OCI_FINGERPRINT
          tenancy=$OCI_TENANCY_OCID
          region=$OCI_REGION
          key_file=$HOME/.oci/oci_api_key.pem
          OCIEOF
          chmod 600 ~/.oci/config
          ssh-keygen -t rsa -b 2048 -f ~/.ssh/oracle_stream -N '' -q
          oci iam availability-domain list --compartment-id "$OCI_TENANCY_OCID" \
            --query 'data[*].name' --raw-output && echo 'OCI OK'

      - name: Inventariar e conectar VM existente
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          SUPABASE_URL: https://tpjvalzwkqwttvmszvie.supabase.co
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
        run: |
          set +e

          notify_whatsapp() {
            MSG="$1"
            ENC=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$MSG" 2>/dev/null || echo "$MSG")
            [ "$CALLMEBOT_APIKEY" != "PENDING_ACTIVATION" ] && \
              curl -s "https://api.callmebot.com/whatsapp.php?phone=${CALLMEBOT_PHONE}&text=${ENC}&apikey=${CALLMEBOT_APIKEY}" -o /dev/null
          }

          echo "=== Listando TODAS as instĂ˘ncias na conta ==="
          oci compute instance list \
            --compartment-id "$OCI_TENANCY_OCID" \
            --lifecycle-state RUNNING \
            --query 'data[*].{id:id,name:"display-name",shape:shape,state:"lifecycle-state"}' \
            --output table 2>/dev/null || \
          oci compute instance list \
            --compartment-id "$OCI_TENANCY_OCID" \
            --query 'data[*].{id:id,name:"display-name",shape:shape,state:"lifecycle-state"}' \
            --output table

          echo ""
          echo "=== Todas (incluindo stopped/terminated) ==="
          oci compute instance list \
            --compartment-id "$OCI_TENANCY_OCID" \
            --query 'data[*].{id:id,name:"display-name",shape:shape,state:"lifecycle-state"}' \
            --output table

          echo ""
          echo "=== IPs pĂşblicos de todas as instĂ˘ncias ==="
          for ID in $(oci compute instance list \
            --compartment-id "$OCI_TENANCY_OCID" \
            --query 'data[*].id' -o json 2>/dev/null | python3 -c "import sys,json; [print(x) for x in json.load(sys.stdin)]" 2>/dev/null); do
            NAME=$(oci compute instance get --instance-id "$ID" \
              --query 'data."display-name"' --raw-output 2>/dev/null)
            SHAPE=$(oci compute instance get --instance-id "$ID" \
              --query 'data.shape' --raw-output 2>/dev/null)
            STATE=$(oci compute instance get --instance-id "$ID" \
              --query 'data."lifecycle-state"' --raw-output 2>/dev/null)
            IP=$(oci compute instance list-vnics --instance-id "$ID" \
              --query 'data[0]."public-ip"' --raw-output 2>/dev/null)
            echo "  $NAME | $SHAPE | $STATE | IP=$IP | ID=$ID"
          done
