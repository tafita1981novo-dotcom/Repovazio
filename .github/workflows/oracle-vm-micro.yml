name: oracle-vm-micro
on:
  workflow_dispatch:
  schedule:
    - cron: '30 */6 * * *'

jobs:
  create-micro:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Setup OCI
        env:
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
        run: |
          pip3 install oci-cli -q
          mkdir -p ~/.oci ~/.ssh
          printf '%s' "$OCI_PRIVATE_KEY" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          cat > ~/.oci/config << OCIEOF
          [DEFAULT]
          user=$OCI_USER_OCID
          fingerprint=$OCI_FINGERPRINT
          tenancy=$OCI_TENANCY_OCID
          region=$OCI_REGION
          key_file=$HOME/.oci/oci_api_key.pem
          OCIEOF
          chmod 600 ~/.oci/config
          ssh-keygen -t rsa -b 2048 -f ~/.ssh/oracle_stream -N '' -q
          echo 'OCI OK'

      - name: Pegar IP e configurar VMs existentes
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          SUPABASE_URL: https://tpjvalzwkqwttvmszvie.supabase.co
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
        run: |
          set +e

          notify_whatsapp() {
            MSG="$1"
            ENC=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$MSG" 2>/dev/null)
            [ "$CALLMEBOT_APIKEY" != "PENDING_ACTIVATION" ] &&               curl -s "https://api.callmebot.com/whatsapp.php?phone=${CALLMEBOT_PHONE}&text=${ENC}&apikey=${CALLMEBOT_APIKEY}" -o /dev/null
          }

          VM_IDS=("ocid1.instance.oc1.***.antxeljrpwfc5uyc2lae2goubu5vc25kgqh7r47pfoi7u2ft3r2yogjanauq" "ocid1.instance.oc1.***.antxeljrpwfc5uyc2y5xbzy4i3672pigdhjv3l6m6lbwb4sfe7yx4kuc4tqq")

          for ID in "${VM_IDS[@]}"; do
            echo "=== Processando VM: $ID ==="
            STATE=$(oci compute instance get --instance-id "$ID"               --query 'data."lifecycle-state"' --raw-output 2>/dev/null)
            NAME=$(oci compute instance get --instance-id "$ID"               --query 'data."display-name"' --raw-output 2>/dev/null)
            echo "Nome: $NAME | Estado: $STATE"

            IP=$(oci compute instance list-vnics --instance-id "$ID"               --query 'data[0]."public-ip"' --raw-output 2>/dev/null)
            echo "IP publico: $IP"

            if [ -n "$IP" ] && [ "$IP" != "null" ]; then
              echo "Salvando IP $IP no Supabase..."
              curl -s -X POST "${SUPABASE_URL}/rest/v1/ia_cache"                 -H "apikey: ${SUPABASE_ANON_KEY}"                 -H "Authorization: Bearer ${SUPABASE_ANON_KEY}"                 -H "Content-Type: application/json"                 -H "Prefer: resolution=merge-duplicates"                 -d "{\"cache_key\":\"oracle_vm_ip\",\"value\":\"${IP}\",\"expires_at\":null}" && echo "IP salvo"

              echo "Tentando SSH na VM $IP..."
              ssh -o StrictHostKeyChecking=accept-new                   -o ConnectTimeout=20                   -i ~/.ssh/oracle_stream ubuntu@$IP                   "echo SSH_OK && uname -a && df -h / && ps aux | grep ffmpeg | head -3" && SSH_OK=1 || SSH_OK=0

              if [ "$SSH_OK" -eq 1 ]; then
                echo "SSH funcionou! Verificando se stream esta rodando..."
                STREAM_PID=$(ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20                   -i ~/.ssh/oracle_stream ubuntu@$IP                   "pgrep -f ffmpeg || echo NENHUM" 2>/dev/null)
                echo "FFmpeg PID: $STREAM_PID"

                if [ "$STREAM_PID" = "NENHUM" ] || [ -z "$STREAM_PID" ]; then
                  echo "Stream nao ativo — instalando e iniciando..."
                  ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30                       -i ~/.ssh/oracle_stream ubuntu@$IP                       "sudo apt-get update -q &&                        sudo apt-get install -y ffmpeg wget python3-pip -q &&                        wget -qO /tmp/s.sh https://raw.githubusercontent.com/tafita81/Repovazio/main/scripts/oracle-forever-live-setup.sh &&                        chmod +x /tmp/s.sh &&                        STREAM_KEY='$YOUTUBE_STREAM_KEY' bash /tmp/s.sh &&                        echo STREAM_INICIADO" &&                   notify_whatsapp "Stream ATIVO na VM Oracle! IP: ${IP} | psidoc 24/7 no ar!" ||                   echo "Setup falhou — IP=$IP acessivel via SSH"
                else
                  echo "Stream JA RODANDO! PID=$STREAM_PID"
                  notify_whatsapp "VM Oracle ativa! IP: ${IP} | Stream ffmpeg PID=$STREAM_PID"
                fi
              else
                echo "SSH falhou em $IP — VM pode estar com chave diferente"
                notify_whatsapp "VM Oracle encontrada IP=${IP} mas SSH falhou. Acesse o console Oracle."
              fi
            else
              echo "VM $ID sem IP publico"
            fi
            echo ""
          done
