name: Fix BSN PINK RAIN Videos

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      YT_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID_NEW }}
      YT_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET_NEW }}
      YT_RT_BSN: ${{ secrets.YOUTUBE_RT_BSN }}
      YT_RT_PINK: ${{ secrets.YOUTUBE_RT_PINK }}
      YT_RT_RAIN: ${{ secrets.YOUTUBE_RT_RAIN }}
    steps:
      - uses: actions/checkout@v4
      - name: Fix BSN PINK RAIN metadata
        run: pip install requests -q && python3 scripts/fix_bsn_pink_rain.py
