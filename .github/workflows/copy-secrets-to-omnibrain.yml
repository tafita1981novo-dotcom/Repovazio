name: 🔑 Copy OAuth to omnibrain-knowledge
on:
  workflow_dispatch:

jobs:
  copy-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Copy YT OAuth secrets to omnibrain-knowledge
        env:
          YT_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID_NEW }}
          YT_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET_NEW }}
          YT_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN_NEW }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          pip install PyNaCl requests --quiet

          python3 << 'INNEREOF'
          import base64, requests, json
          from nacl import encoding, public
          import os

          TOKEN   = os.environ["GH_TOKEN"]
          HEADERS = {"Authorization": f"token {TOKEN}", "Accept": "application/vnd.github.v3+json"}
          REPO    = "tafita1981novo-dotcom/omnibrain-knowledge"

          r = requests.get(f"https://api.github.com/repos/{REPO}/actions/secrets/public-key", headers=HEADERS)
          pk_data = r.json()
          key_id  = pk_data["key_id"]
          pub_key = pk_data["key"]

          def encrypt(pub_key_b64, value):
              pk = public.PublicKey(pub_key_b64.encode(), encoding.Base64Encoder())
              box = public.SealedBox(pk)
              return base64.b64encode(box.encrypt(value.encode())).decode()

          def set_secret(name, value):
              if not value:
                  print(f"  {name}: SKIP (empty)")
                  return
              enc = encrypt(pub_key, value)
              r = requests.put(
                  f"https://api.github.com/repos/{REPO}/actions/secrets/{name}",
                  headers=HEADERS,
                  json={"encrypted_value": enc, "key_id": key_id}
              )
              print(f"  {name}: {r.status_code} {'OK' if r.status_code in (201,204) else 'ERR'}")

          set_secret("YT_CLIENT_ID",     os.environ.get("YT_CLIENT_ID", ""))
          set_secret("YT_CLIENT_SECRET", os.environ.get("YT_CLIENT_SECRET", ""))
          set_secret("YT_REFRESH_TOKEN", os.environ.get("YT_REFRESH_TOKEN", ""))
          print("Done!")
          INNEREOF
