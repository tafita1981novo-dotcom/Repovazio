name: Diag Fix BSN PINK

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      YT_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID_NEW }}
      YT_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET_NEW }}
      YT_RT_BSN: ${{ secrets.YOUTUBE_RT_BSN }}
      YT_RT_PINK: ${{ secrets.YOUTUBE_RT_PINK }}
    steps:
      - uses: actions/checkout@v4
      - run: pip install requests -q && python3 scripts/diag_bsn_pink.py
