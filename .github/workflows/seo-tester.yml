name: 🧪 Tester SEO Global

on:
  workflow_dispatch:
  schedule:
    - cron: '30 * * * *'   # A cada hora, 30 min após

jobs:
  test_seo:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Testar Motor SEO Global
        run: python3 scripts/seo_tester.py
