name: Distribute Videos (YouTube + IG + TikTok + Pinterest)
on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'  # a cada 30 min, varre mp4_ready

permissions:
  contents: read

jobs:
  distribute:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Run distributor
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          YT_CLIENT_ID:     ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          IG_USER_ID:       ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN:  ${{ secrets.IG_ACCESS_TOKEN }}
          TT_CLIENT_KEY:    ${{ secrets.TT_CLIENT_KEY }}
          TT_ACCESS_TOKEN:  ${{ secrets.TT_ACCESS_TOKEN }}
          PIN_ACCESS_TOKEN: ${{ secrets.PIN_ACCESS_TOKEN }}
          PIN_BOARD_ID:     ${{ secrets.PIN_BOARD_ID }}
        run: python3 scripts/distribute.py
