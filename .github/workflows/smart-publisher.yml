name: 📺 Smart Publisher — Publica em Horários de Pico BR

on:
  schedule:
    - cron: '0 12 * * *'   # 09:00 BR
    - cron: '0 15 * * *'   # 12:00 BR
    - cron: '0 19 * * *'   # 16:00 BR
    - cron: '0 21 * * *'   # 18:00 BR (pico máximo)
    - cron: '0 23 * * *'   # 20:00 BR (noturno)
    - cron: '30 0  * * *'  # 21:30 BR
  workflow_dispatch:
    inputs:
      max_videos:
        description: 'Máximo de vídeos (default: 2)'
        default: '2'

jobs:
  publish:
    name: 📺 Publicar Vídeos
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}

      - name: 📺 Publicar vídeos
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          MAX_PER_RUN: ${{ inputs.max_videos || '2' }}
        run: python3 scripts/series_publisher.py

      - name: 📊 Relatório
        if: always()
        run: |
          echo "## 📺 Publicação @psidanicoelho" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Canal | @psidanicoelho |" >> $GITHUB_STEP_SUMMARY
          echo "| Ordem | pub_order ASC |" >> $GITHUB_STEP_SUMMARY
          echo "| Quota | 1600 units/vídeo |" >> $GITHUB_STEP_SUMMARY
          echo "| Playlists | Auto por series_slug |" >> $GITHUB_STEP_SUMMARY
