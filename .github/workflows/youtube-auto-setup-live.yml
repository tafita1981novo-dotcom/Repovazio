name: YouTube — Auto Setup Live Completo

on:
  workflow_dispatch:
    inputs:
      auth_code:
        description: "Código OAuth do YouTube (da URL de autorização)"
        required: false
        default: ""
      horas:
        description: "Horas de live (default 6)"
        default: "6"

jobs:
  setup-and-live:
    runs-on: ubuntu-latest
    timeout-minutes: 380

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: |
          sudo apt-get install -y ffmpeg > /dev/null 2>&1
          pip install requests PyNaCl --break-system-packages

      - name: Setup completo — obter stream key e iniciar live
        env:
          YT_CLIENT_ID:        ${{ secrets.YOUTUBE_CLIENT_ID }}
          YT_CLIENT_SECRET:    ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YT_REFRESH_TOKEN:    ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          AUTH_CODE:           ${{ inputs.auth_code }}
          GH_PAT:              ${{ secrets.GH_TOKEN || github.token }}
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          HORAS:               ${{ inputs.horas }}
          GITHUB_REPOSITORY:   ${{ github.repository }}
        run: python3 scripts/auto_setup_live.py
        continue-on-error: true
