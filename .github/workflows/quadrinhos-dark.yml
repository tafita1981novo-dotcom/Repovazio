name: Quadrinhos Dark — 3 posts/dia

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9  * * *"   # 9h BRT (viralizar)
    - cron: "0 12 * * *"   # 12h BRT (vender)  ← horários do transcript
    - cron: "0 18 * * *"   # 18h BRT (coringa)

jobs:
  gerar-carrossei:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests --break-system-packages
      - name: "Gerar carrossel dark do horário"
        env:
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python3 scripts/quadrinhos_dark.py || true
        continue-on-error: true
