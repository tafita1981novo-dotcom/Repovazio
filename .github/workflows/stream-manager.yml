name: Stream Manager — Títulos + SEO automático

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"   # A cada 3h — atualiza título da live

jobs:
  stream-manager:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests --break-system-packages

      - name: Configurar canais + atualizar títulos
        env:
          YOUTUBE_STREAM_KEY:    ${{ secrets.YOUTUBE_STREAM_KEY }}
          YOUTUBE_STREAM_KEY_EN: ${{ secrets.YOUTUBE_STREAM_KEY_EN }}
          YOUTUBE_STREAM_KEY_ES: ${{ secrets.YOUTUBE_STREAM_KEY_ES }}
          YOUTUBE_STREAM_KEY_DE: ${{ secrets.YOUTUBE_STREAM_KEY_DE }}
          YOUTUBE_STREAM_KEY_JP: ${{ secrets.YOUTUBE_STREAM_KEY_JP }}
          YOUTUBE_STREAM_KEY_FR: ${{ secrets.YOUTUBE_STREAM_KEY_FR }}
          YT_REFRESH_TOKEN:      ${{ secrets.YT_REFRESH_TOKEN }}
          YT_CLIENT_ID:          ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET:      ${{ secrets.YT_CLIENT_SECRET }}
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:  ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 scripts/canais_config.py || true
          python3 scripts/seo_global_stream.py || true
        continue-on-error: true
