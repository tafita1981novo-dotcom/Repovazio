name: Detector Auto-Live — Monitora stream key

on:
  schedule:
    # Verifica a cada hora se o stream key foi adicionado
    - cron: "5 * * * *"
  workflow_dispatch:

jobs:
  detectar:
    runs-on: ubuntu-latest
    timeout-minutes: 375
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - name: Instalar deps
        run: |
          sudo apt-get install -y ffmpeg > /dev/null 2>&1
          pip install requests --break-system-packages

      - name: Verificar e iniciar live se key disponível
        env:
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          CANAL_IDIOMA:       "PT"
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          HORAS:              "6"
        run: |
          if [ -z "$YOUTUBE_STREAM_KEY" ]; then
            echo "Stream key ainda não configurada. Aguardando..."
            echo "Adicionar em: GitHub > Settings > Secrets > YOUTUBE_STREAM_KEY"
            exit 0
          fi
          echo "✅ Stream key detectada! Iniciando live 24/7..."
          HORAS="${HORAS:-6}"
          timeout $((HORAS * 3600)) python3 scripts/live_global_master.py || true
        continue-on-error: true
