name: Gen Upload 5 Canais Noise

on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/noise_upload.py'

jobs:
  dbn:
    runs-on: ubuntu-latest
    timeout-minutes: 480
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y ffmpeg
      - run: pip install requests -q
      - name: Generate DBN
        run: |
          ffmpeg -y \
            -f lavfi -i "color=color=black:size=1920x1080:rate=1:duration=36000" \
            -f lavfi -i "anoisesrc=color=brown:amplitude=0.5:sample_rate=48000:duration=36000" \
            -c:v libx264 -preset ultrafast -crf 40 -pix_fmt yuv420p -r 1 \
            -c:a aac -b:a 192k -ar 48000 -ac 2 \
            -af "loudnorm=I=-14:TP=-1:LRA=11" \
            -t 36000 -movflags +faststart /tmp/dbn.mp4
          ls -lh /tmp/dbn.mp4
      - name: Upload DBN
        env:
          CLIENT_ID: ${{ secrets.YT_CLIENT_ID_2 }}
          CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET_2 }}
          REFRESH_TOKEN: ${{ secrets.YOUTUBE_RT_DBN }}
          CANAL: dbn
          CHANNEL_ID: UCD4LLFnsiVzA-DeSN6oaUzg
          TITULO: "Brown Noise 12 Hours | Deep Sleep ADHD Focus Study | Black Screen"
          TAGS: "brown noise,deep sleep,ADHD focus,sleep sounds,black screen,12 hours,ADHD,concentration"
          SUPABASE_URL: https://tpjvalzwkqwttvmszvie.supabase.co
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/noise_upload.py

  adhd:
    runs-on: ubuntu-latest
    timeout-minutes: 480
    needs: dbn
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y ffmpeg
      - run: pip install requests -q
      - name: Generate ADHD
        run: |
          ffmpeg -y \
            -f lavfi -i "color=color=black:size=1920x1080:rate=1:duration=36000" \
            -f lavfi -i "anoisesrc=color=brown:amplitude=0.5:sample_rate=48000:duration=36000" \
            -c:v libx264 -preset ultrafast -crf 40 -pix_fmt yuv420p -r 1 \
            -c:a aac -b:a 192k -ar 48000 -ac 2 \
            -af "loudnorm=I=-14:TP=-1:LRA=11" \
            -t 36000 -movflags +faststart /tmp/adhd.mp4
          ls -lh /tmp/adhd.mp4
      - name: Upload ADHD
        env:
          CLIENT_ID: ${{ secrets.YT_CLIENT_ID_2 }}
          CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET_2 }}
          REFRESH_TOKEN: ${{ secrets.YOUTUBE_RT_ADHD }}
          CANAL: adhd
          CHANNEL_ID: UCK3xZDFY84ffNrLEAI1Qmyw
          TITULO: "ADHD Focus Noise 12 Hours | Brown Noise Concentration Deep Work | Black Screen"
          TAGS: "ADHD focus,ADHD,brown noise ADHD,concentration,deep work,focus music,12 hours,black screen"
          SUPABASE_URL: https://tpjvalzwkqwttvmszvie.supabase.co
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/noise_upload.py

  bsn:
    runs-on: ubuntu-latest
    timeout-minutes: 480
    needs: adhd
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y ffmpeg
      - run: pip install requests -q
      - name: Generate BSN
        run: |
          ffmpeg -y \
            -f lavfi -i "color=color=black:size=1920x1080:rate=1:duration=36000" \
            -f lavfi -i "anoisesrc=color=white:amplitude=0.5:sample_rate=48000:duration=36000" \
            -c:v libx264 -preset ultrafast -crf 40 -pix_fmt yuv420p -r 1 \
            -c:a aac -b:a 192k -ar 48000 -ac 2 \
            -af "loudnorm=I=-14:TP=-1:LRA=11" \
            -t 36000 -movflags +faststart /tmp/bsn.mp4
          ls -lh /tmp/bsn.mp4
      - name: Upload BSN
        env:
          CLIENT_ID: ${{ secrets.YT_CLIENT_ID_2 }}
          CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET_2 }}
          REFRESH_TOKEN: ${{ secrets.YOUTUBE_RT_BSN }}
          CANAL: bsn
          CHANNEL_ID: UCy4d2yt8eRywJS7PMTDX3xA
          TITULO: "Baby Sleep White Noise 12 Hours | Womb Sounds Newborn Infant | Black Screen"
          TAGS: "baby sleep,white noise baby,newborn,womb sounds,colic baby,baby calm,12 hours,black screen"
          SUPABASE_URL: https://tpjvalzwkqwttvmszvie.supabase.co
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/noise_upload.py

  pink:
