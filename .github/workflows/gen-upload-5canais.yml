      - name: Generate RAIN
        run: |
          ffmpeg -y \
            -f lavfi -i "color=color=black:size=1920x1080:rate=1:duration=36000" \
            -f lavfi -i "anoisesrc=color=brown:amplitude=0.45:sample_rate=48000:duration=36000" \
            -c:a aac -b:a 192k -ar 48000 -ac 2 \
            -af "aecho=0.8:0.88:60|300:0.4|0.3,loudnorm=I=-14:TP=-1:LRA=11" \
            -c:v libx264 -preset ultrafast -crf 40 -pix_fmt yuv420p -r 1 \
