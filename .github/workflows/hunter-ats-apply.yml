name: 🤖 Job Hunter — ATS Apply (Every 2h)
on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:
jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - run: pip install -q reportlab
      - name: ATS Auto-Apply (Greenhouse + Lever + SmartRecruiters)
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python3 .github/scripts/production_hunter.py apply
