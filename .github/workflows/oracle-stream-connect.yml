name: oracle-stream-connect
on:
  workflow_dispatch:
  schedule:
    - cron: '30 */6 * * *'

jobs:
  connect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Setup OCI
        env:
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: 'True'
        run: |
          pip3 install oci-cli -q
          mkdir -p ~/.oci ~/.ssh
          printf '%s' "$OCI_PRIVATE_KEY" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          printf '[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=%s\nkey_file=%s\n' "$OCI_USER_OCID" "$OCI_FINGERPRINT" "$OCI_TENANCY_OCID" "$OCI_REGION" "$HOME/.oci/oci_api_key.pem" > ~/.oci/config
          chmod 600 ~/.oci/config
          ssh-keygen -t rsa -b 2048 -f ~/.ssh/oracle_stream -N '' -q
          PUB=$(cat ~/.ssh/oracle_stream.pub)
          echo "Chave publica gerada: ${PUB:0:50}..."
          oci iam availability-domain list --compartment-id "$OCI_TENANCY_OCID" --query 'data[*].name' --raw-output && echo OCI_OK

      - name: Atualizar SSH key e conectar
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: 'True'
        run: |
          set +e
          SUPA=https://tpjvalzwkqwttvmszvie.supabase.co
          PUB_KEY=$(cat ~/.ssh/oracle_stream.pub)

          INST_IDS=$(oci compute instance list --compartment-id "$OCI_TENANCY_OCID" --lifecycle-state RUNNING 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); [print(i['id']) for i in d.get('data',[])]" 2>/dev/null)
          echo "Instancias RUNNING: $INST_IDS"

          for INST_ID in $INST_IDS; do
            echo "--- Atualizando chave SSH na instancia $INST_ID ---"
            oci compute instance update --instance-id "$INST_ID" \
              --metadata "{\"ssh_authorized_keys\":\"$PUB_KEY\"}" \
              --force 2>/dev/null && echo "Chave atualizada" || echo "Update metadata falhou"

            IP=$(oci compute instance list-vnics --instance-id "$INST_ID" --query 'data[0]."public-ip"' --raw-output 2>/dev/null)
            echo "IP: $IP"

            if [ -n "$IP" ] && [ "$IP" != 'null' ]; then
              echo "Aguardando 30s para chave ser aplicada..."
              sleep 30
              echo "Testando SSH em $IP..."
              for attempt in 1 2 3; do
                R=$(ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15 -o BatchMode=yes -i ~/.ssh/oracle_stream ubuntu@$IP 'echo SSH_OK && uname -r' 2>&1)
                echo "Tentativa $attempt: ${R:0:80}"
                if echo "$R" | grep -q SSH_OK; then
                  echo "ACESSO OK em $IP!"
                  curl -s -X POST "$SUPA/rest/v1/ia_cache" -H "apikey: $SUPABASE_ANON_KEY" -H "Authorization: Bearer $SUPABASE_ANON_KEY" -H 'Content-Type: application/json' -H 'Prefer: resolution=merge-duplicates' -d "{\"cache_key\":\"oracle_vm_ip\",\"value\":\"$IP\",\"expires_at\":null}" && echo IP_SALVO
                  FP=$(ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10 -o BatchMode=yes -i ~/.ssh/oracle_stream ubuntu@$IP 'pgrep -f ffmpeg | head -1' 2>/dev/null)
                  if [ -n "$FP" ]; then
                    echo "Stream JA ATIVO pid=$FP"
                  else
                    echo "Instalando e iniciando stream..."
                    ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=90 -o BatchMode=yes -i ~/.ssh/oracle_stream ubuntu@$IP "sudo apt-get update -q && sudo apt-get install -y ffmpeg wget -q && wget -qO /tmp/s.sh https://raw.githubusercontent.com/tafita81/Repovazio/main/scripts/oracle-forever-live-setup.sh && chmod +x /tmp/s.sh && STREAM_KEY=$YOUTUBE_STREAM_KEY bash /tmp/s.sh && echo STREAM_OK"
                  fi
                  ENC=$(python3 -c "import urllib.parse; print(urllib.parse.quote('Oracle VM $IP stream psidoc 24h ativo!'))" 2>/dev/null)
                  [ "$CALLMEBOT_APIKEY" != 'PENDING_ACTIVATION' ] && curl -s "https://api.callmebot.com/whatsapp.php?phone=${CALLMEBOT_PHONE}&text=${ENC}&apikey=${CALLMEBOT_APIKEY}" -o /dev/null
                  break
                fi
                sleep 15
              done
            fi
          done
          echo === Fim ===
