name: oracle-stream-connect
on:
  workflow_dispatch:
  schedule:
    - cron: '30 */6 * * *'

jobs:
  connect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Setup OCI
        env:
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: 'True'
        run: |
          pip3 install oci-cli -q
          mkdir -p ~/.oci ~/.ssh
          printf '%s' "$OCI_PRIVATE_KEY" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          printf '[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=%s\nkey_file=%s\n' "$OCI_USER_OCID" "$OCI_FINGERPRINT" "$OCI_TENANCY_OCID" "$OCI_REGION" "$HOME/.oci/oci_api_key.pem" > ~/.oci/config
          chmod 600 ~/.oci/config
          ssh-keygen -t rsa -b 2048 -f ~/.ssh/oracle_stream -N '' -q
          PUB=$(cat ~/.ssh/oracle_stream.pub)
          echo "SSH pub key: $PUB"
          oci iam availability-domain list --compartment-id "$OCI_TENANCY_OCID" --query 'data[*].name' --raw-output && echo OCI_OK

      - name: Criar Console Connection e injetar chave
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: 'True'
        run: |
          set +e
          SUPA=https://tpjvalzwkqwttvmszvie.supabase.co
          PUB_KEY=$(cat ~/.ssh/oracle_stream.pub)

          INST_IDS=$(oci compute instance list --compartment-id "$OCI_TENANCY_OCID" --lifecycle-state RUNNING 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); [print(i['id']) for i in d.get('data',[])]" 2>/dev/null)
          echo "VMs RUNNING: $(echo $INST_IDS | wc -w)"

          for INST_ID in $INST_IDS; do
            echo "--- VM $INST_ID ---"
            IP=$(oci compute instance list-vnics --instance-id "$INST_ID" --query 'data[0]."public-ip"' --raw-output 2>/dev/null)
            echo "IP: $IP"

            echo "Criando Instance Console Connection..."
            CONN=$(oci compute instance-console-connection create \
              --instance-id "$INST_ID" \
              --ssh-public-key-file ~/.ssh/oracle_stream.pub \
              --query 'data.id' --raw-output 2>&1)
            echo "Console connection: $CONN"

            if echo "$CONN" | grep -q 'ocid1'; then
              echo "Console connection criada! ID: $CONN"
              CONN_STR=$(oci compute instance-console-connection get \
                --instance-console-connection-id "$CONN" \
                --query 'data."connection-string"' --raw-output 2>/dev/null)
              echo "Connection string disponivel: $(echo $CONN_STR | cut -c1-80)"
              oci compute instance-console-connection delete \
                --instance-console-connection-id "$CONN" --force 2>/dev/null
            fi

            echo "Tentando update SSH key via instance update..."
            oci compute instance update \
              --instance-id "$INST_ID" \
              --ssh-authorized-keys-file ~/.ssh/oracle_stream.pub \
              --force 2>&1 | head -5

            echo "Salvando IPs e info no Supabase independente do SSH..."
            curl -s -X POST "$SUPA/rest/v1/ia_cache" -H "apikey: $SUPABASE_ANON_KEY" -H "Authorization: Bearer $SUPABASE_ANON_KEY" -H 'Content-Type: application/json' -H 'Prefer: resolution=merge-duplicates' -d "{\"cache_key\":\"oracle_vm_ip\",\"value\":\"$IP\",\"expires_at\":null}" 2>/dev/null && echo IP_SALVO
            curl -s -X POST "$SUPA/rest/v1/ia_cache" -H "apikey: $SUPABASE_ANON_KEY" -H "Authorization: Bearer $SUPABASE_ANON_KEY" -H 'Content-Type: application/json' -H 'Prefer: resolution=merge-duplicates' -d "{\"cache_key\":\"oracle_vm_id\",\"value\":\"$INST_ID\",\"expires_at\":null}" 2>/dev/null && echo ID_SALVO
          done
          echo "VMs ativas: 147.15.108.199 e 163.176.50.71"
          echo "ACAO MANUAL NECESSARIA: Acesse console.oracle.com e resete a chave SSH"
          echo === Fim ===
