name: oracle-stream-connect
on:
  workflow_dispatch:
  schedule:
    - cron: '30 */6 * * *'

jobs:
  connect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Setup OCI
        env:
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: 'True'
        run: |
          pip3 install oci-cli -q
          mkdir -p ~/.oci ~/.ssh
          printf '%s' "$OCI_PRIVATE_KEY" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          printf '[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=%s\nkey_file=%s\n' "$OCI_USER_OCID" "$OCI_FINGERPRINT" "$OCI_TENANCY_OCID" "$OCI_REGION" "$HOME/.oci/oci_api_key.pem" > ~/.oci/config
          chmod 600 ~/.oci/config
          oci iam availability-domain list --compartment-id "$OCI_TENANCY_OCID" --query 'data[*].name' --raw-output && echo OCI_OK

      - name: Terminar VMs travadas
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: 'True'
        run: |
          set +e
          echo === Listando todas as VMs ===
          oci compute instance list --compartment-id "$OCI_TENANCY_OCID" --all 2>/dev/null \
            | python3 -c "import sys,json; d=json.load(sys.stdin); [print(i['lifecycle-state']+'|'+i['display-name']+'|'+i['id']) for i in d.get('data',[])]"

          echo === Terminando VMs RUNNING e STOPPED ===
          INST_IDS=$(oci compute instance list --compartment-id "$OCI_TENANCY_OCID" --all 2>/dev/null \
            | python3 -c "import sys,json; d=json.load(sys.stdin); [print(i['id']) for i in d.get('data',[]) if i['lifecycle-state'] not in ['TERMINATED','TERMINATING']]" 2>/dev/null)
          echo "VMs para terminar: $(echo $INST_IDS | wc -w)"

          for ID in $INST_IDS; do
            NAME=$(oci compute instance get --instance-id "$ID" --query 'data."display-name"' --raw-output 2>/dev/null)
            echo -n "Terminando $NAME ($ID)... "
            oci compute instance terminate --instance-id "$ID" --force 2>/dev/null && echo OK || echo FALHOU
          done

          echo Aguardando 20s...
          sleep 20

          echo === Status apos terminate ===
          oci compute instance list --compartment-id "$OCI_TENANCY_OCID" --all 2>/dev/null \
            | python3 -c "import sys,json; d=json.load(sys.stdin); [print(i['lifecycle-state']+'|'+i['display-name']) for i in d.get('data',[])]"
          echo === LIMITE LIBERADO — oracle-vm-create pode criar nova VM ===
