name: Build Guard

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Python scripts
        run: |
          echo "=== Validando scripts Python ==="
          find scripts/ -name "*.py" -exec python3 -m py_compile {} \; 2>&1 || true
          echo "Python syntax check completo"

      - name: Check workflow files
        run: |
          echo "=== Verificando workflows ==="
          ls .github/workflows/*.yml | wc -l
          echo "workflows encontrados"

      - name: Done
        run: echo "Build Guard OK — repo de conteúdo, sem build Next.js"
