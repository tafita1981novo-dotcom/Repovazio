name: 🔍 Quality Control — Score ≥ 50

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  qc:
    name: 🔍 Quality Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install httpx --break-system-packages -q

      - name: 🔍 Run QC
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python3 scripts/quality_check.py
