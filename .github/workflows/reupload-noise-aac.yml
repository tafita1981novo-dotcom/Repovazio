name: reupload-noise-aac
on:
  workflow_dispatch:
    inputs:
      canais:
        description: 'Canais para reupar (ex: dbn adhd bsn pink rain)'
        required: false
        default: 'dbn adhd bsn pink rain'

jobs:
  dbn:
    if: contains(github.event.inputs.canais || 'dbn adhd bsn pink rain', 'dbn')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q && sudo apt-get install -y ffmpeg -q
      - run: python scripts/noise_upload_from_release.py
        env:
          CLIENT_ID: ${{ secrets.YT_CLIENT_ID_2 }}
          CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET_2 }}
          REFRESH_TOKEN: ${{ secrets.YOUTUBE_RT_DBN }}
          CANAL: dbn
          CHANNEL_ID: UCD4LLFnsiVzA-DeSN6oaUzg
          TITULO: "Brown Noise 12 Hours | Deep Sleep, ADHD Focus & Study Music | Black Screen No Ads"
          TAGS: "brown noise,brown noise 12 hours,ADHD focus,deep sleep,sleep sounds,black screen,study music,tinnitus relief,stress relief,insomnia,focus music,neurodivergent,12 hours,concentration,noise for sleep,brown noise sleep,brown noise ADHD,sleep aid,relax,deep work"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: tafita1981novo-dotcom/Repovazio
          ASSET_NAME: DBN.MP4
          SUPABASE_URL: https://tpjvalzwkqwttvmszvie.supabase.co
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

  adhd:
    if: contains(github.event.inputs.canais || 'dbn adhd bsn pink rain', 'adhd')
