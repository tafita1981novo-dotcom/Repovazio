name: Render MP4 V3 — Pollinations FLUX + Ken Burns

on:
  workflow_dispatch:
    inputs:
      video_id:
        description: "ID do vídeo no content_pipeline (deixar vazio para processar todos audio_ready)"
        default: ""
      max_videos:
        description: "Máximo de vídeos a processar"
        default: "5"
  schedule:
    - cron: "0 */6 * * *"  # a cada 6 horas

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - name: Install Python deps
        run: pip install requests Pillow

      - name: Diagnose Supabase connection
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "KEY length: ${#SUPABASE_SERVICE_KEY}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: $SUPABASE_SERVICE_KEY" -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            "$SUPABASE_URL/rest/v1/content_pipeline?status=eq.audio_ready&select=id&limit=1")
          echo "Supabase status: $STATUS"
          COUNT=$(curl -s -H "apikey: $SUPABASE_SERVICE_KEY" -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            "$SUPABASE_URL/rest/v1/content_pipeline?status=eq.audio_ready&select=id" | python3 -c "import json,sys; d=json.load(sys.stdin); print(len(d) if isinstance(d,list) else d)")
          echo "audio_ready rows: $COUNT"
          ffmpeg -version | head -1

      - name: Render vídeos audio_ready
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          VIDEO_ID:             ${{ inputs.video_id }}
          MAX_VIDEOS:           ${{ inputs.max_videos }}
        run: python3 scripts/render_video_v8_standard.py
        continue-on-error: true

      - name: Upload renders
        uses: actions/upload-artifact@v4
        with:
          name: renders-v3-${{ github.run_id }}
          path: output/renders/
          retention-days: 30
        if: always()
