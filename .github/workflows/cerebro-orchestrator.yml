name: cerebro-orchestrator

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Orchestrate growth
        run: |
          R=$(curl -s -X POST "https://tpjvalzwkqwttvmszvie.supabase.co/functions/v1/growth-orchestrator" \
            -H "Content-Type: application/json" \
            -d '{"action":"orchestrate"}')
          echo "$R"
