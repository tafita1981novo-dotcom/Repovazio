name: "🤖 Live Monitor — Watchdog 24/7 | Groq Llama 3.3"

on:
  schedule:
    - cron: "*/5 * * * *"   # a cada 5min (GitHub mínimo) → loop interno 5×60s = 1/min
  workflow_dispatch:
    inputs:
      checks:
        default: "5"
        description: "Quantidade de checks por execução"

concurrency:
  group: live-monitor
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}

      - name: "🤖 Watchdog — checar + auto-corrigir live"
        env:
          GH_PAT:              ${{ secrets.GH_PAT }}
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          YT_CLIENT_ID:        ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET:    ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN:    ${{ secrets.YT_REFRESH_TOKEN }}
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CHECKS:              ${{ inputs.checks || '5' }}
          INTERVAL:            "60"
        run: python3 scripts/live_monitor.py
        continue-on-error: true
