name: 🎬 Shorts Automáticos — Impulsionar Canal

on:
  schedule:
    - cron: '0 9 * * *'
    - cron: '0 15 * * *'
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  short:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependências
        run: |
          sudo apt-get update -y --fix-missing || true
          sudo apt-get install -y ffmpeg --fix-missing || sudo apt-get install -y ffmpeg
          pip install imageio-ffmpeg requests --quiet
      - name: 🎬 Publicar Short
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: python3 scripts/create_short.py
