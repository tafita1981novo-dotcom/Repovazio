name: 🎬 Long Video HQ — Vídeos 15min Qualidade Extrema

on:
  schedule:
    - cron: '0 10 * * 1,3,5'   # Segunda, Quarta, Sexta às 10h UTC
  workflow_dispatch:

concurrency:
  group: long-video-hq
  cancel-in-progress: false

jobs:
  generate-long:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          sudo apt-get install -y ffmpeg ffprobe
          pip install edge-tts requests

      - name: Gerar e publicar vídeo longo HQ
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: |
          python scripts/long_video_hq.py
