name: 🚀 Growth Engine — 1K Subs em 7 Dias

on:
  workflow_dispatch:
  schedule:
    # Horários estratégicos máximo CPM:
    - cron: '30 11 * * *'   # 08:30 BRT — EUA East Coast acorda ($18 CPM)
    - cron: '0 14 * * *'    # 11:00 BRT — EUA West Coast + DE ativa ($16 CPM)
    - cron: '30 17 * * *'   # 14:30 BRT — UK prime time ($12 CPM)
    - cron: '0 20 * * *'    # 17:00 BRT — AU prime time + EUA tarde
    - cron: '30 23 * * *'   # 20:30 BRT — BR prime time ($5 CPM)

jobs:
  growth:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install requests --quiet
      - name: 🌍 SEO 9 Idiomas + Distribuição
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          TT_CLIENT_KEY: ${{ secrets.TT_CLIENT_KEY }}
          TT_ACCESS_TOKEN: ${{ secrets.TT_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python3 scripts/distribute_9lang.py
