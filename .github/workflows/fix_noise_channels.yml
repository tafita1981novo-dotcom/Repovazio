name: Fix Noise Channels - Delete Livestreams + Upload Noise Videos

on:
  workflow_dispatch:

jobs:
  fix-channels:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Fix DBN + ADHD + WNV + TINNITUS
        env:
          YT_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID_NEW }}
          YT_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET_NEW }}
          YT_RT_DBN: ${{ secrets.YOUTUBE_RT_DBN }}
          YT_RT_ADHD: ${{ secrets.YOUTUBE_RT_ADHD }}
          YT_RT_WNV: ${{ secrets.YOUTUBE_RT_WNV }}
          YT_RT_TINNITUS: ${{ secrets.YOUTUBE_RT_TINNITUS }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          python3 - << 'PYEOF2'
          import json, os, urllib.request, urllib.parse, urllib.error, zipfile, shutil

          CID = os.environ["YT_CLIENT_ID"]
          CSC = os.environ["YT_CLIENT_SECRET"]
          GH_TOKEN = os.environ["GH_PAT"]
          REPO = "tafita1981novo-dotcom/Repovazio"
          SUPA = "https://tpjvalzwkqwttvmszvie.supabase.co"
          SK = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRwanZhbHp3a3F3dHR2bXN6dmllIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTcxMzk4MDkyNCwiZXhwIjoyMDI5NTU2OTI0fQ.RgYBGalHZy8a8PnlKCvF1mQr6BhVDGNv4j9OzomBCaA"

          CANAIS = {
            "dbn":      {"rt_env": "YT_RT_DBN",      "artifact": "noise-dbn-36000s",      "ch_id": "UCD4LLFnsiVzA-DeSN6oaUzg",
                         "title": "Deep Brown Noise | 10 Hours Black Screen Sleep & Focus",
                         "desc": "Deep brown noise for sleep, ADHD focus and tinnitus masking. Pure black screen 10 hours.\n\n#BrownNoise #DeepSleep #ADHDFocus #BlackScreen #SleepSounds",
                         "tags": ["brown noise","deep brown noise","sleep sounds","black screen","ADHD focus","tinnitus","sleep music","deep sleep"]},
            "adhd":     {"rt_env": "YT_RT_ADHD",     "artifact": "noise-adhd-36000s",     "ch_id": "UCK3xZDFY84ffNrLEAI1Qmyw",
                         "title": "ADHD Brown Noise | 10 Hours Focus Music Black Screen",
                         "desc": "Brown noise scientifically shown to improve ADHD focus. Pure black screen 10 hours.\n\n#ADHDFocus #BrownNoise #BlackScreen #FocusMusic #ADHD",
                         "tags": ["ADHD focus","brown noise","ADHD brown noise","black screen","focus music","hyperfocus","study music"]},
            "wnv":      {"rt_env": "YT_RT_WNV",      "artifact": "noise-wnv-36000s",      "ch_id": "UC0mFKp42jfL0ZobYEj7uwUA",
                         "title": "White Noise 10 Hours | Black Screen Sleep Sound",
                         "desc": "Classic white noise for deep sleep and office noise blocking. Pure black screen 10 hours.\n\n#WhiteNoise #SleepSounds #BlackScreen #DeepSleep",
                         "tags": ["white noise","sleep sounds","black screen","sleep music","deep sleep","white noise sleep"]},
            "tinnitus": {"rt_env": "YT_RT_TINNITUS", "artifact": "noise-tinnitus-36000s", "ch_id": "UCZ5pmYA2ESO1vIhtE86l3_Q",
                         "title": "Tinnitus Relief Pink Noise | 10 Hours Black Screen",
                         "desc": "Pink noise for tinnitus masking and sound therapy. Pure black screen 10 hours.\n\n#TinnitusRelief #PinkNoise #SoundTherapy #BlackScreen",
                         "tags": ["tinnitus relief","tinnitus masking","pink noise","black screen","sound therapy"]},
          }

          def get_at(rt):
              d = urllib.parse.urlencode({"client_id":CID,"client_secret":CSC,"refresh_token":rt,"grant_type":"refresh_token"}).encode()
              req = urllib.request.Request("https://oauth2.googleapis.com/token",data=d,method="POST",
                  headers={"Content-Type":"application/x-www-form-urlencoded"})
              with urllib.request.urlopen(req,timeout=15) as r:
                  return json.loads(r.read())

          def yt_del(at, vid_id):
              req = urllib.request.Request(
                  f"https://www.googleapis.com/youtube/v3/videos?id={vid_id}",
                  method="DELETE", headers={"Authorization":f"Bearer {at}"}
              )
              try:
                  with urllib.request.urlopen(req,timeout=15) as r:
                      return r.status
              except urllib.error.HTTPError as e:
                  return e.code

          def disk_info(label=""):
              disk = shutil.disk_usage("/")
              free_gb = disk.free/1024**3
              used_pct = (disk.used/disk.total)*100
              print(f"[DISCO {label}] livre={free_gb:.1f}GB ({used_pct:.0f}% usado)", flush=True)
              return free_gb

          def require_free(gb):
              free = disk_info("check")
              if free < gb:
                  raise RuntimeError(f"Espaço insuficiente: {free:.1f}GB < {gb}GB necessários")

          def download_zip(art_id, canal, zip_path):
              gh_headers = {"Authorization":f"token {GH_TOKEN}","Accept":"application/vnd.github.v3+json","User-Agent":"noise-bot"}
              req = urllib.request.Request(
                  f"https://api.github.com/repos/{REPO}/actions/artifacts/{art_id}/zip",
                  headers=gh_headers
              )
              downloaded = 0
              last_log = 0
              with urllib.request.urlopen(req,timeout=600) as r, open(zip_path,"wb") as f:
                  while True:
                      chunk = r.read(10*1024*1024)
                      if not chunk: break
                      f.write(chunk)
                      downloaded += len(chunk)
                      if downloaded - last_log >= 200*1024*1024:
                          disk_info(f"{canal} baixando {downloaded//1024//1024}MB")
                          last_log = downloaded
              print(f"[{canal}] ZIP: {os.path.getsize(zip_path)/1024**3:.2f}GB", flush=True)

          def stream_upload(zip_path, canal, at, info):
              with zipfile.ZipFile(zip_path) as zf:
                  mp4s = [i for i in zf.infolist() if i.filename.endswith(".mp4")]
                  if not mp4s:
                      raise RuntimeError("MP4 não encontrado")
                  mp4_info = mp4s[0]
                  file_size = mp4_info.file_size
              print(f"[{canal}] MP4: {file_size/1024**3:.2f}GB", flush=True)

              body = {
                  "snippet":{"title":info["title"],"description":info["desc"],"tags":info["tags"],"categoryId":"22","defaultLanguage":"en"},
                  "status":{"privacyStatus":"public","selfDeclaredMadeForKids":False}
              }
              init_req = urllib.request.Request(
                  "https://www.googleapis.com/upload/youtube/v3/videos?uploadType=resumable&part=snippet,status",
                  data=json.dumps(body).encode(), method="POST",
                  headers={"Authorization":f"Bearer {at}","Content-Type":"application/json; charset=UTF-8",
                           "X-Upload-Content-Length":str(file_size),"X-Upload-Content-Type":"video/mp4"}
              )
              with urllib.request.urlopen(init_req,timeout=30) as r:
                  upload_url = r.headers.get("Location")
              if not upload_url:
                  raise RuntimeError("Sem upload URL")
              print(f"[{canal}] Upload URL OK", flush=True)

              CHUNK = 50*1024*1024
              uploaded = 0
              video_id = None
              last_log = 0

              with zipfile.ZipFile(zip_path) as zf:
                  with zf.open(mp4_info) as mp4_stream:
                      while uploaded < file_size:
                          chunk = mp4_stream.read(CHUNK)
                          if not chunk: break
                          end = uploaded + len(chunk) - 1
                          req2 = urllib.request.Request(
                              upload_url, data=chunk, method="PUT",
                              headers={"Authorization":f"Bearer {at}",
                                       "Content-Length":str(len(chunk)),
                                       "Content-Range":f"bytes {uploaded}-{end}/{file_size}",
                                       "Content-Type":"video/mp4"}
                          )
                          try:
                              with urllib.request.urlopen(req2,timeout=300) as r2:
                                  if r2.status in [200,201]:
                                      video_id = json.loads(r2.read()).get("id")
                                      print(f"[{canal}] ✅ Upload completo! video_id={video_id}", flush=True)
                                      return video_id
                          except urllib.error.HTTPError as e:
                              if e.code == 308:
                                  rng = e.headers.get("Range","")
                                  if rng:
                                      uploaded = int(rng.split("-")[1]) + 1
                                  if uploaded - last_log >= 500*1024*1024:
                                      pct = (uploaded/file_size)*100
                                      print(f"[{canal}] {pct:.1f}% {uploaded//1024//1024}MB/{file_size//1024//1024}MB", flush=True)
                                      disk_info(f"{canal} upload")
                                      last_log = uploaded
                                  continue
                              else:
                                  body_err = e.read().decode()
                                  raise RuntimeError(f"Upload HTTP {e.code}: {body_err[:300]}")
                          uploaded += len(chunk)
              return video_id

          def supa_patch(ch_id, payload):
              body = json.dumps(payload).encode()
              req = urllib.request.Request(
                  f"{SUPA}/rest/v1/noise_channels?channel_id=eq.{ch_id}",
                  data=body, method="PATCH",
                  headers={"apikey":SK,"Authorization":f"Bearer {SK}","Content-Type":"application/json","Prefer":"return=minimal"}
              )
              try:
                  with urllib.request.urlopen(req,timeout=10) as r:
                      return r.status
              except urllib.error.HTTPError as e:
                  return e.code

          gh_headers = {"Authorization":f"token {GH_TOKEN}","Accept":"application/vnd.github.v3+json","User-Agent":"noise-bot"}
          ZIP_PATH = "/tmp/noise_current.zip"
          
          disk_info("início")

          for canal, info in CANAIS.items():
              print(f"\n{'='*50}", flush=True)
              print(f"[{canal}] INICIANDO", flush=True)

              try:
                  # 1. Obter access token
                  rt = os.environ[info["rt_env"]]
                  td = get_at(rt)
                  at = td.get("access_token")
                  if not at:
                      print(f"[{canal}] ❌ NO AT: {td.get('error','')} {td.get('error_description','')}", flush=True)
                      continue
                  print(f"[{canal}] AT OK", flush=True)

                  # 2. Verificar qual canal este token representa
                  with urllib.request.urlopen(urllib.request.Request(
                      "https://www.googleapis.com/youtube/v3/channels?part=snippet,contentDetails&mine=true",
                      headers={"Authorization":f"Bearer {at}"}),timeout=10) as r:
                      ch = json.loads(r.read())
                  ch_name = ch.get("items",[{}])[0].get("snippet",{}).get("title","?")
                  ch_id_real = ch.get("items",[{}])[0].get("id","?")
                  upl_pl = ch.get("items",[{}])[0].get("contentDetails",{}).get("relatedPlaylists",{}).get("uploads")
                  print(f"[{canal}] Channel: {ch_name} (ID={ch_id_real})", flush=True)

                  # 3. Deletar live streams existentes
                  if upl_pl:
                      with urllib.request.urlopen(urllib.request.Request(
                          f"https://www.googleapis.com/youtube/v3/playlistItems?part=contentDetails&playlistId={upl_pl}&maxResults=10",
                          headers={"Authorization":f"Bearer {at}"}),timeout=10) as r:
                          pl = json.loads(r.read())
                      for item in pl.get("items",[]):
                          vid_id = item["contentDetails"]["videoId"]
                          status = yt_del(at, vid_id)
                          print(f"[{canal}] Deletado video {vid_id}: HTTP {status}", flush=True)

                  # 4. Buscar artifact
                  with urllib.request.urlopen(urllib.request.Request(
                      f"https://api.github.com/repos/{REPO}/actions/artifacts?per_page=10&name={info['artifact']}",
                      headers=gh_headers),timeout=10) as r:
                      arts = [a for a in json.loads(r.read()).get("artifacts",[]) if not a.get("expired")]
                  if not arts:
                      print(f"[{canal}] ❌ Artifact {info['artifact']} não encontrado!", flush=True)
                      continue
                  art = arts[0]
                  print(f"[{canal}] Artifact: {art['id']} ({art['size_in_bytes']/1024**3:.2f}GB)", flush=True)

                  # 5. Download + upload
                  require_free(1.5)
                  download_zip(art["id"], canal, ZIP_PATH)
                  disk_info(f"{canal} pós-download")

                  # Refresh token antes do upload longo
                  td2 = get_at(rt)
                  at2 = td2.get("access_token", at)

                  vid_id = stream_upload(ZIP_PATH, canal, at2, info)

                  # 6. Update Supabase
                  if vid_id:
                      supa_patch(info["ch_id"], {
                          "video_uploaded": True,
                          "video_id": vid_id,
                          "video_title": info["title"],
                          "notas": "Noise video upado com sucesso. Mid-rolls pendente."
                      })

              except Exception as e:
                  import traceback
                  print(f"[{canal}] ❌ ERRO: {e}", flush=True)
                  traceback.print_exc()
              finally:
                  if os.path.exists(ZIP_PATH):
                      os.remove(ZIP_PATH)
                      print(f"[{canal}] ZIP removido", flush=True)
                  disk_info(f"{canal} pós-limpeza")

          print("\n=== FIM ===", flush=True)
          disk_info("fim")
          print("BSN/PINK/RAIN: bloqueados por validação de telefone Google — upload impossível via API até resolver.", flush=True)
          PYEOF2
