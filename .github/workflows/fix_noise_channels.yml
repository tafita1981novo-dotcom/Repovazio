name: Fix Noise Channels - Delete Livestreams + Upload Noise Videos

on:
  workflow_dispatch:

jobs:
  fix-channels:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - name: Fix DBN + ADHD + WNV + TINNITUS
        env:
          YT_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID_NEW }}
          YT_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET_NEW }}
          YT_RT_DBN: ${{ secrets.YOUTUBE_RT_DBN }}
          YT_RT_ADHD: ${{ secrets.YOUTUBE_RT_ADHD }}
          YT_RT_WNV: ${{ secrets.YOUTUBE_RT_WNV }}
          YT_RT_TINNITUS: ${{ secrets.YOUTUBE_RT_TINNITUS }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python3 scripts/fix_noise_channels.py
