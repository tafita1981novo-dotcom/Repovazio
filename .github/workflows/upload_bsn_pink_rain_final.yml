name: Upload BSN PINK RAIN Final

on:
  workflow_dispatch:

jobs:
  upload-bsn:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - name: Download BSN artifact via API
        run: |
          mkdir -p video
          curl -L -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/tafita1981novo-dotcom/Repovazio/actions/artifacts/7760929460/zip" \
            -o video/artifact.zip
          cd video && unzip -o artifact.zip && ls -la
          rm -f artifact.zip
      - name: Upload BSN to YouTube
        run: pip install requests -q && python3 scripts/upload_yt.py bsn
        env:
          YT_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID_NEW }}
          YT_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET_NEW }}
          YT_RT: ${{ secrets.YOUTUBE_RT_BSN }}
        working-directory: video/

  upload-pink:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: upload-bsn
    steps:
      - uses: actions/checkout@v4
      - name: Download PINK artifact via API
        run: |
          mkdir -p video
          curl -L -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/tafita1981novo-dotcom/Repovazio/actions/artifacts/7760948379/zip" \
            -o video/artifact.zip
          cd video && unzip -o artifact.zip && ls -la
          rm -f artifact.zip
      - name: Upload PINK to YouTube
        run: pip install requests -q && python3 scripts/upload_yt.py pink
        env:
          YT_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID_NEW }}
          YT_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET_NEW }}
          YT_RT: ${{ secrets.YOUTUBE_RT_PINK }}
        working-directory: video/

  upload-rain:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: upload-pink
    steps:
      - uses: actions/checkout@v4
      - name: Download RAIN artifact via API
        run: |
          mkdir -p video
          curl -L -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/tafita1981novo-dotcom/Repovazio/actions/artifacts/7760812042/zip" \
            -o video/artifact.zip
          cd video && unzip -o artifact.zip && ls -la
          rm -f artifact.zip
      - name: Upload RAIN to YouTube
        run: pip install requests -q && python3 scripts/upload_yt.py rain
        env:
          YT_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID_NEW }}
          YT_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET_NEW }}
          YT_RT: ${{ secrets.YOUTUBE_RT_RAIN }}
        working-directory: video/
