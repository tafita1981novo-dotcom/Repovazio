name: Upload BSN PINK RAIN Final

on:
  workflow_dispatch:

jobs:
  upload-bsn:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      YT_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID_NEW }}
      YT_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET_NEW }}
      YT_RT: ${{ secrets.YOUTUBE_RT_BSN }}
      GH_PAT: ${{ secrets.GH_PAT }}
    steps:
      - uses: actions/checkout@v4
      - name: Download and upload BSN
        run: |
          pip install requests -q
          mkdir -p video
          echo "Downloading BSN (1GB)..."
          curl -L --max-time 3600 --retry 3 --retry-delay 30 \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/tafita1981novo-dotcom/Repovazio/actions/artifacts/7760929460/zip" \
            -o video/artifact.zip
          python3 -c "import zipfile,os; z=zipfile.ZipFile('video/artifact.zip'); z.extractall('video/'); print('Extracted:',os.listdir('video/'))"
          rm -f video/artifact.zip
          echo "Running upload..."
          python3 scripts/upload_yt.py bsn

  upload-pink:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: upload-bsn
    env:
      YT_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID_NEW }}
      YT_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET_NEW }}
      YT_RT: ${{ secrets.YOUTUBE_RT_PINK }}
      GH_PAT: ${{ secrets.GH_PAT }}
    steps:
      - uses: actions/checkout@v4
      - name: Download and upload PINK
        run: |
          pip install requests -q
          mkdir -p video
          curl -L --max-time 3600 --retry 3 --retry-delay 30 \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/tafita1981novo-dotcom/Repovazio/actions/artifacts/7760948379/zip" \
            -o video/artifact.zip
          python3 -c "import zipfile,os; z=zipfile.ZipFile('video/artifact.zip'); z.extractall('video/'); print('Extracted:',os.listdir('video/'))"
          rm -f video/artifact.zip
          python3 scripts/upload_yt.py pink

  upload-rain:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: upload-pink
    env:
      YT_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID_NEW }}
      YT_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET_NEW }}
      YT_RT: ${{ secrets.YOUTUBE_RT_RAIN }}
      GH_PAT: ${{ secrets.GH_PAT }}
    steps:
      - uses: actions/checkout@v4
      - name: Download and upload RAIN
        run: |
          pip install requests -q
          mkdir -p video
          curl -L --max-time 3600 --retry 3 --retry-delay 30 \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/tafita1981novo-dotcom/Repovazio/actions/artifacts/7760812042/zip" \
            -o video/artifact.zip
          python3 -c "import zipfile,os; z=zipfile.ZipFile('video/artifact.zip'); z.extractall('video/'); print('Extracted:',os.listdir('video/'))"
          rm -f video/artifact.zip
          python3 scripts/upload_yt.py rain
