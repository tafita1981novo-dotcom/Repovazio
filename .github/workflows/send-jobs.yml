name: Job Application Sender
on:
  workflow_dispatch:
jobs:
  send-emails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Send job application emails
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python3 .github/scripts/send_jobs.py
