name: 🔴 LIVE 24/7 — Unified Black Screen 432Hz 15 Languages

on:
  workflow_dispatch:
    inputs:
      duration_h: {default: '6', description: 'Hours per cycle'}
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 6 * * *'
    - cron: '0 12 * * *'
    - cron: '0 18 * * *'

concurrency:
  group: live-unified-24h
  cancel-in-progress: true

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 410
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install imageio-ffmpeg Pillow --quiet
      - name: 🔴 Live Unificada 15 Idiomas — Tela Preta + 432Hz
        timeout-minutes: 400
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          DURATION_H: ${{ inputs.duration_h || '6' }}
        run: python3 scripts/live_unified.py
