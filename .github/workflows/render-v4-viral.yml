name: 🎬 Render V4 — Edge-TTS + HF FLUX (100% GRATIS)

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      max_videos:
        description: 'Quantos videos'
        default: '3'
      format:
        description: 'short ou long'
        default: 'short'

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}

      - name: Instalar FFmpeg snap
        run: |
          sudo snap install ffmpeg 2>/dev/null || true
          echo "/snap/bin" >> $GITHUB_PATH

      - name: Instalar deps Python (gratis)
        run: pip install edge-tts Pillow mutagen --break-system-packages -q

      - name: 🎬 Render V4 — edge-tts + HF FLUX
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          HF_TOKEN:             ${{ secrets.HF_TOKEN }}
          MAX_VIDEOS:           ${{ inputs.max_videos || '3' }}
          VIDEO_FORMAT:         ${{ inputs.format || 'short' }}
        run: python3 scripts/render_v4_viral.py

      - name: Resultado
        if: always()
        run: |
          echo "## Render V4 Gratis" >> $GITHUB_STEP_SUMMARY
          echo "- TTS: edge-tts Microsoft (gratis)" >> $GITHUB_STEP_SUMMARY
          echo "- Imagens: HF FLUX.1-schnell (gratis)" >> $GITHUB_STEP_SUMMARY
