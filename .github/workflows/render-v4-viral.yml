name: 🎬 Render V4 Viral — ElevenLabs + Personagens + Historia

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      max_videos:
        description: 'Quantos videos renderizar'
        default: '3'
      format:
        description: 'short ou long'
        default: 'short'

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}

      - name: Instalar FFmpeg e mutagen
        run: |
          sudo snap install ffmpeg 2>/dev/null || true
          echo "/snap/bin" >> $GITHUB_PATH
          pip install edge-tts Pillow mutagen --break-system-packages -q

      - name: Verificar setup
        run: |
          which ffmpeg && ffmpeg -version 2>&1 | head -1 || echo "ffmpeg via snap"
          python3 -c "import edge_tts, PIL, mutagen; print('deps OK')"

      - name: 🎬 Render V4 Viral — ElevenLabs + HF + Historia
        env:
          SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:  ${{ secrets.SUPABASE_SERVICE_KEY }}
          ELEVENLABS_API_KEY:    ${{ secrets.ELEVENLABS_API_KEY }}
          HF_TOKEN:              ${{ secrets.HF_TOKEN }}
          MAX_VIDEOS:            ${{ inputs.max_videos || '3' }}
          VIDEO_FORMAT:          ${{ inputs.format || 'short' }}
        run: python3 scripts/render_v4_viral.py

      - name: Resultado
        if: always()
        run: echo "Render concluido" >> $GITHUB_STEP_SUMMARY
