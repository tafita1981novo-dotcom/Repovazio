name: "🏆 Vídeo 1 Superior — #683 Narcisismo"

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Dependências
        run: |
          pip install --quiet requests edge-tts Pillow
          sudo apt-get install -y ffmpeg --quiet 2>/dev/null

      - name: 🏆 Render Vídeo 1 Superior
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
        run: python scripts/render_683_superior.py

      - name: 📊 Resultado
        if: always()
        run: |
          echo "## 🏆 Vídeo 1 Superior #683" >> $GITHUB_STEP_SUMMARY
          echo "- 33 cenas únicas com personagens do universo" >> $GITHUB_STEP_SUMMARY
          echo "- Pollinations Flux enhanced + Gemini fallback" >> $GITHUB_STEP_SUMMARY
          echo "- CRF=22 (qualidade superior ao V8 Final CRF=25)" >> $GITHUB_STEP_SUMMARY
          echo "- 2204 chars (vs 829 V8 Final) = mais conteúdo" >> $GITHUB_STEP_SUMMARY
