name: 🔴 Live em Producao
on:
  workflow_dispatch:
jobs:
  go_live:
    runs-on: ubuntu-latest
    steps:
      - name: Live em producao + deletar upcoming + thumbnail v15
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: |
          python3 << 'PY'
          import json,urllib.request,urllib.parse,urllib.error,os,time

          def token():
              r=urllib.request.urlopen(urllib.request.Request("https://oauth2.googleapis.com/token",
                  data=urllib.parse.urlencode({"client_id":os.environ["YT_CLIENT_ID"],
                  "client_secret":os.environ["YT_CLIENT_SECRET"],
                  "refresh_token":os.environ["YT_REFRESH_TOKEN"],"grant_type":"refresh_token"}).encode(),
                  headers={"Content-Type":"application/x-www-form-urlencoded"}),timeout=15)
              return json.loads(r.read())["access_token"]

          def yt(method,ep,data=None,params=None,T=None):
              url="https://www.googleapis.com/youtube/v3/"+ep
              if params: url+="?"+urllib.parse.urlencode(params)
              h={"Authorization":f"Bearer {T}"}; b=None
              if data: b=json.dumps(data).encode(); h["Content-Type"]="application/json"
              req=urllib.request.Request(url,data=b,headers=h,method=method)
              try:
                  with urllib.request.urlopen(req,timeout=30) as r:
                      raw=r.read(); return (json.loads(raw) if raw else {}),r.status
              except urllib.error.HTTPError as e:
                  raw=e.read(); return (json.loads(raw) if raw else {}),e.code

          T=token(); print("Token OK")
          BID="5HqPWz058Qw"

          # 1. Listar todos broadcasts
          print("\n1. Broadcasts:")
          all_b=[]; page=None
          for status in ["all","active","upcoming","completed"]:
              p={"part":"id,snippet,status","broadcastStatus":status,"maxResults":"50"}
              res,_=yt("GET","liveBroadcasts",params=p,T=T)
              for item in res.get("items",[]):
                  bid=item["id"]; lc=item.get("status",{}).get("lifeCycleStatus","?")
                  title=item.get("snippet",{}).get("title","?")[:40]
                  if bid not in [b["id"] for b in all_b]:
                      all_b.append({"id":bid,"status":lc,"title":title})
                      print(f"  {bid} | {lc:12s} | {title}")
          print(f"  Total: {len(all_b)}")

          # 2. Deletar todos MENOS o broadcast eterno
          print("\n2. Deletando outros broadcasts...")
          for b in all_b:
              if b["id"]!=BID:
                  res,code=yt("DELETE","liveBroadcasts",params={"id":b["id"]},T=T)
                  print(f"  {'OK' if code in (200,204) else 'ERR '+str(code)} {b['id']}: {b['title']}")
                  time.sleep(0.3)

          # 3. Verificar status do broadcast eterno
          print("\n3. Status do broadcast eterno:")
          res,_=yt("GET","liveBroadcasts",params={"part":"id,status,contentDetails","id":BID},T=T)
          items=res.get("items",[])
          if items:
              lc=items[0].get("status",{}).get("lifeCycleStatus","?")
              print(f"  {BID}: {lc}")
          else:
              print("  Broadcast nao encontrado — recriando...")
              # Criar broadcast se necessário
              from datetime import datetime,timezone,timedelta
              start=(datetime.now(timezone.utc)+timedelta(minutes=2)).strftime("%Y-%m-%dT%H:%M:%S.000Z")
              res2,code2=yt("POST","liveBroadcasts",T=T,
                  params={"part":"snippet,status,contentDetails"},
                  data={"snippet":{"title":"\U0001f534 WHITE NOISE & BROWN NOISE 24/7 | Black Screen | sleep | tinnitus relief | ADHD focus | baby sleep","scheduledStartTime":start},
                      "status":{"privacyStatus":"public","selfDeclaredMadeForKids":False},
                      "contentDetails":{"enableAutoStart":True,"enableAutoStop":False,"monitorStream":{"enableMonitorStream":False},"latencyPreference":"ultraLow"}})
              if code2 in (200,201):
                  BID=res2["id"]; print(f"  Novo broadcast: {BID}")
              lc="ready"

          # 4. Tentar transicionar para live (se o stream estiver ativo)
          print("\n4. Transicionando para live...")
          res,code=yt("POST","liveBroadcasts/transition",T=T,
              params={"part":"status","broadcastStatus":"live","id":BID})
          if code==200:
              new_lc=res.get("status",{}).get("lifeCycleStatus","?")
              print(f"  OK! Novo status: {new_lc}")
          else:
              err=res.get("error",{}).get("errors",[{}])
              reason=err[0].get("reason","?") if err else "?"
              print(f"  {code} {reason} — stream ainda nao ativo, tentando testing...")
              res,code=yt("POST","liveBroadcasts/transition",T=T,
                  params={"part":"status","broadcastStatus":"testing","id":BID})
              print(f"  testing: {code} {res.get('status',{}).get('lifeCycleStatus','?')}")

          # 5. Aplicar thumbnail v15
          print("\n5. Thumbnail v15...")
          with urllib.request.urlopen(urllib.request.Request(
              "https://raw.githubusercontent.com/tafita81/Repovazio/main/assets/thumbnail_live.png",
              headers={"User-Agent":"Mozilla/5.0"}),timeout=30) as r2: thumb=r2.read()
          print(f"  {len(thumb)//1024}KB")
          bnd=b"tv15bnd"
          body=(b"--"+bnd+b"\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n{}\r\n"
                +b"--"+bnd+b"\r\nContent-Type: image/jpeg\r\n\r\n"+thumb+b"\r\n--"+bnd+b"--")
          req_u=urllib.request.Request(
              f"https://www.googleapis.com/upload/youtube/v3/thumbnails/set?videoId={BID}&uploadType=multipart",
              data=body,method="POST",headers={"Authorization":f"Bearer {T}",
              "Content-Type":f"multipart/related; boundary={bnd.decode()}","Content-Length":str(len(body))})
          try:
              with urllib.request.urlopen(req_u,timeout=30): print("  OK thumbnail v15!")
          except urllib.error.HTTPError as e: print(f"  Warn {e.code}: {e.read()[:150]}")

          print(f"\n===== LIVE em PRODUCAO | broadcast={BID} =====")
          PY
