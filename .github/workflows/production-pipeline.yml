name: Production Pipeline — 6 APIs Gratuitas (Fixas)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6,12,18 * * *"

jobs:
  produce:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - name: Setup
        run: |
          sudo apt-get install -y ffmpeg > /dev/null 2>&1
          pip install requests edge-tts --break-system-packages
      - name: Pipeline produção
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
        run: python3 scripts/production_pipeline.py || true
        continue-on-error: true
