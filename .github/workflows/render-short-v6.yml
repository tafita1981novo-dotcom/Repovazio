name: 🎬 Render Short V6 — Script Completo + Sinc Perfeita + 5 Cenas

on:
  workflow_dispatch:
    inputs:
      video_id: {required: false, description: 'ID específico (opcional)'}
  schedule:
    - cron: '*/20 * * * *'   # A cada 20 minutos

concurrency:
  group: render-short-v6
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Instalar dependências
        run: |
          pip install imageio-ffmpeg Pillow edge-tts --quiet
          sudo apt-get install -y ffmpeg --quiet 2>/dev/null || true

      - name: Renderizar Short Viral V6
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          VIDEO_ID: ${{ inputs.video_id || '' }}
        run: python3 scripts/render_short_v6.py
