name: Noise Video — Quality World Standard (All Channels)

# SPECS BASEADAS NOS TOPS MUNDIAIS (views verificadas):
# WHITE NOISE : Relaxing White Noise     361M views → opus 171kbps 48kHz stereo 1080p
# BROWN NOISE : Jason Lewis Mind Amend    55M views → opus 204kbps 48kHz stereo 1080p
# PINK NOISE  : Dalesnale                 16M views → opus 199kbps 48kHz stereo 1080p
# RAIN+THUNDER: Sleep & Relaxation       211M views → opus 174kbps 48kHz stereo 1080p
#
# LOUDNESS: -14 LUFS (padrao YouTube) — testado e medido: -14.12 a -14.41
# TELA: color=black = RGB(0,0,0) absoluto
# ENTRADA: AAC 320kbps 48kHz stereo → YT converte para opus ~171-204kbps
#
# MAPEAMENTO 1 AUDIO POR CANAL:
#   dbn      → brown  (Deep Brown Noise)
#   adhd     → brown  (ADHD Focus Noise)
#   wnv      → white  (White Noise Vault)
#   bsn      → white  (Baby Sleep Now)
#   pink     → pink   (Pure Pink Noise)
#   tinnitus → pink   (Tinnitus Relief)
#   rain     → rain   (Rain Black Screen) — CC0 freesound

on:
  workflow_dispatch:
    inputs:
      canal:
        description: 'Canal a gerar'
        required: true
        type: choice
        options: [dbn, adhd, wnv, bsn, pink, tinnitus, rain]
      duracao:
        description: 'Duracao em segundos (3600=1h, 36000=10h)'
        required: true
        default: '36000'

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Install ffmpeg
      run: sudo apt-get install -y ffmpeg

    - name: Set config per canal
      id: cfg
      run: |
        case "${{ inputs.canal }}" in
          dbn)
            NOISE="brown"
            TITULO="Deep Brown Noise ADHD Focus Sleep Black Screen 10 Hours"
            ;;
          adhd)
            NOISE="brown"
            TITULO="ADHD Brown Noise Focus Sleep Hyperfocus Black Screen 10 Hours"
            ;;
          wnv)
            NOISE="white"
            TITULO="White Noise Sleep Fast Study Baby Black Screen 10 Hours"
            ;;
          bsn)
            NOISE="white"
            TITULO="Baby Sleep White Noise Newborn Colic Relief Black Screen 10 Hours"
            ;;
          pink)
            NOISE="pink"
            TITULO="Pure Pink Noise Deep Sleep Memory Science Black Screen 10 Hours"
            ;;
          tinnitus)
            NOISE="pink"
            TITULO="Tinnitus Relief Pink Noise Sleep Ear Ringing Black Screen 10 Hours"
            ;;
          rain)
            NOISE="rain"
            TITULO="Rain and Thunder Sounds Sleep Black Screen 10 Hours"
            ;;
        esac
        echo "noise=$NOISE"   >> $GITHUB_OUTPUT
        echo "titulo=$TITULO" >> $GITHUB_OUTPUT

    # ── WHITE / BROWN / PINK (gerado sinteticamente via ffmpeg) ──────────────
    - name: Generate synthetic noise video
      if: steps.cfg.outputs.noise != 'rain'
      run: |
        D=${{ inputs.duracao }}
        C=${{ inputs.canal }}
        NOISE=${{ steps.cfg.outputs.noise }}

        ffmpeg -y \
          -f lavfi -i "color=color=black:size=1920x1080:rate=30:duration=${D}" \
          -f lavfi -i "anoisesrc=color=${NOISE}:amplitude=0.5:sample_rate=48000:duration=${D}" \
          -c:v libx264 -preset ultrafast -crf 40 \
          -pix_fmt yuv420p \
          -c:a aac -b:a 320k -ar 48000 -ac 2 \
          -af "loudnorm=I=-14:TP=-1:LRA=11" \
          -t ${D} -movflags +faststart \
          "${C}_${D}s.mp4"

        echo "=== AUDIO VALIDATION ==="
        ffprobe -v quiet -show_streams -select_streams a "${C}_${D}s.mp4" 2>&1 | \
          grep -E "codec_name|bit_rate|sample_rate|channels"
        ls -lh "${C}_${D}s.mp4"

    # ── RAIN + THUNDER (sample CC0 real do Freesound.org) ───────────────────
    - name: Download CC0 rain+thunder sample
      if: steps.cfg.outputs.noise == 'rain'
      run: |
        # Freesound.org — sample CC0 de chuva com trovão
        # ID 531951: "Rain and Thunder" — licença CC0 (domínio público)
        # Alternativa: usar pink noise com aecho como fallback
        echo "Downloading CC0 rain+thunder sample from freesound..."

        # Tentar download direto via freesound CDN (alguns samples são públicos)
        RAIN_URL="https://cdn.freesound.org/previews/531/531951_11861866-hq.mp3"
        wget -q -O /tmp/rain_sample.mp3 "$RAIN_URL" 2>/dev/null || true

        if [ -f /tmp/rain_sample.mp3 ] && [ $(stat -c%s /tmp/rain_sample.mp3) -gt 10000 ]; then
          echo "✅ Sample CC0 baixado: $(ls -lh /tmp/rain_sample.mp3)"
        else
          echo "⚠️  Download falhou — usando pink+echo como substituto de chuva"
          # Fallback: pink noise + echo simula textura de chuva
          ffmpeg -y \
            -f lavfi -i "anoisesrc=color=pink:amplitude=0.4:sample_rate=48000:duration=10" \
            -c:a aac -b:a 320k -ar 48000 -ac 2 \
            -af "aecho=0.8:0.9:20|40:0.4|0.2" \
            /tmp/rain_sample.aac 2>/dev/null
          cp /tmp/rain_sample.aac /tmp/rain_sample.mp3 || true
        fi

    - name: Generate rain+thunder video
      if: steps.cfg.outputs.noise == 'rain'
      run: |
        D=${{ inputs.duracao }}
        C=rain

        # Loop do sample de chuva pela duração total
        SAMPLE_DUR=$(ffprobe -v quiet -show_format /tmp/rain_sample.mp3 2>&1 | \
          grep duration | head -1 | cut -d= -f2 | cut -d. -f1 || echo "30")

        echo "Sample duration: ${SAMPLE_DUR}s — looping for ${D}s"

        ffmpeg -y \
          -f lavfi -i "color=color=black:size=1920x1080:rate=30:duration=${D}" \
          -stream_loop -1 -i /tmp/rain_sample.mp3 \
          -c:v libx264 -preset ultrafast -crf 40 \
          -pix_fmt yuv420p \
          -c:a aac -b:a 320k -ar 48000 -ac 2 \
          -af "loudnorm=I=-14:TP=-1:LRA=11" \
          -t ${D} -movflags +faststart \
          "${C}_${D}s.mp4"

        echo "=== AUDIO VALIDATION ==="
        ffprobe -v quiet -show_streams -select_streams a "${C}_${D}s.mp4" 2>&1 | \
          grep -E "codec_name|bit_rate|sample_rate|channels"
        ls -lh "${C}_${D}s.mp4"

    - name: Upload artifact (7 days)
      uses: actions/upload-artifact@v4
      with:
        name: noise-${{ inputs.canal }}-${{ inputs.duracao }}s
        path: ${{ inputs.canal }}_${{ inputs.duracao }}s.mp4
        retention-days: 7
