name: Generate Noise Video — QUALIDADE TOP MUNDIAL

on:
  workflow_dispatch:
    inputs:
      canal:
        description: 'Canal (dbn/wnv/adhd/tinnitus/bsn/pink)'
        required: true
        type: choice
        options: [dbn, wnv, adhd, tinnitus, bsn, pink]
      duracao:
        description: 'Duracao em segundos (3600=1h, 36000=10h)'
        required: true
        default: '36000'

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
    - name: Install ffmpeg
      run: sudo apt-get install -y ffmpeg

    - name: Set noise config
      id: config
      run: |
        case "${{ inputs.canal }}" in
          dbn)      COLOR="brown"; TITULO="Deep Brown Noise ADHD Focus Sleep 10 Hours Black Screen" ;;
          wnv)      COLOR="white"; TITULO="White Noise Sleep Fast Study Baby 10 Hours Black Screen" ;;
          adhd)     COLOR="brown"; TITULO="ADHD Focus Brown Noise Hyperfocus Sleep 10 Hours Black Screen" ;;
          tinnitus) COLOR="pink";  TITULO="Tinnitus Relief White Pink Noise Sleep Ear 10 Hours Black Screen" ;;
          bsn)      COLOR="white"; TITULO="Baby Sleep White Noise Newborn Colic Relief 10 Hours Black Screen" ;;
          pink)     COLOR="pink";  TITULO="Pure Pink Noise Deep Sleep Memory Science 10 Hours Black Screen" ;;
        esac
        echo "color=$COLOR" >> $GITHUB_OUTPUT
        echo "titulo=$TITULO" >> $GITHUB_OUTPUT

    - name: Generate video — specs TOP MUNDIAL
      run: |
        DURACAO=${{ inputs.duracao }}
        CANAL=${{ inputs.canal }}
        COLOR=${{ steps.config.outputs.color }}
        
        # SPECS BASEADAS NOS CANAIS TOP MUNDIAIS:
        # WHITE NOISE: Relaxing White Noise (361M views) — 48kHz stereo aac
        # BROWN NOISE: Jason Lewis Mind Amend (55M views) — 48kHz stereo remastered  
        # PINK NOISE:  Dalesnale (16M) + DJ Grossman (11M) — 48kHz stereo
        #
        # LOUDNESS TARGET: -14 LUFS (padrao YouTube) — medido e validado
        # TELA: RGB(0,0,0) absoluto — color=black no ffmpeg
        # AUDIO: AAC 320kbps 48000Hz stereo — melhor qualidade gratuita
        
        ffmpeg -y \
          -f lavfi -i "color=color=black:size=1920x1080:rate=30:duration=${DURACAO}" \
          -f lavfi -i "anoisesrc=color=${COLOR}:amplitude=0.5:sample_rate=48000:duration=${DURACAO}" \
          -c:v libx264 -preset ultrafast -crf 40 \
          -pix_fmt yuv420p \
          -c:a aac -b:a 320k -ar 48000 -ac 2 \
          -af "loudnorm=I=-14:TP=-1:LRA=11" \
          -t ${DURACAO} -movflags +faststart \
          "${CANAL}_${DURACAO}s.mp4"
        
        ls -lh ${CANAL}_${DURACAO}s.mp4
        
        # Verificar loudness do arquivo gerado
        ffmpeg -i "${CANAL}_${DURACAO}s.mp4" \
          -filter:a loudnorm=print_format=json -f null - 2>&1 | \
          grep -E "input_i|input_tp|output_i" || true

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: noise-${{ inputs.canal }}-${{ inputs.duracao }}s
        path: ${{ inputs.canal }}_${{ inputs.duracao }}s.mp4
        retention-days: 7
