name: "📝 Gerar Scripts — Episódios Completos"

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: "Quantos episódios gerar (máx 20)"
        default: "10"
        required: false
      series_id:
        description: "ID da série (vazio = todas)"
        default: ""
        required: false
  schedule:
    # 4x/dia para processar todos os 250 episódios gradualmente
    - cron: "30 2,8,14,20 * * *"

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Dependências
        run: pip install --quiet requests

      - name: 📝 Gerar Scripts dos Episódios
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BATCH_SIZE: ${{ github.event.inputs.batch_size || '10' }}
        run: python scripts/generate_episode_scripts.py

      - name: 📊 Resumo
        if: always()
        run: |
          echo "## 📝 Geração de Episódios" >> $GITHUB_STEP_SUMMARY
          echo "- Scripts: completos com personagens + hipnose" >> $GITHUB_STEP_SUMMARY
          echo "- Personagens: Sara, Lucas, Daniela, Dra.Ana, Marcos, Julia..." >> $GITHUB_STEP_SUMMARY
          echo "- Hipnose: H1-Loop, H2-Reconhecimento, H3-Prova, H4-Urgência, H5-Identidade, H6-Parasocial" >> $GITHUB_STEP_SUMMARY
          echo "- Segmentos: ~41 chars cada = 1 imagem diferente" >> $GITHUB_STEP_SUMMARY
          echo "- Próximo: infinite-universe.yml renderiza automaticamente" >> $GITHUB_STEP_SUMMARY
