name: 📱 WhatsApp Persistent Server

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  whatsapp-server:
    name: WhatsApp Baileys Server
    runs-on: ubuntu-latest
    timeout-minutes: 340

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 Install dependencies
        working-directory: scripts
        run: npm install --legacy-peer-deps

      - name: 📱 Start WhatsApp Server
        working-directory: scripts
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          WEBHOOK_URL:          https://repovazio.vercel.app/api/wa-webhook
          WEBHOOK_SECRET:       ${{ secrets.WEBHOOK_SECRET }}
        run: node wa-server.js

      - name: 📊 Summary
        if: always()
        run: |
          echo "## WhatsApp Server" >> $GITHUB_STEP_SUMMARY
          echo "Encerrado: $(date '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
