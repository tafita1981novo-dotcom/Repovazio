name: Test YouTube Credentials (YT_ prefix)
on:
  workflow_dispatch:
jobs:
  test-yt:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Test YT refresh token
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: |
          echo "=== YouTube Credentials Test ==="
          echo "YT_CLIENT_ID length: ${#YT_CLIENT_ID}"
          echo "YT_CLIENT_SECRET length: ${#YT_CLIENT_SECRET}"
          echo "YT_REFRESH_TOKEN length: ${#YT_REFRESH_TOKEN}"
          echo "YT_REFRESH_TOKEN prefix: ${YT_REFRESH_TOKEN:0:10}..."
          echo ""
          echo "Testing OAuth refresh..."
          STATUS=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            -X POST https://oauth2.googleapis.com/token \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=$YT_CLIENT_ID&client_secret=$YT_CLIENT_SECRET&refresh_token=$YT_REFRESH_TOKEN&grant_type=refresh_token")
          echo "HTTP Status: $STATUS"
          python3 -c "
import json,sys
d=json.load(open('/tmp/resp.json'))
err=d.get('error','none')
tok=d.get('access_token','')
print(f'Error: {err}')
print(f'Token prefix: {tok[:25]}...' if tok else 'No token')
print(f'Expires: {d.get(\"expires_in\",\"N/A\")}s')
"
