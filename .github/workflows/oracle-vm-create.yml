name: oracle-vm-create

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # Tenta a cada 6h automaticamente

jobs:
  create-vm:
    runs-on: ubuntu-latest
    timeout-minutes: 358

    steps:
      - name: Instalar OCI CLI
        run: |
          curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh | bash -s -- --accept-all-defaults 2>/dev/null
          export PATH="$HOME/bin:$PATH"
          oci --version

      - name: Configurar OCI
        env:
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
        run: |
          export PATH="$HOME/bin:$PATH"
          mkdir -p ~/.oci
          echo "$OCI_PRIVATE_KEY" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          cat > ~/.oci/config << EOF
[DEFAULT]
user=$OCI_USER_OCID
fingerprint=$OCI_FINGERPRINT
tenancy=$OCI_TENANCY_OCID
region=$OCI_REGION
key_file=~/.oci/oci_api_key.pem
EOF
          oci iam region list --query 'data[0].name' --raw-output 2>/dev/null && echo "OCI auth OK"

      - name: Gerar SSH key para VM
        run: |
          ssh-keygen -t rsa -b 2048 -f ~/.ssh/oracle_stream -N '' -q
          echo "SSH key gerada"

      - name: Retry criar VM ARM (ate 600 tentativas / 5h)
        env:
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCI_AD: ${{ secrets.OCI_AD }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          export PATH="$HOME/bin:$PATH"
          echo "Iniciando retry loop..."
          for i in $(seq 1 600); do
            echo -n "[$i] "
            RESULT=$(oci compute instance launch \
              --compartment-id "$OCI_TENANCY_OCID" \
              --availability-domain "$OCI_AD" \
              --shape VM.Standard.A1.Flex \
              --shape-config '{"ocpus":4,"memoryInGBs":24}' \
              --image-id "$OCI_IMAGE_ID" \
              --subnet-id "$OCI_SUBNET_ID" \
              --assign-public-ip true \
              --ssh-authorized-keys-file ~/.ssh/oracle_stream.pub \
              --display-name psidoc-stream-server \
              --boot-volume-size-in-gbs 50 \
              --query 'data.id' --raw-output 2>&1)
            
            if echo "$RESULT" | grep -q 'ocid1.instance'; then
              echo "VM CRIADA! OCID: $RESULT"
              INSTANCE_OCID="$RESULT"
              
              # Aguardar VM iniciar (3 min)
              echo "Aguardando VM iniciar..."
              sleep 180
              
              # Pegar IP publico
              PUBLIC_IP=$(oci compute instance list-vnics \
                --instance-id "$INSTANCE_OCID" \
                --query 'data[0]."public-ip"' --raw-output 2>/dev/null || echo "")
              echo "IP publico: $PUBLIC_IP"
              
              if [ -n "$PUBLIC_IP" ] && [ "$PUBLIC_IP" != "null" ]; then
                # Instalar tudo via SSH
                ssh -o StrictHostKeyChecking=no -i ~/.ssh/oracle_stream ubuntu@$PUBLIC_IP << SSHEOF
                  set -e
                  sudo apt-get update -qq
                  sudo apt-get install -y ffmpeg python3 python3-pip wget -q
                  pip3 install numpy pillow -q
                  
                  # Baixar script de setup do stream
                  wget -q "https://raw.githubusercontent.com/tafita81/Repovazio/main/scripts/oracle-forever-live-setup.sh" -O /tmp/setup.sh
                  chmod +x /tmp/setup.sh
                  export STREAM_KEY="${YOUTUBE_STREAM_KEY}"
                  bash /tmp/setup.sh
                  echo "Stream iniciado!"
SSHEOF
                echo "VM configurada! Stream ativo."
                
                # Salvar IP no Supabase via GitHub secret
                echo "$PUBLIC_IP" > /tmp/oracle_ip.txt
                echo "IP Oracle: $PUBLIC_IP"
              fi
              break
            else
              if echo "$RESULT" | grep -q "Out of host capacity"; then
                echo "sem capacidade. Aguardando 30s..."
              else
                echo "erro: ${RESULT:0:100}"
              fi
              sleep 30
            fi
          done
