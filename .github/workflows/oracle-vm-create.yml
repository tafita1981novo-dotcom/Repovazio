name: oracle-vm-create
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  create-vm:
    runs-on: ubuntu-latest
    timeout-minutes: 358
    steps:
      - name: Setup OCI
        env:
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
        run: |
          pip3 install oci-cli -q
          mkdir -p ~/.oci ~/.ssh
          printf '%s' "$OCI_PRIVATE_KEY" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          printf '[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=%s\nkey_file=%s\n' \
            "$OCI_USER_OCID" "$OCI_FINGERPRINT" "$OCI_TENANCY_OCID" "$OCI_REGION" \
            "$HOME/.oci/oci_api_key.pem" > ~/.oci/config
          ssh-keygen -t rsa -b 2048 -f ~/.ssh/oracle_stream -N '' -q
          oci iam region list --query 'data[0].name' --raw-output && echo 'Auth OK'

      - name: Retry VM ARM
        env:
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCI_AD: ${{ secrets.OCI_AD }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          set +e
          echo 'Iniciando retry loop ARM...'
          CRIADO=0
          for i in $(seq 1 600); do
            echo -n "[$i] "
            R=$(oci compute instance launch \
              --compartment-id "$OCI_TENANCY_OCID" \
              --availability-domain "$OCI_AD" \
              --shape VM.Standard.A1.Flex \
              --shape-config '{"ocpus":4,"memoryInGBs":24}' \
              --image-id "$OCI_IMAGE_ID" \
              --subnet-id "$OCI_SUBNET_ID" \
              --assign-public-ip true \
              --ssh-authorized-keys-file ~/.ssh/oracle_stream.pub \
              --display-name psidoc-stream-server \
              --boot-volume-size-in-gbs 50 \
              --query 'data.id' --raw-output 2>&1)
            if echo "$R" | grep -q 'ocid1.instance'; then
              echo "VM CRIADA: $R"
              CRIADO=1
              echo "Aguardando 3min VM iniciar..."
              sleep 180
              IP=$(oci compute instance list-vnics --instance-id "$R" \
                --query 'data[0]."public-ip"' --raw-output 2>/dev/null)
              echo "IP: $IP"
              if [ -n "$IP" ] && [ "$IP" != 'null' ]; then
                ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
                  -i ~/.ssh/oracle_stream ubuntu@$IP \
                  "sudo apt-get install -y ffmpeg python3-pip wget -q && \
                   pip3 install numpy pillow -q && \
                   wget -qO /tmp/s.sh https://raw.githubusercontent.com/tafita81/Repovazio/main/scripts/oracle-forever-live-setup.sh && \
                   chmod +x /tmp/s.sh && STREAM_KEY='$YOUTUBE_STREAM_KEY' bash /tmp/s.sh && \
                   echo STREAM_OK" || echo 'SSH falhou'
                echo "IP Oracle: $IP"
              fi
              break
            else
              echo 'sem capacidade. sleep 30...'
              sleep 30
            fi
          done
          curl -s -X POST \
            -H "Authorization: Bearer $GH_PAT" \
            -H 'Accept: application/vnd.github+json' \
            'https://api.github.com/repos/tafita81/Repovazio/actions/workflows/oracle-vm-create.yml/dispatches' \
            -d '{"ref":"main"}' && echo 'Relay para proximo ciclo OK'
          exit 0
