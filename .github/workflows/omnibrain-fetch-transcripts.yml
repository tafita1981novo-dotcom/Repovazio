name: OMNIBRAIN — Fetch Transcripts Fast

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Vídeos por run (padrão 500)'
        required: false
        default: '500'
        type: string
      max_workers:
        description: 'Threads paralelas (padrão 30)'
        required: false
        default: '30'
        type: string

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-yt-v2

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install "youtube-transcript-api>=0.6" "supabase>=2.0" httpx

      - name: Check pending
        id: check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 - <<'EOF'
          import os
          from supabase import create_client
          sb = create_client(os.environ['SUPABASE_URL'], os.environ['SUPABASE_KEY'])
          r = sb.table('yt_transcripts').select('video_id', count='exact').eq('status','pending').execute()
          count = r.count or 0
          print(f"Pending: {count}")
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"pending={count}\n")
          EOF

      - name: Skip if done
        if: steps.check.outputs.pending == '0'
        run: echo "✅ Nada pendente." && exit 0

      - name: Fetch transcripts (parallel)
        if: steps.check.outputs.pending != '0'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          BATCH_SIZE:   ${{ github.event.inputs.batch_size  || '500' }}
          MAX_WORKERS:  ${{ github.event.inputs.max_workers || '30'  }}
        run: python3 omnibrain/fetch_transcripts.py

      - name: Summary
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 - <<'EOF'
          import os
          from supabase import create_client
          sb = create_client(os.environ['SUPABASE_URL'], os.environ['SUPABASE_KEY'])
          print("=== OMNIBRAIN yt_transcripts ===")
          for s, emoji in [('pending','⏳'),('done','✅'),('no_captions','🔇'),('error','❌')]:
              r = sb.table('yt_transcripts').select('video_id', count='exact').eq('status',s).execute()
              print(f"  {emoji} {s}: {r.count}")
          EOF
