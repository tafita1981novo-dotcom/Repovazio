name: "🏆 Vídeo 1 V9 Máximo — CRF=18"

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 📦 Deps
        run: |
          pip install --quiet requests Pillow
          sudo apt-get install -y ffmpeg --quiet 2>/dev/null
      - name: 🏆 Render V9 Máximo
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/render_683_v9_max.py
