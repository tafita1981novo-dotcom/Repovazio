name: 🔴 LIVE 24/7 — Unificada 15 Idiomas (DEFINITIVO)

on:
  workflow_dispatch:
    inputs:
      duration_h: {default: '6', description: 'Hours per cycle'}
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 6 * * *'
    - cron: '0 12 * * *'
    - cron: '0 18 * * *'

concurrency:
  group: live-final-24h
  cancel-in-progress: true

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 410
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - name: Install deps
        run: |
          pip install imageio-ffmpeg --quiet
          sudo apt-get update -qq && sudo apt-get install -y ffmpeg 2>/dev/null || true
          ffmpeg -version 2>&1 | head -1
          python3 -c "import imageio_ffmpeg; print('imageio:', imageio_ffmpeg.get_ffmpeg_exe())"
      - name: 🔴 LIVE Unificada Final
        timeout-minutes: 400
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          DURATION_H: ${{ inputs.duration_h || '6' }}
          # Forçar system ffmpeg em vez do imageio_ffmpeg
          USE_SYSTEM_FFMPEG: 'true'
        run: python3 scripts/live_ok.py
