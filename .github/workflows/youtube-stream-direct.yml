name: 🔴 YouTube Live 24/7 Stream
on:
  schedule:
    - cron: '10 */6 * * *'
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - name: Verificar ffmpeg
        run: |
          which ffmpeg && ffmpeg -version | head -1
          echo "Runner OK: $(date -u)"

      - name: 🔴 Stream 432Hz Binaural (6h cycle)
        env:
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          set +e
          echo "=== Iniciando stream 432Hz binaural ==="
          echo "Hora: $(date -u)"
          echo "IP runner: $(curl -s ifconfig.me 2>/dev/null || echo 'n/a')"
          
          # Binaural 432Hz: L=400Hz R=432Hz → beat 32Hz (alpha/gamma)
          # RTMPS port 443 bypassa bloqueios de porta 1935
          # -t 21000 = 350 minutos = 5h50m (< 6h limite GH Actions)
          ffmpeg -hide_banner -loglevel warning \
            -f lavfi -i "color=c=black:s=1280x720:r=25" \
            -f lavfi -i "sine=frequency=400:sample_rate=44100" \
            -f lavfi -i "sine=frequency=432:sample_rate=44100" \
            -filter_complex "[1:a][2:a]amerge=inputs=2[stereo]" \
            -map 0:v -map "[stereo]" \
            -c:v libx264 -preset ultrafast -tune stillimage \
            -g 50 -keyint_min 50 \
            -b:v 500k -maxrate 500k -bufsize 1000k \
            -pix_fmt yuv420p \
            -c:a aac -b:a 128k \
            -t 21000 \
            -f flv "rtmps://a.rtmp.youtube.com:443/live2/${YOUTUBE_STREAM_KEY}"
          
          EXIT=$?
          echo "=== Stream finalizado: exit=$EXIT hora=$(date -u) ==="
