name: DBN Upload 12h

on:
  workflow_dispatch:

jobs:
  generate-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install numpy requests
          sudo apt-get install -y ffmpeg

      - name: Gerar e publicar DBN 12h
        env:
          YT_CLIENT_ID_2:     ${{ secrets.YT_CLIENT_ID_2 }}
          YT_CLIENT_SECRET_2: ${{ secrets.YT_CLIENT_SECRET_2 }}
          YOUTUBE_RT_DBN:     ${{ secrets.YOUTUBE_RT_DBN }}
        run: python scripts/upload_dbn.py

      - name: Salvar video ID
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dbn-video-id
          path: dbn_video_id.txt
          if-no-files-found: ignore
