name: WhatsApp Produto + Instagram Reels

on:
  workflow_dispatch:
  schedule:
    - cron: "30 19 * * *"  # 19:30 BRT = 22:30 UTC (horário entrega WhatsApp)

jobs:
  whatsapp-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: |
          sudo apt-get install -y ffmpeg > /dev/null 2>&1
          pip install requests edge-tts --break-system-packages
      - name: "Gerar áudio do dia — Psicologia Para Dormir"
        env:
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python3 scripts/whatsapp_produto.py || true
        continue-on-error: true
      - name: "Gerar legendas Instagram Reels"
        env:
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python3 scripts/instagram_reels_producer.py || true
        continue-on-error: true
