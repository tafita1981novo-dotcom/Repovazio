
name: LIVE Diagnóstico RTMP
on:
  workflow_dispatch:
jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install imageio-ffmpeg --quiet
      - name: Diagnóstico RTMP
        run: python3 scripts/live_diag.py
