name: Update YT Secret from Supabase
# Disparado pela Edge Function yt-oauth após OAuth bem-sucedido
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-secret:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ler YT_REFRESH_TOKEN do Supabase e atualizar GitHub Secret
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "=== Lendo YT_REFRESH_TOKEN do Supabase ia_cache ==="
          REFRESH_TOKEN=$(curl -sf \
            "${SUPABASE_URL}/rest/v1/ia_cache?cache_key=eq.secret:YT_REFRESH_TOKEN&select=value" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['value'] if d else '')" 2>/dev/null || echo "")

          CLIENT_ID=$(curl -sf \
            "${SUPABASE_URL}/rest/v1/ia_cache?cache_key=eq.secret:YT_CLIENT_ID&select=value" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['value'] if d else '')" 2>/dev/null || echo "")

          CLIENT_SECRET=$(curl -sf \
            "${SUPABASE_URL}/rest/v1/ia_cache?cache_key=eq.secret:YT_CLIENT_SECRET&select=value" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['value'] if d else '')" 2>/dev/null || echo "")

          if [ -z "$REFRESH_TOKEN" ]; then
            echo "ERROR: YT_REFRESH_TOKEN não encontrado no Supabase"
            exit 1
          fi

          echo "=== Atualizando GitHub Secrets ==="
          echo "$REFRESH_TOKEN" | gh secret set YT_REFRESH_TOKEN --repo tafita81/Repovazio
          echo "YT_REFRESH_TOKEN atualizado!"

          if [ -n "$CLIENT_ID" ]; then
            echo "$CLIENT_ID" | gh secret set YT_CLIENT_ID --repo tafita81/Repovazio
            echo "YT_CLIENT_ID atualizado!"
          fi

          if [ -n "$CLIENT_SECRET" ]; then
            echo "$CLIENT_SECRET" | gh secret set YT_CLIENT_SECRET --repo tafita81/Repovazio
            echo "YT_CLIENT_SECRET atualizado!"
          fi

          echo "=== Disparando distribute workflow ==="
          gh workflow run distribute.yml --repo tafita81/Repovazio
          echo "Distribute disparado — 134 vídeos sendo publicados!"
