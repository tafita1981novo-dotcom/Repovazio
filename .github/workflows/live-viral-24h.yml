name: 🔴 Live Viral 24/7 — psicologia.doc (Broadcast Quality)

on:
  schedule:
    # 4x ao dia: horários de pico brasileiro + madrugada para audiência noturna
    - cron: '0 0 * * *'    # 21:00 BRT — prime time noturno
    - cron: '0 6 * * *'    # 03:00 BRT — audiência insônia
    - cron: '0 12 * * *'   # 09:00 BRT — manhã de trabalho
    - cron: '0 21 * * *'   # 18:00 BRT — prime time tarde
  workflow_dispatch:
    inputs:
      horas:
        description: 'Duração em horas (máx 6)'
        default: '6'
        required: false
      tema:
        description: 'Tema inicial (narcisismo/ansiedade/trauma/livre)'
        default: 'livre'
        required: false

jobs:
  live_broadcast:
    runs-on: ubuntu-latest
    timeout-minutes: 375  # 6h + margem

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: 🛠️ Instalar dependências broadcast
        run: |
          sudo apt-get install -y ffmpeg > /dev/null 2>&1
          pip install edge-tts requests pillow --break-system-packages -q
          # Verificar qualidade do ffmpeg
          ffmpeg -version | head -2
          echo "✅ FFmpeg pronto para broadcast"
          
      - name: 🎨 Gerar banco de imagens virais (Pollinations FLUX)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python3 - << 'PYEOF'
          import os, urllib.request, urllib.parse, pathlib, time
          TMP = pathlib.Path("/tmp/live_psi")
          TMP.mkdir(exist_ok=True)
          
          temas = ["narcisismo psicologia", "ansiedade mental", "trauma infância", 
                   "manipulação emocional", "autossabotagem", "relacionamento tóxico"]
          
          print("Pré-gerando imagens virais via Pollinations FLUX...")
          for i, tema in enumerate(temas):
              prompt = urllib.parse.quote(
                  f"masterpiece kawaii chibi anime illustration {tema} dark atmospheric "
                  f"purple neon glow cinematic portrait 9:16 ### text watermark nsfw"
              )
              url = f"https://image.pollinations.ai/prompt/{prompt}?width=1080&height=1920&seed={9001+i*77}&nologo=true"
              try:
                  with urllib.request.urlopen(url, timeout=60) as r:
                      data = r.read()
                  if len(data) > 5000:
                      (TMP / f"bg_{i}.jpg").write_bytes(data)
                      print(f"  ✅ {tema}: {len(data)//1024}KB")
              except Exception as e:
                  print(f"  ⚠️  {tema}: {e}")
              time.sleep(2)
          
          imgs = list(TMP.glob("bg_*.jpg"))
          print(f"Total: {len(imgs)} imagens geradas")
          PYEOF
          
      - name: 🔴 Live Stream Broadcast 4500kbps
        env:
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HOURS: ${{ inputs.horas || '6' }}
          TEMA_INICIAL: ${{ inputs.tema || 'livre' }}
        run: |
          # Verificar stream key
          if [ -z "$YOUTUBE_STREAM_KEY" ]; then
            echo "❌ YOUTUBE_STREAM_KEY não configurado"
            echo "Acesse: YouTube Studio → Ir ao vivo → Stream Key"
            exit 1
          fi
          
          python3 scripts/live_psicologia_viral.py || true
        continue-on-error: true
        
      - name: 📊 Relatório da Live
        if: always()
        run: |
          echo "## 🔴 Live Stream Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Métrica | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Canal | @psidanicoelho |" >> $GITHUB_STEP_SUMMARY
          echo "| Qualidade | 1080x1920 @ 4500kbps H.264 |" >> $GITHUB_STEP_SUMMARY
          echo "| Áudio | AAC 192kbps Stereo 48kHz |" >> $GITHUB_STEP_SUMMARY
          echo "| Conteúdo | Gerado por Groq + Pollinations |" >> $GITHUB_STEP_SUMMARY
          echo "| Temas | Narcisismo, Ansiedade, Trauma, Manipulação |" >> $GITHUB_STEP_SUMMARY
