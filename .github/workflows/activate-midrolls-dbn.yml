name: Activate Midrolls DBN

on:
  workflow_dispatch:

jobs:
  activate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - name: Ativar mid-rolls DBN
        env:
          YT_CLIENT_ID_2:     ${{ secrets.YT_CLIENT_ID_2 }}
          YT_CLIENT_SECRET_2: ${{ secrets.YT_CLIENT_SECRET_2 }}
          YOUTUBE_RT_DBN:     ${{ secrets.YOUTUBE_RT_DBN }}
        run: python scripts/activate_midrolls_dbn.py
