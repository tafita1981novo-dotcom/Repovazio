name: 🎨 Channel Branding — Banner + Perfil + SEO (Domingos)

on:
  schedule:
    - cron: '0 3 * * 0'   # Domingo 03:00 UTC
  workflow_dispatch:

jobs:
  branding:
    name: 🎨 Update Branding
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install Pillow --break-system-packages -q

      - name: 🎨 Atualizar branding
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
        run: python3 scripts/channel_branding.py
