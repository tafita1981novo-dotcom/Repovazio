name: criar-broadcast-unico
on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'   # Tenta a cada 30min até funcionar

jobs:
  criar:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Criar 1 broadcast EN (retry automático)
        env:
          YT_CLIENT_ID:     ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          GH_PAT:           ${{ secrets.GH_PAT }}
        run: python3 scripts/limpar_broadcasts.py
