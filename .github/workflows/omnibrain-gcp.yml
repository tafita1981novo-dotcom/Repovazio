name: OMNIBRAIN — GCP VM Fetch

on:
  workflow_dispatch:
    inputs:
      rounds:
        description: 'Quantos rounds de 50 vídeos'
        default: '52'

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 340

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GCP_SSH_KEY }}" > ~/.ssh/vm
          chmod 600 ~/.ssh/vm
          ssh-keyscan -H 34.148.152.96 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy script na VM
        run: |
          scp -i ~/.ssh/vm -o StrictHostKeyChecking=no \
            omnibrain/fetch_gcp.py \
            rafael@34.148.152.96:/home/rafael/omnibrain_fetch.py

      - name: Instala deps na VM
        run: |
          ssh -i ~/.ssh/vm -o StrictHostKeyChecking=no rafael@34.148.152.96 \
            "pip3 install yt-dlp requests --quiet --break-system-packages 2>/dev/null; yt-dlp --version"

      - name: Roda fetcher
        run: |
          ssh -i ~/.ssh/vm -o StrictHostKeyChecking=no rafael@34.148.152.96 << 'SSH'
            export SUPABASE_URL="${{ secrets.SUPABASE_URL }}"
            export SUPABASE_KEY="${{ secrets.SUPABASE_KEY2 }}"
            export BATCH_SIZE="50"
            export MAX_WORKERS="5"
            export COOKIES_FILE="/home/rafael/yt_cookies.txt"
            python3 /home/rafael/omnibrain_fetch.py 2>&1
          SSH
