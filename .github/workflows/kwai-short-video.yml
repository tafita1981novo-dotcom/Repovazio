name: Kwai Short Video Renderer — 60-90s

on:
  workflow_dispatch:
  schedule:
    - cron: "30 10,18 * * *"  # 2x/dia, 30min após kwai-affiliate

jobs:
  kwai-video:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: |
          sudo apt-get install -y ffmpeg > /dev/null 2>&1
          pip install requests edge-tts --break-system-packages
      - name: Kwai Short Video Render
        env:
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python3 scripts/kwai_short_video_renderer.py || true
        continue-on-error: true
