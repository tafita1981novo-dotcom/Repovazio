name: diag-supabase
on:
  workflow_dispatch:
jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Diagnóstico Supabase
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 << 'EOF'
          import os, urllib.request, urllib.error, json

          SBU = os.environ["SUPABASE_URL"].rstrip("/")
          SBK = os.environ["SUPABASE_SERVICE_KEY"]
          H   = {"apikey": SBK, "Authorization": "Bearer " + SBK, "Content-Type": "application/json"}

          print(f"SBU: {SBU}")
          print(f"SBK prefix: {SBK[:20]}...")

          for table in ["research_opportunities", "content_pipeline", "strategy_decisions"]:
              url = SBU + "/rest/v1/" + table + "?select=id&limit=1"
              req = urllib.request.Request(url, headers=H)
              try:
                  with urllib.request.urlopen(req, timeout=20) as r:
                      raw = r.read()
                      data = json.loads(raw) if raw.strip() else []
                      print(f"  OK {table}: {r.status} ({len(data)} rows)")
              except urllib.error.HTTPError as e:
                  print(f"  HTTP {e.code} {table}: {e.read().decode()[:100]}")
              except Exception as e:
                  print(f"  FAIL {table}: {str(e)[:100]}")
          EOF
