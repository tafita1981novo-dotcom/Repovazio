name: Publicar Videos Virais no YouTube (>=95%)

on:
  workflow_dispatch:
    inputs:
      max_videos:
        description: Numero de videos para publicar por run
        default: '3'
        required: false
  schedule:
    - cron: '0 18 * * *'   # Diariamente 15h BR (18h UTC) — horario de pico

concurrency:
  group: youtube-publisher-v6
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Instalar dependencias
        run: pip install requests --quiet

      - name: Publicar no YouTube
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          MAX_VIDEOS: ${{ inputs.max_videos || '3' }}
        run: |
          echo "Publicando videos com viral score >= 95%..."
          python3 scripts/youtube_publisher_v6.py
