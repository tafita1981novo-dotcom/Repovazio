name: Publicador Automático — Canal Principal

on:
  workflow_dispatch:
    inputs:
      max_videos: {default: '6', description: 'Max uploads (6=max quota diária)'}
  schedule:
    - cron: '15 0 * * *'   # 00h15 UTC — logo após reset quota YT API
    - cron: '0 18 * * *'   # 18h UTC = 15h BR — horário pico

concurrency:
  group: youtube-publisher
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install --quiet requests

      - name: Publicar vídeos no YouTube
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          MAX_VIDEOS: ${{ inputs.max_videos || '6' }}
        run: python3 scripts/smart_publisher_v2.py
