name: 🚀 Publicador SEO Global — Canal Principal

on:
  workflow_dispatch:
    inputs:
      max_videos:
        default: '6'
        description: 'Max uploads (quota=10k/dia, cada upload=1600 units)'
  schedule:
    - cron: '15 0 * * *'   # 21h15 BR — logo após reset quota YouTube API
    - cron: '0 18 * * *'   # 15h BR — pico de viewers no Brasil

concurrency:
  group: publisher-seo
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install --quiet requests

      - name: 🚀 Publicar com SEO Global Otimizado
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          MAX_VIDEOS: ${{ inputs.max_videos || '6' }}
        run: python3 scripts/publisher_seo_v1.py
