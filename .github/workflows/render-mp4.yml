name: Render MP4
on:
  workflow_dispatch:
    inputs:
      audio_url:
        required: true
      pipeline_id:
        required: true
      title:
        required: true
      style:
        default: 'documentary'
      short_id:
        default: ''

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Setup FFmpeg
        run: sudo apt-get install -y ffmpeg python3-pip python3-pil inkscape

      - name: Generate background
        run: |
          set -e
          python3 << 'PYEOF'
          import os
          style=os.environ.get('STYLE','documentary')
          title=os.environ.get('TITLE','Psicologia')
          BG={'documentary':'#0a0a1a','cartoon':'#6c5ce7','cinematic_case':'#0d0d0d','shorts_vertical':'#000000','series_binge':'#0a0a1a'}
          ACC={'documentary':'#9b59b6','cartoon':'#fdcb6e','cinematic_case':'#e74c3c','shorts_vertical':'#ff4757','series_binge':'#9b59b6'}
          bg=BG.get(style,'#0a0a1a');acc=ACC.get(style,'#9b59b6')
          W,H=(1080,1920) if style=='shorts_vertical' else (1920,1080)
          tc=title[:60].replace('&','&amp;').replace('<','&lt;').replace('>','&gt;')
          svg=f'''<svg xmlns='http://www.w3.org/2000/svg' width='{W}' height='{H}'>
          <defs><linearGradient id='g' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' style='stop-color:{bg}'/><stop offset='100%' style='stop-color:{bg}99'/></linearGradient><filter id='blur'><feGaussianBlur stdDeviation='40'/></filter></defs>
          <rect width='{W}' height='{H}' fill='url(#g)'/>
          <circle cx='{W//2}' cy='{H//3}' r='{min(W,H)//4}' fill='{acc}' opacity='0.08' filter='url(#blur)'/>
          <text x='{W//2}' y='{H//10}' font-family='Arial Black' font-size='{W//60}' fill='{acc}' text-anchor='middle' letter-spacing='10' opacity='0.7'>PSICOLOGIA.DOC</text>
          <text x='{W//2}' y='{H//2}' font-family='Georgia' font-size='{W//22 if len(title)>40 else W//18}' fill='white' text-anchor='middle' dominant-baseline='middle' font-weight='bold'>{tc}</text>
          <rect x='{W//2-80}' y='{H//2+W//15}' width='160' height='5' fill='{acc}' rx='3'/></svg>'''
          open('bg.svg','w').write(svg);print(f'SVG {W}x{H}')
          PYEOF
        env:
          STYLE: ${{ inputs.style }}
          TITLE: ${{ inputs.title }}

      - name: SVG to PNG
        run: |
          set -e
          inkscape --export-type=png --export-filename=bg.png --export-width=1920 --export-height=1080 bg.svg

      - name: Download audio
        run: |
          set -e
          wget -q -O audio.mp3 '${{ inputs.audio_url }}'
          ls -lh audio.mp3

      - name: Render MP4
        run: |
          set -e
          STYLE='${{ inputs.style }}'
          if [ "$STYLE" = "shorts_vertical" ]; then VF="scale=1080:1920,setsar=1"; else VF="scale=1920:1080,setsar=1"; fi
          ffmpeg -y -loop 1 -framerate 1 -i bg.png -i audio.mp3 -vf "$VF" -c:v libx264 -preset ultrafast -tune stillimage -pix_fmt yuv420p -c:a aac -b:a 128k -shortest -movflags +faststart out.mp4
          ls -lh out.mp4

      - name: Upload via proxy
        run: |
          set -e
          PIPELINE_ID='${{ inputs.pipeline_id }}'
          SHORT_ID='${{ inputs.short_id }}'
          TITLE='${{ inputs.title }}'
          SAFE=$(echo "$TITLE" | tr ' ' '_' | tr -cd '[a-zA-Z0-9_]' | head -c 30)
          TS=$(date +%s)
          FN="${TS}_${SAFE}.mp4"
          PROXY_URL="$SUPABASE_URL/functions/v1/mp4-upload?filename=$FN&pipeline_id=$PIPELINE_ID"
          if [ -n "$SHORT_ID" ]; then PROXY_URL="$PROXY_URL&short_id=$SHORT_ID"; fi
          echo "⏫ POST -> $PROXY_URL"
          HTTP=$(curl -s -o resp.json -w "%{http_code}" -X POST "$PROXY_URL" -H "Content-Type: application/octet-stream" --data-binary @out.mp4)
          echo "HTTP $HTTP"
          cat resp.json
          echo
          if [ "$HTTP" -ne 200 ]; then exit 1; fi
          echo "✅ Upload completo"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
