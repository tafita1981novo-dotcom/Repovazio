name: Render MP4

on:
  workflow_dispatch:
    inputs:
      audio_url:
        description: 'URL do audio MP3 publico'
        required: true
      pipeline_id:
        description: 'ID do pipeline'
        required: true
      title:
        description: 'Titulo do video'
        required: true
      style:
        description: 'Estilo'
        default: 'documentary'
      short_id:
        description: 'ID do short'
        default: ''
      video_html_url:
        description: 'URL do HTML para renderizar (opcional, busca do DB se vazio)'
        default: ''

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Setup deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg curl jq

      - name: Setup Node + Playwright
        run: |
          set -e
          npm init -y >/dev/null
          npm install playwright@1.48.0 --silent
          npx playwright install chromium --with-deps >/dev/null 2>&1 || npx playwright install chromium

      - name: Resolve HTML URL and duration
        id: meta
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PIPELINE_ID: ${{ inputs.pipeline_id }}
          INPUT_HTML: ${{ inputs.video_html_url }}
          STYLE: ${{ inputs.style }}
        run: |
          set -e
          if [ -n "$INPUT_HTML" ]; then
            HTML_URL="$INPUT_HTML"
            DUR=600  # default 10min se não tem do DB
          else
            ROW=$(curl -sf "$SUPABASE_URL/rest/v1/content_pipeline?id=eq.$PIPELINE_ID&select=metadata" \
              -H "apikey: $SUPABASE_SERVICE_KEY" -H "Authorization: Bearer $SUPABASE_SERVICE_KEY")
            HTML_URL=$(echo "$ROW" | jq -r '.[0].metadata.video_html_url // ""')
            DUR=$(echo "$ROW" | jq -r '.[0].metadata.total_duration_seconds // 600')
          fi
          if [ -z "$HTML_URL" ] || [ "$HTML_URL" = "null" ]; then
            echo "❌ video_html_url não encontrado"; exit 1
          fi
          # Calcular duração real do áudio (que é a fonte de verdade)
          curl -sf -o /tmp/audio.mp3 "${{ inputs.audio_url }}"
          AUDIO_DUR=$(ffprobe -v quiet -show_entries format=duration -of csv=p=0 /tmp/audio.mp3 | cut -d. -f1)
          # Usa max(html_duration, audio_duration) + 2s buffer
          if [ "$AUDIO_DUR" -gt "$DUR" ]; then DUR=$AUDIO_DUR; fi
          DUR=$((DUR + 2))
          echo "html_url=$HTML_URL" >> $GITHUB_OUTPUT
          echo "duration=$DUR" >> $GITHUB_OUTPUT
          echo "✅ HTML: $HTML_URL"
          echo "✅ Duration: ${DUR}s"

      - name: Record video with Playwright
        env:
          HTML_URL: ${{ steps.meta.outputs.html_url }}
          DURATION: ${{ steps.meta.outputs.duration }}
          STYLE: ${{ inputs.style }}
        run: |
          set -e
          cat > record.js <<'JSEOF'
          const { chromium } = require('playwright');
          const fs = require('fs');

          const HTML_URL = process.env.HTML_URL;
          const DURATION = parseInt(process.env.DURATION) || 60;
          const STYLE = process.env.STYLE || 'documentary';
          const isShort = STYLE === 'shorts_vertical';
          const W = isShort ? 1080 : 1920;
          const H = isShort ? 1920 : 1080;

          (async () => {
            console.log(`🎬 Recording ${HTML_URL} for ${DURATION}s at ${W}x${H} 30fps`);
            const browser = await chromium.launch({
              args: ['--no-sandbox','--disable-dev-shm-usage','--disable-gpu',
                     '--autoplay-policy=no-user-gesture-required',
                     '--disable-features=IsolateOrigins,site-per-process']
            });
            const ctx = await browser.newContext({
              viewport: { width: W, height: H },
              recordVideo: { dir: './rec/', size: { width: W, height: H } }
            });
            const page = await ctx.newPage();
            await page.goto(HTML_URL, { waitUntil: 'networkidle', timeout: 60000 });
            // Aguarda animações iniciarem
            await page.waitForTimeout(1500);
            // Grava pela duração total
            await page.waitForTimeout(DURATION * 1000);
            await ctx.close();
            await browser.close();
            // Encontra o webm gerado
            const files = fs.readdirSync('./rec/').filter(f => f.endsWith('.webm'));
            if (files.length === 0) throw new Error('Sem video gerado');
            fs.renameSync('./rec/' + files[0], 'video.webm');
            console.log(`✅ Gravado: video.webm`);
          })().catch(e => { console.error('❌', e); process.exit(1); });
          JSEOF
          mkdir -p rec
          node record.js
          ls -lh video.webm

      - name: Combine video + audio with ffmpeg
        env:
          STYLE: ${{ inputs.style }}
        run: |
          set -e
          if [ "$STYLE" = "shorts_vertical" ]; then
            SCALE="scale=1080:1920:force_original_aspect_ratio=decrease,pad=1080:1920:(ow-iw)/2:(oh-ih)/2:black,setsar=1"
          else
            SCALE="scale=1920:1080:force_original_aspect_ratio=decrease,pad=1920:1080:(ow-iw)/2:(oh-ih)/2:black,setsar=1"
          fi
          # Encode final: H.264 1080p 30fps + AAC stereo 192kbps
          ffmpeg -y \
            -i video.webm \
            -i /tmp/audio.mp3 \
            -filter_complex "[0:v]$SCALE,format=yuv420p,fps=30[v]" \
            -map "[v]" -map 1:a \
            -c:v libx264 -preset medium -crf 22 \
            -c:a aac -b:a 192k -ar 48000 -ac 2 \
            -shortest -movflags +faststart \
            output.mp4
          ls -lh output.mp4
          echo "📊 Metadados finais:"
          ffprobe -v error -show_entries stream=codec_name,width,height,r_frame_rate,bit_rate,sample_rate,channels -show_entries format=duration,size -of default=noprint_wrappers=0 output.mp4

      - name: Upload MP4 to Supabase Storage and PATCH database
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PIPELINE_ID: ${{ inputs.pipeline_id }}
          SHORT_ID: ${{ inputs.short_id }}
          TITLE: ${{ inputs.title }}
        run: |
          set -e
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_KEY" ]; then
            echo "❌ secrets ausentes"; exit 1
          fi
          SAFE_TITLE=$(echo "$TITLE" | tr ' ' '_' | tr -cd '[:alnum:]_' | head -c 30)
          TS=$(date +%s)
          FILENAME="${TS}_${SAFE_TITLE}.mp4"
          MP4_URL="$SUPABASE_URL/storage/v1/object/public/videos/$FILENAME"
          echo "⬆️ Uploading videos/$FILENAME"
          UP_HTTP=$(curl -s -o /tmp/up.json -w "%{http_code}" \
            -X POST "$SUPABASE_URL/storage/v1/object/videos/$FILENAME" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: video/mp4" \
            -H "x-upsert: true" \
            --data-binary @output.mp4)
          echo "Upload HTTP: $UP_HTTP"
          cat /tmp/up.json 2>/dev/null || true
          echo
          if [ "$UP_HTTP" -lt 200 ] || [ "$UP_HTTP" -ge 300 ]; then
            echo "❌ Upload Storage falhou"; exit 1
          fi
          echo "✅ MP4_URL=$MP4_URL"
          cat > /tmp/patch.json <<JSON_EOF
          {"mp4_url":"$MP4_URL","status":"mp4_ready"}
          JSON_EOF
          if [ -n "$PIPELINE_ID" ]; then
            P_HTTP=$(curl -s -o /tmp/p.json -w "%{http_code}" \
              -X PATCH "$SUPABASE_URL/rest/v1/content_pipeline?id=eq.$PIPELINE_ID" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
              -H "apikey: $SUPABASE_SERVICE_KEY" \
              -H "Content-Type: application/json" \
              -H "Prefer: return=minimal" \
              --data @/tmp/patch.json)
            echo "Pipeline $PIPELINE_ID PATCH HTTP: $P_HTTP"
            cat /tmp/p.json 2>/dev/null || true
          fi
          if [ -n "$SHORT_ID" ]; then
            S_HTTP=$(curl -s -o /tmp/s.json -w "%{http_code}" \
              -X PATCH "$SUPABASE_URL/rest/v1/shorts_pipeline?id=eq.$SHORT_ID" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
              -H "apikey: $SUPABASE_SERVICE_KEY" \
              -H "Content-Type: application/json" \
              -H "Prefer: return=minimal" \
              --data @/tmp/patch.json)
            echo "Short $SHORT_ID PATCH HTTP: $S_HTTP"
          fi
