name: Upload Noise MP4s para YouTube

on:
  workflow_dispatch:

jobs:
  dbn:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Instalar dependencias
        run: |
          pip install requests -q
          sudo apt-get install -y ffmpeg -q
      - name: Upload DBN
        env:
          CLIENT_ID: ${{ secrets.YT_CLIENT_ID_2 }}
          CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET_2 }}
          REFRESH_TOKEN: ${{ secrets.YOUTUBE_RT_DBN }}
          CANAL: dbn
          CHANNEL_ID: UCD4LLFnsiVzA-DeSN6oaUzg
          TITULO: "Brown Noise 12 Hours | Deep Sleep, ADHD Focus & Study Music | Black Screen No Ads"
          TAGS: "brown noise,brown noise 12 hours,deep sleep,ADHD focus,sleep sounds,black screen,study music,white noise,tinnitus relief,12 hours,ADHD,concentration"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: tafita1981novo-dotcom/Repovazio
          ASSET_NAME: DBN.MP4
          SUPABASE_URL: https://tpjvalzwkqwttvmszvie.supabase.co
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/noise_upload_from_release.py
  adhd:
    runs-on: ubuntu-latest
    timeout-minutes: 60
