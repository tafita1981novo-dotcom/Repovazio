name: 🎬 Render Long V6 — 8-15min com Episódios e Mid-rolls

on:
  workflow_dispatch:
    inputs:
      video_id: {required: false}
  schedule:
    - cron: '0 * * * *'

concurrency:
  group: render-long-v6
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Instalar dependências
        run: pip install imageio-ffmpeg Pillow edge-tts --quiet && python3 -c "import imageio_ffmpeg; print('FFmpeg OK')"

      - name: Renderizar Long Form V6
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          VIDEO_ID: ${{ inputs.video_id || '' }}
        run: python3 scripts/render_long_v6.py
