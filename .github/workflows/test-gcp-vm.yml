name: Test GCP VM Connection

on:
  workflow_dispatch:
  repository_dispatch:
    types: [test-gcp-vm]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Test porta 22
        run: |
          nc -zv -w 8 34.148.152.96 22 && echo "✅ Porta 22 ABERTA" || echo "❌ Porta 22 fechada"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.GCP_SSH_KEY }}" > ~/.ssh/vm
          chmod 600 ~/.ssh/vm
          ssh-keyscan -H 34.148.152.96 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: SSH test
        run: |
          ssh -i ~/.ssh/vm \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            -o BatchMode=yes \
            rafael@34.148.152.96 "
              echo '=== VM ONLINE ==='
              hostname
              uptime -p
              free -h | grep Mem
              df -h / | tail -1
              python3 --version
              pip3 show yt-dlp 2>/dev/null | grep Version || echo 'yt-dlp: não instalado'
            "
