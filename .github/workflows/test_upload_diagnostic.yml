name: Test Upload Rain Diagnostic

on:
  workflow_dispatch:

jobs:
  test-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Test rain token via curl
        env:
          YT_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID_NEW }}
          YT_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET_NEW }}
          YT_RT_RAIN: ${{ secrets.YOUTUBE_RT_RAIN }}
          YT_RT_BSN: ${{ secrets.YOUTUBE_RT_BSN }}
          YT_RT_PINK: ${{ secrets.YOUTUBE_RT_PINK }}
        run: |
          echo "=== Testing RAIN token ===" 
          RAIN_RESP=$(curl -s -X POST https://oauth2.googleapis.com/token             -d "client_id=$YT_CLIENT_ID&client_secret=$YT_CLIENT_SECRET&refresh_token=$YT_RT_RAIN&grant_type=refresh_token")
          RAIN_AT=$(echo $RAIN_RESP | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('access_token','ERROR:'+d.get('error','?'))[:50])")
          echo "RAIN AT: $RAIN_AT"
          
          echo "=== Testing BSN token ==="
          BSN_RESP=$(curl -s -X POST https://oauth2.googleapis.com/token             -d "client_id=$YT_CLIENT_ID&client_secret=$YT_CLIENT_SECRET&refresh_token=$YT_RT_BSN&grant_type=refresh_token")
          BSN_AT=$(echo $BSN_RESP | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('access_token','ERROR:'+d.get('error','?'))[:50])")
          echo "BSN AT: $BSN_AT"
          
          echo "=== Testing PINK token ==="
          PINK_RESP=$(curl -s -X POST https://oauth2.googleapis.com/token             -d "client_id=$YT_CLIENT_ID&client_secret=$YT_CLIENT_SECRET&refresh_token=$YT_RT_PINK&grant_type=refresh_token")
          PINK_AT=$(echo $PINK_RESP | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('access_token','ERROR:'+d.get('error','?'))[:50])")
          echo "PINK AT: $PINK_AT"
          
          # Se algum token OK, testar qual canal representa
          if [[ "$RAIN_AT" != ERROR* ]]; then
            RAIN_CH=$(curl -s -H "Authorization: Bearer $(echo $RAIN_RESP | python3 -c 'import sys,json; print(json.load(sys.stdin).get("access_token",""))')"               "https://www.googleapis.com/youtube/v3/channels?part=snippet&mine=true")
            echo "RAIN CHANNEL: $(echo $RAIN_CH | python3 -c 'import sys,json; d=json.load(sys.stdin); items=d.get("items",[]); print(items[0].get("snippet",{}).get("title","?") + " " + items[0].get("id","?") if items else "NO_CHANNEL")')"
          fi
