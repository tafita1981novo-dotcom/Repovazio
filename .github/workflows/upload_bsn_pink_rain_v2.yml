with open(vf,"rb") as f:
  while up<fs:
    ch=f.read(CHUNK); end=up+len(ch)-1
    r3=requests.put(ul,headers={"Content-Range":f"bytes {up}-{end}/{fs}","Content-Type":"video/mp4"},data=ch,timeout=300)
    up+=len(ch); print(f"  {up/fs*100:.0f}% s={r3.status_code}",flush=True)
    if r3.status_code in [200,201]: vid=r3.json(); print(f"✅ PINK ID: {vid.get('id')} mfk={vid.get('status',{}).get('selfDeclaredMadeForKids')}"); break
