name: Upload BSN PINK RAIN V2

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  upload-bsn:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      YT_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID_NEW }}
      YT_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET_NEW }}
      YT_RT: ${{ secrets.YOUTUBE_RT_BSN }}
    steps:
      - name: Download BSN artifact
        uses: actions/download-artifact@v4
        with:
          artifact-ids: 7760929460
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: tafita1981novo-dotcom/Repovazio
      - name: Upload BSN to YouTube
        run: |
          pip install requests -q
          VIDEO_FILE=$(find . -name "*.mp4" -o -name "*.webm" | head -1)
          echo "Video: $VIDEO_FILE | Size: $(du -h $VIDEO_FILE | cut -f1)"
          python3 - << 'PY'
import requests, os, glob, sys
CI=os.environ["YT_CLIENT_ID"]; CS=os.environ["YT_CLIENT_SECRET"]; RT=os.environ["YT_RT"]
r=requests.post("https://oauth2.googleapis.com/token",data={"client_id":CI,"client_secret":CS,"refresh_token":RT,"grant_type":"refresh_token"})
at=r.json().get("access_token")
print(f"AT: {at[:20] if at else 'NONE'} | scope: {r.json().get('scope','?')[:60]}")
if not at: sys.exit(1)
files=glob.glob("**/*.mp4",recursive=True)+glob.glob("**/*.webm",recursive=True)
if not files: print("❌ No file"); sys.exit(1)
vf=files[0]; fs=os.path.getsize(vf); print(f"File: {vf} ({fs/1e6:.0f}MB)")
meta={"snippet":{"title":"Baby White Noise 10 Hours | Black Screen Newborn Sleep","description":"Baby White Noise 10 Hours Black Screen\n#babysleep #whitenoise #newbornsleep","categoryId":"22","tags":["baby sleep","white noise","newborn","black screen"]},"status":{"privacyStatus":"public","selfDeclaredMadeForKids":False}}
r2=requests.post("https://www.googleapis.com/upload/youtube/v3/videos?uploadType=resumable&part=snippet,status",headers={"Authorization":f"Bearer {at}","Content-Type":"application/json","X-Upload-Content-Type":"video/mp4","X-Upload-Content-Length":str(fs)},json=meta)
ul=r2.headers.get("Location"); print(f"Init: {r2.status_code} url={ul[:50] if ul else 'NONE'}")
if not ul: print(r2.text[:200]); sys.exit(1)
CHUNK=64*1024*1024; up=0
with open(vf,"rb") as f:
  while up<fs:
    ch=f.read(CHUNK); end=up+len(ch)-1
    r3=requests.put(ul,headers={"Content-Range":f"bytes {up}-{end}/{fs}","Content-Type":"video/mp4"},data=ch,timeout=300)
    up+=len(ch); print(f"  {up/fs*100:.0f}% s={r3.status_code}",flush=True)
    if r3.status_code in [200,201]: vid=r3.json(); print(f"✅ BSN ID: {vid.get('id')} mfk={vid.get('status',{}).get('selfDeclaredMadeForKids')}"); break
PY

  upload-pink:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: upload-bsn
    env:
      YT_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID_NEW }}
      YT_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET_NEW }}
      YT_RT: ${{ secrets.YOUTUBE_RT_PINK }}
    steps:
      - name: Download PINK artifact
        uses: actions/download-artifact@v4
        with:
          artifact-ids: 7760948379
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: tafita1981novo-dotcom/Repovazio
