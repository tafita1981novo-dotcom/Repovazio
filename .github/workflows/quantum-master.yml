name: Quantum Brain Auto-Combinatorial

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  quantum:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests --break-system-packages

      - name: Run Quantum Brain Expander
        env:
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          NVIDIA_API_KEY:       ${{ secrets.NVIDIA_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 scripts/brain_mass_expander.py

      - name: Report count
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 -c "
import requests, os
sb = os.getenv('SUPABASE_URL','')
sk = os.getenv('SUPABASE_SERVICE_KEY','')
r = requests.get(f'{sb}/rest/v1/api_brain?select=count',
  headers={'apikey':sk,'Authorization':f'Bearer {sk}','Prefer':'count=exact'}, timeout=5)
total = r.headers.get('Content-Range','?/?').split('/')[-1]
print(f'Quantum Brain: {total} APIs')
" || true
