name: QUANTUM BRAIN — Master Orchestrator (Todos Secrets)

on:
  schedule:
    - cron: "0 4,12,20 * * *"  # 4h, 12h, 20h UTC todos os dias
  workflow_dispatch:

jobs:
  quantum_master:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install requests --break-system-packages

      - name: Master Quantum Orchestrator
        env:
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          NVIDIA_API_KEY:      ${{ secrets.NVIDIA_API_KEY }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          ELEVENLABS_API_KEY:  ${{ secrets.ELEVENLABS_API_KEY }}
          HF_TOKEN:            ${{ secrets.HF_TOKEN }}
          DEEPSEEK_API_KEY:    ${{ secrets.DEEPSEEK_API_KEY }}
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python3 scripts/master_quantum_orchestrator.py

      - name: Brain Auto-Expand (rumo 40K)
        env:
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python3 scripts/quantum_brain_engine.py 15

      - name: World Income Engine
        env:
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          NVIDIA_API_KEY:      ${{ secrets.NVIDIA_API_KEY }}
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python3 scripts/world_income_engine.py

      - name: Infinite Idea Engine
        env:
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python3 scripts/infinite_idea_engine.py
