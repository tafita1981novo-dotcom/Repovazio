name: Monetização Anônima — Ads + POD

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7,19 * * *"

jobs:
  gerar-criativos-ads:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests --break-system-packages
      - name: Gerar criativos Meta Ads
        env:
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python3 scripts/meta_ads_creative.py || true
        continue-on-error: true

  gerar-pod-designs:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests --break-system-packages
      - name: Gerar designs print-on-demand
        env:
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python3 scripts/pod_psychology_engine.py || true
        continue-on-error: true
