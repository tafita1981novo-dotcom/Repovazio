name: Live 24H Manager — Frequências + Psicologia Contínua

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1  * * *"   # 22h BRT — inicia bloco SONO 528Hz
    - cron: "0 9  * * *"   # 06h BRT — inicia bloco FOCO 40Hz
    - cron: "0 12 * * *"   # 09h BRT — inicia bloco PSICOLOGIA DARK
    - cron: "0 21 * * *"   # 18h BRT — inicia PRIME TIME

jobs:
  live-24h:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests --break-system-packages
      - run: sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Verificar Stream Key
        run: |
          if [ -z "${{ secrets.YOUTUBE_STREAM_KEY }}" ]; then
            echo "YOUTUBE_STREAM_KEY nao configurado"
            exit 1
          fi
          echo "Stream key OK"

      - name: Live 24H — Agenda por Horário BRT
        env:
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
        run: |
          echo "Iniciando live 24h manager..."
          echo "Agenda: Sono 528Hz(22-6) | Foco 40Hz(6-9,12-15) | Psicologia(9-12,18-21) | Ansiedade 432Hz(15-18) | Cura 174Hz(21-22)"
          timeout 17000 python3 scripts/live_24h_manager.py || echo "Bloco encerrado"
        continue-on-error: true
