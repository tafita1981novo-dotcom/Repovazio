name: Live 24H — Preto Absoluto

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1  * * *"   # 22h BRT inicio sono
    - cron: "0 9  * * *"   # 06h BRT foco
    - cron: "0 12 * * *"   # 09h BRT psicologia
    - cron: "0 21 * * *"   # 18h BRT prime time

# GARANTE que só 1 instância roda por vez
concurrency:
  group: live-stream-unico
  cancel-in-progress: true

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests --break-system-packages -q
      - run: sudo apt-get install -y ffmpeg fonts-dejavu-core -q

      - name: Verificar stream key
        run: |
          if [ -z "${{ secrets.YOUTUBE_STREAM_KEY }}" ]; then
            echo "YOUTUBE_STREAM_KEY nao configurado"
            exit 1
          fi
          echo "Stream key OK"

      - name: Live 24H — Preto Absoluto Sono + Colorido Outros
        env:
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: timeout 17000 python3 scripts/live_24h_manager.py || true
        continue-on-error: true
