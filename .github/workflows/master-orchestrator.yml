name: Master Orchestrator — Todos os Pipelines

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6,14,22 * * *"  # 3x/dia

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: |
          sudo apt-get install -y ffmpeg > /dev/null 2>&1
          pip install requests edge-tts --break-system-packages
      - name: Master Orchestrator
        env:
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          NVIDIA_API_KEY:       ${{ secrets.NVIDIA_API_KEY }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python3 scripts/master_orchestrator.py || true
        continue-on-error: true
