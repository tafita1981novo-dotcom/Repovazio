name: Engine Multilíngue — 8 Idiomas Global

on:
  workflow_dispatch:
    inputs:
      max_per_lang: {default: '1', description: 'Shorts por idioma'}
  schedule:
    - cron: '30 3 * * *'   # 03h30 UTC — logo após reset quota
    - cron: '30 9 * * *'   # 09h30 UTC = 06h30 BR
    - cron: '30 15 * * *'  # 15h30 UTC = 12h30 BR
    - cron: '30 21 * * *'  # 21h30 UTC = 18h30 BR (horário pico BR)

concurrency:
  group: multilingual-engine
  cancel-in-progress: false

jobs:
  multilingual:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Instalar dependências
        run: |
          pip install imageio-ffmpeg Pillow edge-tts --quiet
          sudo apt-get install -y ffmpeg --quiet 2>/dev/null || true

      - name: Gerar e publicar em 8 idiomas
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          MAX_PER_LANG: ${{ inputs.max_per_lang || '1' }}
        run: python3 scripts/multilingual_short_engine.py
