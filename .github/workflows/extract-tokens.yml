name: Extract YT Tokens
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/extract-tokens.yml'
      - 'scripts/extract_tokens.py'

jobs:
  extract:
    runs-on: ubuntu-latest
    env:
      RT_DBN: ${{ secrets.YOUTUBE_RT_DBN }}
      RT_ADHD: ${{ secrets.YOUTUBE_RT_ADHD }}
      RT_WNV: ${{ secrets.YOUTUBE_RT_WNV }}
      RT_BSN: ${{ secrets.YOUTUBE_RT_BSN }}
      RT_PINK: ${{ secrets.YOUTUBE_RT_PINK }}
      RT_TINNITUS: ${{ secrets.YOUTUBE_RT_TINNITUS }}
      RT_RAIN: ${{ secrets.YOUTUBE_RT_RAIN }}
      YT_CID: ${{ secrets.YT_CLIENT_ID_2 }}
      YT_CS: ${{ secrets.YT_CLIENT_SECRET_2 }}
      SB_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - run: pip install requests -q
      - run: python scripts/extract_tokens.py
