name: oracle-provisioner
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  create-vm:
    runs-on: ubuntu-latest
    timeout-minutes: 358
    steps:
      - name: Setup OCI
        env:
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
          SUPPRESS_LABEL_WARNING: "True"
        run: |
          pip3 install oci-cli -q
          mkdir -p ~/.oci ~/.ssh
          printf '%s' "$OCI_PRIVATE_KEY" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          printf '[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=%s\nkey_file=%s\n' \
            "$OCI_USER_OCID" "$OCI_FINGERPRINT" "$OCI_TENANCY_OCID" "$OCI_REGION" \
            "$HOME/.oci/oci_api_key.pem" > ~/.oci/config
          chmod 600 ~/.oci/config
          ssh-keygen -t rsa -b 2048 -f ~/.ssh/oracle_stream -N '' -q
          oci iam availability-domain list \
            --compartment-id "$OCI_TENANCY_OCID" \
            --query 'data[*].name' --raw-output && echo 'Auth OK'

      - name: Criar VM
        env:
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCI_AD: ${{ secrets.OCI_AD }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          SUPABASE_URL: https://tpjvalzwkqwttvmszvie.supabase.co
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
          SUPPRESS_LABEL_WARNING: "True"
        run: |
          set +e

          wa() {
            python3 -c "
import urllib.parse,sys,subprocess,os
enc=urllib.parse.quote(sys.argv[1])
ph=os.environ.get('CALLMEBOT_PHONE','')
ky=os.environ.get('CALLMEBOT_APIKEY','')
if ky and ky!='PENDING_ACTIVATION':
    subprocess.run(['curl','-s',f'https://api.callmebot.com/whatsapp.php?phone={ph}&text={enc}&apikey={ky}','-o','/dev/null'])
" "$1" 2>/dev/null || true
          }

          echo "Buscando imagem Ubuntu 22.04 x86 para E2.1.Micro..."
          IMG_X86=$(oci compute image list \
            --compartment-id "$OCI_TENANCY_OCID" \
            --operating-system 'Canonical Ubuntu' \
            --operating-system-version '22.04' \
            --shape VM.Standard.E2.1.Micro \
            --sort-by TIMECREATED --sort-order DESC \
            --query 'data[0].id' --raw-output 2>/dev/null)
          echo "Imagem x86: ${IMG_X86:-nao_encontrada}"

          ARM_SIZES=("4:24" "2:12" "1:6")
          CRIADO=0
          INSTANCE_ID=""
          SHAPE_USADO=""

          for i in $(seq 1 500); do

            for SIZE in "${ARM_SIZES[@]}"; do
              OCPU="${SIZE%%:*}"; MEM="${SIZE##*:}"
              echo -n "[#$i] ARM ${OCPU}cpu/${MEM}GB -> "
              R=$(oci compute instance launch \
                --compartment-id "$OCI_TENANCY_OCID" \
                --availability-domain "$OCI_AD" \
                --shape VM.Standard.A1.Flex \
                --shape-config "{\"ocpus\":${OCPU},\"memoryInGBs\":${MEM}}" \
                --image-id "$OCI_IMAGE_ID" \
                --subnet-id "$OCI_SUBNET_ID" \
                --assign-public-ip true \
                --ssh-authorized-keys-file ~/.ssh/oracle_stream.pub \
                --display-name "psidoc-arm-${OCPU}cpu" \
                --boot-volume-size-in-gbs 50 \
                --query 'data.id' --raw-output 2>&1)
              if echo "$R" | grep -q 'ocid1.instance'; then
                echo "CRIADA"
                INSTANCE_ID="$R"; SHAPE_USADO="A1.Flex ${OCPU}OCPU/${MEM}GB"; CRIADO=1; break 2
              elif echo "$R" | grep -q 'LimitExceeded'; then
                echo "ja existe ARM"
              elif echo "$R" | grep -q 'Out of host capacity'; then
                echo "sem capacidade"
              else
                echo "erro: ${R:0:60}"
              fi
            done

            [ "$CRIADO" -eq 1 ] && break

            echo -n "[#$i] x86 E2.1.Micro -> "
            if [ -n "$IMG_X86" ] && [ "$IMG_X86" != "null" ]; then
              R=$(oci compute instance launch \
                --compartment-id "$OCI_TENANCY_OCID" \
                --availability-domain "$OCI_AD" \
                --shape VM.Standard.E2.1.Micro \
                --image-id "$IMG_X86" \
                --subnet-id "$OCI_SUBNET_ID" \
                --assign-public-ip true \
                --ssh-authorized-keys-file ~/.ssh/oracle_stream.pub \
                --display-name "psidoc-micro-x86" \
                --boot-volume-size-in-gbs 50 \
                --query 'data.id' --raw-output 2>&1)
              if echo "$R" | grep -q 'ocid1.instance'; then
                echo "CRIADA"
                INSTANCE_ID="$R"; SHAPE_USADO="E2.1.Micro x86"; CRIADO=1; break
              elif echo "$R" | grep -q 'LimitExceeded'; then
                echo "ja existe Micro"
              elif echo "$R" | grep -q 'Out of host capacity'; then
                echo "sem capacidade"
              else
                echo "erro: ${R:0:60}"
              fi
            else
              echo "imagem x86 nao encontrada"
            fi

            [ "$i" -lt 10 ] && sleep 30 || sleep 60
          done

          if [ "$CRIADO" -eq 0 ]; then
            echo "Sem VM — relay 6h"
            curl -s -X POST -H "Authorization: Bearer $GH_PAT" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/tafita81/Repovazio/actions/workflows/oracle-provisioner.yml/dispatches" \
              -d '{"ref":"main"}' && echo "Relay OK"
            exit 0
          fi

          echo ""
          echo "=== VM CRIADA: $INSTANCE_ID ($SHAPE_USADO) ==="
          wa "Oracle VM criada $SHAPE_USADO aguardando IP"
          sleep 240

          IP=""
          for t in $(seq 1 10); do
            IP=$(oci compute instance list-vnics \
              --instance-id "$INSTANCE_ID" \
              --query 'data[0]."public-ip"' --raw-output 2>/dev/null)
            [ -n "$IP" ] && [ "$IP" != "null" ] && break
            echo "IP aguardando ($t/10)..."; sleep 30
          done
          echo "IP: $IP"

          for KV in "oracle_vm_ip:${IP}" "oracle_vm_id:${INSTANCE_ID}"; do
            K="${KV%%:*}"; V="${KV#*:}"
            curl -s -X POST "${SUPABASE_URL}/rest/v1/ia_cache" \
              -H "apikey: ${SUPABASE_ANON_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
              -H "Content-Type: application/json" \
              -H "Prefer: resolution=merge-duplicates" \
              -d "{\"cache_key\":\"${K}\",\"value\":\"${V}\",\"expires_at\":null}" \
              && echo "${K} salvo" || echo "${K} falhou"
          done

          wa "Oracle VM IP ${IP} shape ${SHAPE_USADO} configurando stream"

          [ -z "$IP" ] || [ "$IP" = "null" ] && { wa "ERRO sem IP verifique console.oracle.com"; exit 1; }

          STREAM_OK=0
          for t in $(seq 1 5); do
            ssh -o StrictHostKeyChecking=accept-new \
                -o ConnectTimeout=30 -o ServerAliveInterval=15 \
                -i ~/.ssh/oracle_stream ubuntu@$IP \
                "sudo apt-get update -q && \
                 sudo apt-get install -y ffmpeg wget python3-pip -q && \
                 wget -qO /tmp/s.sh https://raw.githubusercontent.com/tafita81/Repovazio/main/scripts/oracle-forever-live-setup.sh && \
                 chmod +x /tmp/s.sh && \
                 STREAM_KEY='$YOUTUBE_STREAM_KEY' bash /tmp/s.sh && \
                 echo STREAM_OK" && STREAM_OK=1 && break
            echo "SSH $t/5 falhou"; sleep 30
          done

          if [ "$STREAM_OK" -eq 1 ]; then
            wa "STREAM ATIVO IP ${IP} shape ${SHAPE_USADO} psidanicoelho 24h"
          else
            wa "VM OK IP ${IP} SSH falhou acesse manualmente"
          fi
          echo "=== FIM ==="
