name: List YouTube Videos All Channels

on:
  workflow_dispatch:

jobs:
  list-videos:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: List videos from all 7 channels
        env:
          YT_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID_NEW }}
          YT_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET_NEW }}
          YT_RT_DBN: ${{ secrets.YOUTUBE_RT_DBN }}
          YT_RT_ADHD: ${{ secrets.YOUTUBE_RT_ADHD }}
          YT_RT_WNV: ${{ secrets.YOUTUBE_RT_WNV }}
          YT_RT_BSN: ${{ secrets.YOUTUBE_RT_BSN }}
          YT_RT_PINK: ${{ secrets.YOUTUBE_RT_PINK }}
          YT_RT_TINNITUS: ${{ secrets.YOUTUBE_RT_TINNITUS }}
          YT_RT_RAIN: ${{ secrets.YOUTUBE_RT_RAIN }}
        run: |
          python3 - << 'PYEOF2'
          import json, os, urllib.request, urllib.parse

          CID = os.environ["YT_CLIENT_ID"]
          CSC = os.environ["YT_CLIENT_SECRET"]

          CANAIS = {
            "dbn":      "YT_RT_DBN",
            "adhd":     "YT_RT_ADHD",
            "wnv":      "YT_RT_WNV",
            "bsn":      "YT_RT_BSN",
            "pink":     "YT_RT_PINK",
            "tinnitus": "YT_RT_TINNITUS",
            "rain":     "YT_RT_RAIN",
          }

          def get_at(rt):
              d = urllib.parse.urlencode({"client_id":CID,"client_secret":CSC,"refresh_token":rt,"grant_type":"refresh_token"}).encode()
              r = urllib.request.urlopen(urllib.request.Request("https://oauth2.googleapis.com/token", data=d, method="POST", headers={"Content-Type":"application/x-www-form-urlencoded"}), timeout=15)
              return json.loads(r.read())

          def yt(at, url):
              r = urllib.request.urlopen(urllib.request.Request(url, headers={"Authorization":f"Bearer {at}"}), timeout=15)
              return json.loads(r.read())

          results = {}
          for canal, rt_env in CANAIS.items():
              try:
                  rt = os.environ[rt_env]
                  td = get_at(rt)
                  at = td.get("access_token")
                  if not at:
                      print(f"NO_AT {canal}: {td.get('error','')} {td.get('error_description','')}", flush=True)
                      results[canal] = {"error": td.get('error','')}
                      continue
                  ch = yt(at, "https://www.googleapis.com/youtube/v3/channels?part=contentDetails,snippet&mine=true")
                  name = ch.get("items",[{}])[0].get("snippet",{}).get("title","?")
                  upl = ch.get("items",[{}])[0].get("contentDetails",{}).get("relatedPlaylists",{}).get("uploads")
                  if not upl:
                      print(f"NO_UPLOADS {canal} ({name})", flush=True)
                      results[canal] = {"channel": name, "error": "no uploads"}
                      continue
                  pl = yt(at, f"https://www.googleapis.com/youtube/v3/playlistItems?part=snippet,contentDetails&playlistId={upl}&maxResults=5")
                  vids = [{"id":i["contentDetails"]["videoId"],"title":i["snippet"]["title"],"date":i["snippet"]["publishedAt"][:10]} for i in pl.get("items",[])]
                  results[canal] = {"channel": name, "videos": vids}
                  print(f"OK {canal} ({name}): {len(vids)} vids {[v['id'] for v in vids]}", flush=True)
              except Exception as e:
                  results[canal] = {"error": str(e)}
                  print(f"ERR {canal}: {e}", flush=True)

          print("JSON_RESULT:" + json.dumps(results), flush=True)
          with open("/tmp/results.json","w") as f:
              json.dump(results, f)
          PYEOF2

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: yt-video-ids
          path: /tmp/results.json
          retention-days: 1
