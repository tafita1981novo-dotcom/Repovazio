name: List YouTube Videos All Channels

on:
  workflow_dispatch:

jobs:
  list-videos:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: List videos from all 7 channels
        env:
          YT_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID_NEW }}
          YT_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET_NEW }}
          YT_RT_DBN: ${{ secrets.YOUTUBE_RT_DBN }}
          YT_RT_ADHD: ${{ secrets.YOUTUBE_RT_ADHD }}
          YT_RT_WNV: ${{ secrets.YOUTUBE_RT_WNV }}
          YT_RT_BSN: ${{ secrets.YOUTUBE_RT_BSN }}
          YT_RT_PINK: ${{ secrets.YOUTUBE_RT_PINK }}
          YT_RT_TINNITUS: ${{ secrets.YOUTUBE_RT_TINNITUS }}
          YT_RT_RAIN: ${{ secrets.YOUTUBE_RT_RAIN }}
        run: |
          python3 << 'PYEOF2'
          import json, os, urllib.request, urllib.parse

          CID = os.environ["YT_CLIENT_ID"]
          CSC = os.environ["YT_CLIENT_SECRET"]
          SUPA_URL = "https://tpjvalzwkqwttvmszvie.supabase.co"
          SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRwanZhbHp3a3F3dHR2bXN6dmllIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTcxMzk4MDkyNCwiZXhwIjoyMDI5NTU2OTI0fQ.RgYBGalHZy8a8PnlKCvF1mQr6BhVDGNv4j9OzomBCaA"

          CANAIS = {
            "dbn":      {"rt_env": "YT_RT_DBN",      "channel_id": "UCD4LLFnsiVzA-DeSN6oaUzg"},
            "adhd":     {"rt_env": "YT_RT_ADHD",     "channel_id": "UCK3xZDFY84ffNrLEAI1Qmyw"},
            "wnv":      {"rt_env": "YT_RT_WNV",      "channel_id": "UC0mFKp42jfL0ZobYEj7uwUA"},
            "bsn":      {"rt_env": "YT_RT_BSN",      "channel_id": "UCy4d2yt8eRywJS7PMTDX3xA"},
            "pink":     {"rt_env": "YT_RT_PINK",     "channel_id": "UCXQ_-FOGTJk17T06gy0bYqQ"},
            "tinnitus": {"rt_env": "YT_RT_TINNITUS", "channel_id": "UCZ5pmYA2ESO1vIhtE86l3_Q"},
            "rain":     {"rt_env": "YT_RT_RAIN",     "channel_id": "UCSW8cGz1OcT1v90Vwc2-UPA"},
          }

          def get_at(rt):
              data = urllib.parse.urlencode({"client_id":CID,"client_secret":CSC,"refresh_token":rt,"grant_type":"refresh_token"}).encode()
              req = urllib.request.Request("https://oauth2.googleapis.com/token", data=data, method="POST",
                  headers={"Content-Type":"application/x-www-form-urlencoded"})
              with urllib.request.urlopen(req, timeout=15) as r:
                  return json.loads(r.read())

          def yt_get(at, url):
              req = urllib.request.Request(url, headers={"Authorization": f"Bearer {at}"})
              with urllib.request.urlopen(req, timeout=15) as r:
                  return json.loads(r.read())

          results = {}
          for canal, info in CANAIS.items():
              try:
                  rt = os.environ[info["rt_env"]]
                  token_data = get_at(rt)
                  at = token_data.get("access_token")
                  if not at:
                      results[canal] = {"error": f"No AT: {token_data.get('error','?')} {token_data.get('error_description','')}"}
                      print(f"❌ {canal}: No AT - {token_data}", flush=True)
                      continue

                  # Listar vídeos do canal autenticado
                  ch = yt_get(at, "https://www.googleapis.com/youtube/v3/channels?part=contentDetails,snippet&mine=true")
                  ch_name = ch.get("items", [{}])[0].get("snippet", {}).get("title", "?")
                  uploads_id = ch.get("items", [{}])[0].get("contentDetails", {}).get("relatedPlaylists", {}).get("uploads")

                  if not uploads_id:
                      results[canal] = {"error": "No uploads playlist", "channel_name": ch_name}
                      print(f"❌ {canal}: No uploads playlist (channel: {ch_name})", flush=True)
                      continue

                  pl = yt_get(at, f"https://www.googleapis.com/youtube/v3/playlistItems?part=snippet,contentDetails&playlistId={uploads_id}&maxResults=10")
                  videos = []
                  for item in pl.get("items", []):
                      vid_id = item["contentDetails"]["videoId"]
                      title = item["snippet"]["title"]
                      published = item["snippet"]["publishedAt"][:10]
                      videos.append({"id": vid_id, "title": title, "published": published})

                  results[canal] = {"ok": True, "channel_name": ch_name, "uploads_playlist": uploads_id, "videos": videos, "count": len(videos)}
                  print(f"✅ {canal} ({ch_name}): {len(videos)} video(s)", flush=True)
                  for v in videos:
                      print(f"   [{v['published']}] {v['id']} - {v['title'][:60]}", flush=True)

              except Exception as e:
                  results[canal] = {"error": str(e)}
                  print(f"❌ {canal}: {e}", flush=True)

          # Salvar no Supabase usando cache_key (campo correto)
          import urllib.error
          payload = json.dumps({"cache_key": "noise_channels_video_ids", "value": json.dumps(results)}).encode()
          req = urllib.request.Request(
              f"{SUPA_URL}/rest/v1/ia_cache",
              data=payload, method="POST",
              headers={
                  "apikey": SUPA_KEY,
                  "Authorization": f"Bearer {SUPA_KEY}",
                  "Content-Type": "application/json",
                  "Prefer": "resolution=merge-duplicates"
              }
          )
          try:
              with urllib.request.urlopen(req, timeout=10) as r:
                  print(f"\nSupabase saved: {r.status}", flush=True)
          except urllib.error.HTTPError as e:
              print(f"\nSupabase error: {e.code} {e.read()}", flush=True)

          print("\n=== RESULTADO FINAL ===", flush=True)
          for c, r in results.items():
              if r.get("ok"):
                  print(f"  ✅ {c}: {r['count']} vídeo(s) [{r['channel_name']}]", flush=True)
              else:
                  print(f"  ❌ {c}: {r.get('error','?')}", flush=True)
          PYEOF2
