name: 🌙 Live 24/7 Tela Preta — Sono Estudo Meditacao (GRATIS)

on:
  schedule:
    - cron: '0 3 * * *'
    - cron: '0 9 * * *'
    - cron: '0 15 * * *'
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      live_type:
        description: 'sleep | study | meditation | anxiety'
        default: 'sleep'
      duration_hours:
        description: 'Duracao em horas'
        default: '6'
      lang:
        description: 'pt-BR | en-US | es-ES'
        default: 'pt-BR'

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 450
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}

      - name: Instalar imageio-ffmpeg (portátil, sem apt)
        run: pip install imageio-ffmpeg --break-system-packages -q

      - name: 🌙 Live Tela Preta — Audio Binaural 24/7
        env:
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          LIVE_TYPE:          ${{ inputs.live_type || 'sleep' }}
          DURATION_HOURS:     ${{ inputs.duration_hours || '6' }}
          LIVE_LANG:          ${{ inputs.lang || 'pt-BR' }}
        run: python3 scripts/gen_sleep_live.py

      - name: Relatorio
        if: always()
        run: |
          echo "## Live Tela Preta" >> $GITHUB_STEP_SUMMARY
          echo "- Tipo: ${{ inputs.live_type || 'sleep' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Duracao: ${{ inputs.duration_hours || '6' }}h" >> $GITHUB_STEP_SUMMARY
          echo "- 100% GRATUITO" >> $GITHUB_STEP_SUMMARY
