name: metadata-noise-pending
on:
  workflow_dispatch: {}
  schedule:
    - cron: "*/15 * * * *"

jobs:
  dbn:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - uses: actions/checkout@v4
      - run: python3 scripts/update_channel_metadata.py
        env:
          CLIENT_ID: ${{ secrets.YT_CLIENT_ID_2 }}
          CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET_2 }}
          REFRESH_TOKEN: ${{ secrets.YOUTUBE_RT_DBN }}
          CANAL: dbn
          CHANNEL_ID: UCD4LLFnsiVzA-DeSN6oaUzg
