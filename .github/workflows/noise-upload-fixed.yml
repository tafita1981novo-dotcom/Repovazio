name: 🔊 Noise Upload Fixed — Usa CLIENT_ID Correto

on:
  workflow_dispatch:
    inputs:
      canal:
        description: 'Canal (DBN, ADHD, WNV, TINNITUS, BSN, RAIN, PINK)'
        required: true
        default: 'DBN'
      duration_hours:
        description: 'Duração em horas (1, 3, 8, 10)'
        required: false
        default: '10'
  schedule:
    - cron: '0 6 * * 1'  # Toda segunda 3h BR — upload semanal automático

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install ffmpeg + deps
        run: |
          sudo apt-get install -y ffmpeg
          pip install requests --quiet

      - name: Upload Noise Video
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YT_CLIENT_ID_2 }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET_2 }}
          YT_CLIENT_ID_2: ${{ secrets.YT_CLIENT_ID_2 }}
          YT_CLIENT_SECRET_2: ${{ secrets.YT_CLIENT_SECRET_2 }}
          YOUTUBE_RT_DBN: ${{ secrets.YOUTUBE_RT_DBN }}
          YOUTUBE_RT_ADHD: ${{ secrets.YOUTUBE_RT_ADHD }}
          YOUTUBE_RT_WNV: ${{ secrets.YOUTUBE_RT_WNV }}
          YOUTUBE_RT_TINNITUS: ${{ secrets.YOUTUBE_RT_TINNITUS }}
          YOUTUBE_RT_BSN: ${{ secrets.YOUTUBE_RT_BSN }}
          YOUTUBE_RT_RAIN: ${{ secrets.YOUTUBE_RT_RAIN }}
          YOUTUBE_RT_PINK: ${{ secrets.YOUTUBE_RT_PINK }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          CANAL="${{ github.event.inputs.canal || 'DBN' }}"
          HOURS="${{ github.event.inputs.duration_hours || '10' }}"
          DURATION=$((HOURS * 3600))
          python scripts/noise_upload_fixed.py $CANAL $DURATION
