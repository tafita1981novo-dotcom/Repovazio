name: "🎬 V9 Motion AI — Render Video"

on:
  workflow_dispatch:
    inputs:
      video_id:
        description: "ID do vídeo (ex: 683)"
        required: true
        default: "683"

  schedule:
    - cron: "0 6,12,18 * * *"

concurrency:
  group: render-v9-${{ github.event.inputs.video_id || 'batch' }}
  cancel-in-progress: false

jobs:
  render-v9:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Instalar dependências
        run: |
          pip install --quiet requests edge-tts higgsfield-client
          sudo apt-get install -y ffmpeg --quiet 2>/dev/null
          python3 -c "import requests, edge_tts, higgsfield_client; print('deps OK')"
          ffmpeg -version | head -1

      - name: 🎯 Determinar video_id
        id: get_video
        env:
          SUPABASE_URL: https://tpjvalzwkqwttvmszvie.supabase.co
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VID="${{ github.event.inputs.video_id }}"
          else
            VID=$(python3 - << 'PYEOF'
          import requests, os
          url = os.environ['SUPABASE_URL']
          key = os.environ['SUPABASE_SERVICE_KEY']
          r = requests.get(f'{url}/rest/v1/content_pipeline',
            headers={'apikey':key,'Authorization':f'Bearer {key}'},
            params={'status':'eq.audio_ready','video_url':'is.null',
                    'select':'id','order':'id.asc','limit':'1'})
          rows = r.json()
          print(rows[0]['id'] if rows else 'NONE')
          PYEOF
          )
          fi
          echo "video_id=$VID" >> $GITHUB_OUTPUT
          echo "✅ Video: $VID"

      - name: 🎬 Render V9 — Higgsfield + Pollinations
        if: steps.get_video.outputs.video_id != 'NONE'
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          # Higgsfield AI (primário — criar conta grátis em cloud.higgsfield.ai)
          HF_KEY: ${{ secrets.HF_KEY }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          HF_API_SECRET: ${{ secrets.HF_API_SECRET }}
          # Outros
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          python scripts/render_video_v9.py ${{ steps.get_video.outputs.video_id }}

      - name: ℹ️ Fila vazia
        if: steps.get_video.outputs.video_id == 'NONE'
        run: echo "✅ Nenhum vídeo pendente"

      - name: 📊 Resumo
        if: always()
        run: |
          echo "## 🎬 V9 Motion AI" >> $GITHUB_STEP_SUMMARY
          echo "- Video: ${{ steps.get_video.outputs.video_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: Higgsfield AI (nano_banana_2/seedream_v4) → Pollinations Flux" >> $GITHUB_STEP_SUMMARY
          echo "- Motion: Veo 3.x para cenas-chave" >> $GITHUB_STEP_SUMMARY
          echo "- Lower third: Daniela Coelho | Saude Mental | @psidanielacoelho" >> $GITHUB_STEP_SUMMARY
          echo "- Para usar Higgsfield: adicionar HF_KEY em GitHub Secrets" >> $GITHUB_STEP_SUMMARY
