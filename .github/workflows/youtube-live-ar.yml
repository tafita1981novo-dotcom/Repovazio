name: YouTube Live AR — Psychology Freq AR

on:
  workflow_dispatch:
    inputs:
      horas:
        description: "Horas"
        default: "6"
  schedule:
    # Arabic | CPM: $4-12
    - cron: "0 0,6,12,18 * * *"

jobs:
  live-ar:
    runs-on: ubuntu-latest
    timeout-minutes: 375
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: |
          sudo apt-get install -y ffmpeg > /dev/null 2>&1
          pip install requests --break-system-packages
      - name: Live AR 24/7
        env:
          LANG_CODE:              AR
          YOUTUBE_STREAM_KEY_AR: ${{ secrets.YOUTUBE_STREAM_KEY_AR }}
          YOUTUBE_STREAM_KEY:     ${{ secrets.YOUTUBE_STREAM_KEY }}
          GROQ_API_KEY:           ${{ secrets.GROQ_API_KEY }}
        run: |
          HORAS="${{ inputs.horas }}"
          timeout $((${HORAS:-6} * 3600)) python3 scripts/live_universal.py || true
        continue-on-error: true
