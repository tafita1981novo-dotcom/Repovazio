name: live-forever-stream

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-22.04
    timeout-minutes: 358

    steps:
      - name: Verificar ffmpeg + Python (pre-instalados no runner)
        run: |
          # Runner ubuntu-22.04 ja tem ffmpeg, numpy, pillow
          ffmpeg -version | head -1
          python3 -c "import numpy, PIL; print('numpy+pillow OK')"
          echo "Runner OK"

      - name: Cloudflare WARP
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | \
            sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ jammy main" | \
            sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update -qq 2>/dev/null
          sudo apt-get install -y cloudflare-warp 2>/dev/null
          sudo systemctl start warp-svc && sleep 4
          warp-cli --accept-tos registration new 2>&1 | head -3
          sleep 2
          warp-cli --accept-tos connect && sleep 8
          echo "WARP status:"
          warp-cli status
          echo "IP via WARP:"
          curl -s --max-time 10 https://1.1.1.1/cdn-cgi/trace | grep -E "^ip="

      - name: Gerar audio + cerebro
        run: |
          python3 - << 'EOF'
          import numpy as np, wave, urllib.request, io
          from PIL import Image
          SR=44100; DUR=300
          t=np.linspace(0,DUR,int(SR*DUR),endpoint=False)
          L=(np.sin(2*np.pi*432*t)*0.3*32767).astype(np.int16)
          R=(np.sin(2*np.pi*436*t)*0.3*32767).astype(np.int16)
          fade=int(SR*10)
          for a in[L,R]: a[:fade]=(a[:fade]*np.linspace(0,1,fade)).astype(np.int16)
          d=np.empty(len(t)*2,dtype=np.int16); d[0::2]=L; d[1::2]=R
          with wave.open('binaural.wav','w') as f:
            f.setnchannels(2); f.setsampwidth(2); f.setframerate(SR); f.writeframes(d.tobytes())
          with urllib.request.urlopen('https://yt3.googleusercontent.com/4NDK-JaBRi0uMyCCeOz-imtfhs6zHuQ2sxUn3d2gCjY_NyS_Z50OCENLFZrS_RjY5wOwKXch=s900-c-k-c0x00ffffff-no-rj') as r:
            img=Image.open(io.BytesIO(r.read())).convert('RGBA').resize((20,20))
          img.save('brain.png')
          print('OK')
          EOF
          ffmpeg -i binaural.wav -c:a libmp3lame -b:a 192k binaural.mp3 -y -loglevel quiet
          rm binaural.wav
          ls -lh binaural.mp3 brain.png

      - name: Stream 24/7 WARP -> YouTube
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          echo "Teste porta 1935 via WARP:"
          nc -zv a.rtmp.youtube.com 1935 2>&1 | tail -1
          
          ffmpeg -loglevel warning \
            -f lavfi -i "color=c=0x06060F:s=1280x720:r=25" \
            -stream_loop -1 -i binaural.mp3 \
            -i brain.png \
            -filter_complex "[2:v]format=rgba,colorchannelmixer=aa=0.02[br];[0:v][br]overlay=x=(W-w)/2:y=(H-h)/2:enable='between(mod(t,5),0,0.3)'[vout]" \
            -map "[vout]" -map "1:a" \
            -c:v libx264 -preset ultrafast -tune stillimage -crf 28 -pix_fmt yuv420p \
            -b:v 500k -maxrate 1000k -bufsize 2000k \
            -c:a aac -b:a 192k -ar 44100 -ac 2 \
            -f flv "rtmp://a.rtmp.youtube.com/live2/${STREAM_KEY}" 2>&1 | tee /tmp/ff.log &
          FFPID=$!
          sleep 45
          if kill -0 $FFPID 2>/dev/null; then
            echo "STREAM ATIVO via WARP!"
            sleep 20670
          else
            echo "falhou. Log:"; tail -20 /tmp/ff.log
            ffmpeg -loglevel warning \
              -f lavfi -i "color=c=0x06060F:s=1280x720:r=25" \
              -stream_loop -1 -i binaural.mp3 \
              -i brain.png \
              -filter_complex "[2:v]format=rgba,colorchannelmixer=aa=0.02[br];[0:v][br]overlay=x=(W-w)/2:y=(H-h)/2:enable='between(mod(t,5),0,0.3)'[vout]" \
              -map "[vout]" -map "1:a" \
              -c:v libx264 -preset ultrafast -tune stillimage -crf 28 -pix_fmt yuv420p \
              -b:v 500k -maxrate 1000k -bufsize 2000k \
              -c:a aac -b:a 192k -ar 44100 -ac 2 \
              -f flv "rtmps://a.rtmps.youtube.com/live2/${STREAM_KEY}" 2>&1 | tee /tmp/ff2.log &
            FFPID=$!
            sleep 45
            kill -0 $FFPID 2>/dev/null && echo "RTMPS ativo!" && sleep 20670 || (echo "RTMPS falhou:"; tail -10 /tmp/ff2.log; exit 1)
          fi
          
          curl -s -X POST -H "Authorization: Bearer ${GH_PAT}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/tafita81/Repovazio/actions/workflows/live-forever-stream.yml/dispatches" \
            -d '{"ref":"main"}' && echo "Relay OK"
          sleep 30; kill $FFPID 2>/dev/null || true
