name: live-forever-stream

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 358

    steps:
      - name: Setup (ffmpeg estatico + Python)
        run: |
          echo "Baixando ffmpeg estatico (sem apt-get)..."
          wget -q "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz"
          tar -xf ffmpeg-release-amd64-static.tar.xz
          FFDIR=$(ls -d ffmpeg-*-static)
          sudo cp $FFDIR/ffmpeg /usr/local/bin/ffmpeg
          sudo chmod +x /usr/local/bin/ffmpeg
          ffmpeg -version | head -1
          pip3 install numpy pillow --break-system-packages -q
          echo "Setup OK"

      - name: Gerar audio binaural + cerebro
        run: |
          python3 - << 'EOF'
          import numpy as np, wave, urllib.request, io
          from PIL import Image
          # Binaural 432Hz 5min loop
          SR=44100; DUR=300
          t=np.linspace(0,DUR,int(SR*DUR),endpoint=False)
          L=(np.sin(2*np.pi*432*t)*0.3*32767).astype(np.int16)
          R=(np.sin(2*np.pi*436*t)*0.3*32767).astype(np.int16)
          fade=int(SR*10)
          for a in[L,R]: a[:fade]=(a[:fade]*np.linspace(0,1,fade)).astype(np.int16)
          d=np.empty(len(t)*2,dtype=np.int16); d[0::2]=L; d[1::2]=R
          with wave.open('binaural.wav','w') as f:
            f.setnchannels(2); f.setsampwidth(2); f.setframerate(SR); f.writeframes(d.tobytes())
          # Cerebro 20x20px do canal @psidanicoelho
          with urllib.request.urlopen('https://yt3.googleusercontent.com/4NDK-JaBRi0uMyCCeOz-imtfhs6zHuQ2sxUn3d2gCjY_NyS_Z50OCENLFZrS_RjY5wOwKXch=s900-c-k-c0x00ffffff-no-rj') as r:
            img=Image.open(io.BytesIO(r.read())).convert('RGBA').resize((20,20))
          img.save('brain.png')
          print('Tudo OK')
          EOF
          ffmpeg -i binaural.wav -c:a libmp3lame -b:a 192k binaural.mp3 -y -loglevel quiet
          rm binaural.wav
          ls -lh binaural.mp3 brain.png

      - name: Testar RTMP/RTMPS + Stream 24/7
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO: tafita81/Repovazio
        run: |
          echo "Testando portas YouTube RTMP..."
          nc -zv a.rtmp.youtube.com 1935 2>&1 | tail -1 && echo "RTMP 1935 OK" || echo "RTMP 1935 BLOCKED"
          nc -zv a.rtmps.youtube.com 443 2>&1 | tail -1 && echo "RTMPS 443 OK" || echo "RTMPS 443 BLOCKED"
          
          echo "Iniciando stream RTMPS (porta 443)..."
          ffmpeg -loglevel warning \
            -f lavfi -i "color=c=0x06060F:s=1280x720:r=25" \
            -stream_loop -1 -i binaural.mp3 \
            -i brain.png \
            -filter_complex "[2:v]format=rgba,colorchannelmixer=aa=0.02[br];[0:v][br]overlay=x=(W-w)/2:y=(H-h)/2:enable='between(mod(t,5),0,0.3)'[vout]" \
            -map "[vout]" -map "1:a" \
            -c:v libx264 -preset ultrafast -tune stillimage -crf 28 -pix_fmt yuv420p \
            -b:v 500k -maxrate 1000k -bufsize 2000k \
            -c:a aac -b:a 192k -ar 44100 -ac 2 \
            -f flv "rtmps://a.rtmps.youtube.com/live2/${STREAM_KEY}" 2>&1 | tee /tmp/ffmpeg.log &
          FFPID=$!
          echo "ffmpeg PID=$FFPID"
          
          # Aguardar 60s e verificar se conectou
          sleep 60
          if kill -0 $FFPID 2>/dev/null; then
            echo "CONECTADO via RTMPS! Stream em andamento."
            # Continuar por 5h45m restantes
            sleep 20700
          else
            echo "RTMPS falhou. Log:"
            tail -20 /tmp/ffmpeg.log || true
            echo "Tentando RTMP porta 1935..."
            ffmpeg -loglevel warning \
              -f lavfi -i "color=c=0x06060F:s=1280x720:r=25" \
              -stream_loop -1 -i binaural.mp3 \
              -i brain.png \
              -filter_complex "[2:v]format=rgba,colorchannelmixer=aa=0.02[br];[0:v][br]overlay=x=(W-w)/2:y=(H-h)/2:enable='between(mod(t,5),0,0.3)'[vout]" \
              -map "[vout]" -map "1:a" \
              -c:v libx264 -preset ultrafast -tune stillimage -crf 28 -pix_fmt yuv420p \
              -b:v 500k -maxrate 1000k -bufsize 2000k \
              -c:a aac -b:a 192k -ar 44100 -ac 2 \
              -f flv "rtmp://a.rtmp.youtube.com/live2/${STREAM_KEY}" 2>&1 | tee /tmp/ffmpeg2.log &
            FFPID2=$!
            sleep 60
            if kill -0 $FFPID2 2>/dev/null; then
              echo "CONECTADO via RTMP! Stream em andamento."
              sleep 20700
              FFPID=$FFPID2
            else
              echo "AMBAS PORTAS BLOQUEADAS. Log RTMP:"
              tail -10 /tmp/ffmpeg2.log || true
              exit 1
            fi
          fi
          
          echo "Disparando relay para proximo ciclo..."
          curl -s -X POST \
            -H "Authorization: Bearer ${GH_PAT}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/actions/workflows/live-forever-stream.yml/dispatches" \
            -d '{"ref":"main"}' && echo "Relay OK" || echo "Aviso: falha relay"
          sleep 60
          kill $FFPID 2>/dev/null || true
          echo "Ciclo completo."
