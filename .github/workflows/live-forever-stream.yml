name: live-forever-stream

on:
  workflow_dispatch:
  # Não usa schedule - auto-dispara via API antes de morrer

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 358

    steps:
      - name: Instalar dependencias
        run: |
          sudo apt-get install -y ffmpeg imagemagick python3-pip -q
          pip3 install numpy --break-system-packages -q

      - name: Gerar audio binaural 432Hz (5min loop)
        run: |
          python3 - << 'EOF'
          import numpy as np, wave
          SR=44100; DUR=300
          t=np.linspace(0,DUR,int(SR*DUR),endpoint=False)
          L=(np.sin(2*np.pi*432*t)*0.3*32767).astype(np.int16)
          R=(np.sin(2*np.pi*436*t)*0.3*32767).astype(np.int16)
          fade=int(SR*10)
          for a in[L,R]: a[:fade]=(a[:fade]*np.linspace(0,1,fade)).astype(np.int16)
          d=np.empty(len(t)*2,dtype=np.int16); d[0::2]=L; d[1::2]=R
          with wave.open('binaural.wav','w') as f:
            f.setnchannels(2); f.setsampwidth(2); f.setframerate(SR); f.writeframes(d.tobytes())
          print('Audio OK:', round(len(d)*2/1024/1024,1), 'MB')
          EOF
          ffmpeg -i binaural.wav -c:a libmp3lame -b:a 192k binaural.mp3 -y -loglevel quiet
          rm binaural.wav
          echo "Audio: $(du -h binaural.mp3 | cut -f1)"

      - name: Baixar cerebro branco do canal
        run: |
          wget -q -O brain_orig.jpg '${{ env.BRAIN_URL }}'
          convert brain_orig.jpg -resize 20x20! brain.png 2>/dev/null || cp brain_orig.jpg brain.png
          ls -lh brain.png
        env:
          BRAIN_URL: https://yt3.googleusercontent.com/4NDK-JaBRi0uMyCCeOz-imtfhs6zHuQ2sxUn3d2gCjY_NyS_Z50OCENLFZrS_RjY5wOwKXch=s900-c-k-c0x00ffffff-no-rj

      - name: Stream 24/7 (5h50min, auto-relay)
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO: tafita81/Repovazio
        run: |
          echo "Iniciando stream psicologia.doc Live 24/7..."
          echo "Stream key: ${STREAM_KEY:0:4}****"
          
          # Iniciar ffmpeg em background
          ffmpeg -loglevel warning \
            -f lavfi -i "color=c=0x06060F:s=1280x720:r=25" \
            -stream_loop -1 -i binaural.mp3 \
            -i brain.png \
            -filter_complex "[2:v]format=rgba,colorchannelmixer=aa=0.02[br];[0:v][br]overlay=x=(W-w)/2:y=(H-h)/2:enable='between(mod(t,5),0,0.3)'[vout]" \
            -map "[vout]" -map "1:a" \
            -c:v libx264 -preset ultrafast -tune stillimage -crf 28 -pix_fmt yuv420p \
            -b:v 500k -maxrate 1000k -bufsize 2000k \
            -c:a aac -b:a 192k -ar 44100 -ac 2 \
            -f flv "rtmp://a.rtmp.youtube.com/live2/${STREAM_KEY}" &
          FFPID=$!
          echo "FFmpeg PID: $FFPID"
          
          # Aguardar 5h50min (21000 segundos)
          sleep 21000
          
          # Disparar proximo job ANTES de encerrar este (overlap de ~30s = sem interrupcao)
          echo "Disparando proximo ciclo..."
          curl -s -X POST \
            -H "Authorization: Bearer ${GH_PAT}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/actions/workflows/live-forever-stream.yml/dispatches" \
            -d '{"ref":"main"}' \
            && echo "Proximo ciclo disparado!" || echo "Aviso: falha ao disparar proximo ciclo"
          
          # Aguardar 60s para proximo job iniciar antes de encerrar este
          sleep 60
          kill $FFPID 2>/dev/null || true
          echo "Ciclo encerrado. Proximo ja esta rodando."
