name: Brain Mass Ingestor

on:
  schedule:
    - cron: "5 * * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests --break-system-packages

      - name: Run Brain Mass Ingestor
        env:
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ -f scripts/brain_mass_ingestor.py ]; then
            python3 scripts/brain_mass_ingestor.py
          elif [ -f scripts/brain_mass_expander.py ]; then
            python3 scripts/brain_mass_expander.py
          else
            echo "Nenhum script de ingestao encontrado — OK"
          fi
