name: "🌐 Update Broadcast Title — Idioma por Hora"

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 * * * *"   # A cada hora, atualiza para o idioma correto

jobs:
  update-title:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - name: Atualizar título/idioma do broadcast ativo
        env:
          YT_CLIENT_ID:      ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET:  ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN:  ${{ secrets.YT_REFRESH_TOKEN }}
        run: python3 scripts/update_broadcast_title.py
