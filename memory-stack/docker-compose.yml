version: "3.9"

# ============================================================
# QUANTUM BRAIN MEMORY STACK
# Deploy: Oracle Cloud ARM (sa-saopaulo-1) — custo $0/mês
# Componentes:
#   - FalkorDB (graph DB, Redis-protocol, substitui Neo4j)
#   - Graphiti MCP (knowledge graph temporal)
#   - Obsidian Vault MCP (vault filesystem no GitHub)
# ============================================================

services:

  # ── GRAPH DATABASE (FalkorDB = Neo4j mas grátis e 3x mais rápido) ─────────
  falkordb:
    image: falkordb/falkordb:latest
    container_name: falkordb
    restart: unless-stopped
    ports:
      - "6379:6379"       # Redis protocol
      - "3000:3000"       # FalkorDB Browser UI
    volumes:
      - falkordb_data:/data
    environment:
      - FALKORDB_PERSISTENCE=yes
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── GRAPHITI MCP SERVER (memória temporal para agentes AI) ────────────────
  graphiti-mcp:
    image: falkordb/graphiti-knowledge-graph-mcp:latest
    container_name: graphiti-mcp
    restart: unless-stopped
    depends_on:
      falkordb:
        condition: service_healthy
    ports:
      - "8765:8765"       # MCP SSE endpoint
    environment:
      # Graph DB
      - GRAPH_DATABASE_TYPE=falkordb
      - GRAPH_DATABASE_URL=redis://falkordb:6379
      # LLM — usa Groq (grátis, 30req/min Llama 3.3)
      - LLM_PROVIDER=groq
      - LLM_MODEL=llama-3.3-70b-versatile
      - GROQ_API_KEY=${GROQ_API_KEY2}
      # Embeddings — usa Groq também
      - EMBEDDER_PROVIDER=groq
      - EMBEDDER_MODEL=llama-3.3-70b-versatile
      # Servidor MCP
      - MCP_SERVER_HOST=0.0.0.0
      - MCP_SERVER_PORT=8765
      - MCP_TRANSPORT=sse
    volumes:
      - graphiti_cache:/app/cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── OBSIDIAN VAULT MCP (filesystem-based, sem app Obsidian necessário) ────
  obsidian-mcp:
    image: node:20-alpine
    container_name: obsidian-mcp
    restart: unless-stopped
    working_dir: /vault
    ports:
      - "8766:8766"       # MCP SSE endpoint
    environment:
      - VAULT_PATH=/vault
      - MCP_PORT=8766
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_REPO=tafita81/Repovazio
      - VAULT_SUBDIR=vault
    volumes:
      - vault_data:/vault
      - /home/ubuntu/obsidian-mcp:/app
    command: >
      sh -c "
        if [ ! -f /app/server.js ]; then
          cd /app && npm init -y &&
          npm install @modelcontextprotocol/sdk gray-matter simple-git chokidar glob &&
          echo 'Deps instaladas';
        fi
        node /app/server.js
      "
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8766/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  falkordb_data:
    driver: local
  graphiti_cache:
    driver: local
  vault_data:
    driver: local
