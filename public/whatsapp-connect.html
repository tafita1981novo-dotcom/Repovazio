<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="refresh" content="15">
<title>WhatsApp Connect — repovazio</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Segoe UI',sans-serif; background:#0a0a0f; color:#e0e0e0;
  min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
.card { background:#111118; border:1px solid #2a2a3a; border-radius:16px;
  padding:40px; width:100%; max-width:460px; text-align:center; box-shadow:0 8px 40px rgba(0,0,0,.6); }
.logo { font-size:40px; margin-bottom:16px; }
h1 { font-size:22px; font-weight:700; color:#fff; margin-bottom:6px; }
.sub { font-size:13px; color:#666; margin-bottom:28px; }
.badge { display:inline-flex; align-items:center; gap:8px; padding:8px 20px;
  border-radius:999px; font-size:13px; font-weight:700; margin-bottom:24px; }
.badge.wait { background:rgba(251,191,36,.12); color:#fbbf24; border:1px solid rgba(251,191,36,.3); }
.badge.ok   { background:rgba(16,185,129,.12); color:#10b981; border:1px solid rgba(16,185,129,.3); }
.badge.qr   { background:rgba(124,58,237,.12); color:#a78bfa; border:1px solid rgba(124,58,237,.3); }
.dot { width:8px;height:8px;border-radius:50%;background:currentColor;animation:pulse 1.5s infinite; }
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#qrImg { width:256px;height:256px;border:3px solid #7c3aed;border-radius:12px;
  margin:0 auto 12px;display:block;background:#1a1a25; }
.hint  { font-size:12px;color:#666;line-height:1.6;margin-bottom:16px; }
.hint strong { color:#aaa; }
.info  { background:#0f0f1a;border:1px solid #1e1e30;border-radius:10px;
  padding:14px;margin-bottom:16px;font-size:14px;color:#888; }
.info strong { color:#ddd; }
.refresh { font-size:11px; color:#444; margin-top:16px; }
.actions a { display:inline-block;margin:4px;padding:8px 16px;background:#1a1a25;
  border:1px solid #2a2a3a;border-radius:8px;color:#888;font-size:12px;text-decoration:none; }
.actions a:hover { color:#ddd; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🤖</div>
  <h1>WhatsApp Claude Knowledge</h1>
  <p class="sub">Captura mensagens sobre Claude automaticamente via GitHub Actions</p>
  <div class="badge wait" id="badge"><span class="dot"></span><span id="statusTxt">Carregando…</span></div>
  <div id="qrSection" style="display:none">
    <img id="qrImg" src="" alt="QR Code">
    <p class="hint">No WhatsApp: <strong>⋮ → Aparelhos conectados → Conectar aparelho</strong></p>
  </div>
  <div class="info" id="infoBox" style="display:none">
    📱 Conectado como <strong id="phoneName"></strong><br>
    <span id="phoneNum" style="font-size:12px;color:#555"></span>
  </div>
  <div class="actions">
    <a href="https://github.com/tafita81/Repovazio/actions" target="_blank">🔄 Ver Actions</a>
    <a href="https://supabase.com/dashboard/project/tpjvalzwkqwttvmszvie/editor" target="_blank">🗄️ Supabase</a>
  </div>
  <p class="refresh">Atualiza automaticamente a cada 15s</p>
</div>

<script>
const SB_URL  = 'https://tpjvalzwkqwttvmszvie.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRwanZhbHp3a3F3dHR2bXN6dmllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMzUyOTMsImV4cCI6MjA5MTYxMTI5M30.UEgUo0Mw15ihQZykLAY5QApRzgTXkfIewZFzIgwao3Q';

async function load() {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/wa_status?id=eq.singleton`, {
      headers: { apikey: SB_ANON, Authorization: `Bearer ${SB_ANON}` }
    });
    const rows = await r.json();
    const s = rows[0];
    if (!s) return;

    const badge = document.getElementById('badge');
    const txt   = document.getElementById('statusTxt');
    const qrSec = document.getElementById('qrSection');
    const qrImg = document.getElementById('qrImg');
    const info  = document.getElementById('infoBox');

    if (s.connected) {
      badge.className = 'badge ok';
      txt.textContent = '✅ Conectado — capturando mensagens';
      qrSec.style.display = 'none';
      info.style.display  = 'block';
      document.getElementById('phoneName').textContent = s.phone_name || '';
      document.getElementById('phoneNum').textContent  = s.phone_num  || '';
    } else if (s.qr_base64) {
      badge.className = 'badge qr';
      txt.textContent = '📱 Escaneie o QR Code';
      qrSec.style.display = 'block';
      info.style.display  = 'none';
      qrImg.src = s.qr_base64;
    } else {
      badge.className = 'badge wait';
      txt.textContent = '⏳ Aguardando GitHub Actions iniciar…';
      qrSec.style.display = 'none';
      info.style.display  = 'none';
    }
  } catch(e) {
    document.getElementById('statusTxt').textContent = 'Erro ao carregar status';
  }
}
load();
</script>
</body>
</html>
