<html><head><title>Calculadora</title></head><body><h1>Calculadora</h1><form><input type='text' id='num1' placeholder='Número 1'><br><input type='text' id='num2' placeholder='Número 2'><br><select id='operacao'><option value='+'>+</option><option value='-'>-</option><option value='*'>*</option><option value='/'>/</option></select><br><input type='button' value='Calcular' onclick='calcular()'><br><p id='resultado'></p></form><script>function calcular(){var num1 = parseFloat(document.getElementById('num1').value);var num2 = parseFloat(document.getElementById('num2').value);var operacao = document.getElementById('operacao').value;if(operacao == '+'){document.getElementById('resultado').innerHTML = num1 + num2;}else if(operacao == '-'){document.getElementById('resultado').innerHTML = num1 - num2;}else if(operacao == '*'){document.getElementById('resultado').innerHTML = num1 * num2;}else if(operacao == '/'){if(num2 != 0){document.getElementById('resultado').innerHTML = num1 / num2;}else{document.getElementById('resultado').innerHTML = 'Erro! Não é possível dividir por zero.';}}}</script></body></html>
