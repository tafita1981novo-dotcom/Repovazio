<html><head><title>Calculadora</title></head><body><h1>Calculadora</h1><form><input type='number' id='num1' placeholder='Número 1'><br><input type='number' id='num2' placeholder='Número 2'><br><select id='op'><option value='+'>+</option><option value='-'>-</option><option value='*'>*</option><option value='/'>/</option></select><br><button type='submit'>Calcular</button><br><p id='result'></p></form><script>document.querySelector('form').addEventListener('submit', function(e){e.preventDefault();let num1 = parseFloat(document.getElementById('num1').value);let num2 = parseFloat(document.getElementById('num2').value);let op = document.getElementById('op').value;switch(op){case '+':document.getElementById('result').innerText = num1 + num2;break;case '-':document.getElementById('result').innerText = num1 - num2;break;case '*':document.getElementById('result').innerText = num1 * num2;break;case '/':if(num2 != 0){document.getElementById('result').innerText = num1 / num2;}else{document.getElementById('result').innerText = 'Erro! Divisão por zero!';}}});</script></body></html>
