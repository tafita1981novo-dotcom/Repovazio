<html><head><title>To-Do List</title><style>body { background-color: #f2f2f2; } .dark-mode { background-color: #333; color: #fff; }</style></head><body><h1>To-Do List</h1><ul id='todo-list'></ul><input type='text' id='todo-input' /><button id='add-btn'>Add</button><script>const todoList = document.getElementById('todo-list');const todoInput = document.getElementById('todo-input');const addBtn = document.getElementById('add-btn');addBtn.addEventListener('click', () => {const todoText = todoInput.value;todoList.innerHTML += `<li>${todoText}</li>`;todoInput.value = '';});document.body.addEventListener('click', () => {document.body.classList.toggle('dark-mode');});</script></body></html>
