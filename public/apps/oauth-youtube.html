<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>YouTube OAuth · Daniela AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;color:#e8e8f0;font-family:-apple-system,system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#0f0f1e;border:1px solid #252545;border-radius:20px;max-width:500px;width:100%;padding:32px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.card::before{content:'';display:block;width:60px;height:60px;background:linear-gradient(135deg,#7c3aed,#06b6d4);border-radius:16px;margin:0 auto 16px;line-height:60px;font-size:28px}
h1{font-size:22px;font-weight:800;margin-bottom:8px}
.sub{color:#6060a0;font-size:13px;margin-bottom:24px}
.status{padding:16px;border-radius:12px;margin-bottom:16px;font-size:13px;line-height:1.6}
.status.loading{background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.2);color:#a78bfa}
.status.success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);color:#10b981}
.status.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#ef4444}
.btn{display:inline-block;background:linear-gradient(135deg,#7c3aed,#06b6d4);color:#fff;border:none;border-radius:12px;padding:12px 28px;font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;margin-top:12px;transition:transform .15s}
.btn:hover{transform:scale(1.03)}
.btn:active{transform:scale(.97)}
.info{font-size:11px;color:#6060a0;margin-top:16px}
code{background:#131328;padding:2px 6px;border-radius:4px;font-size:11px;color:#a78bfa}
</style>
</head>
<body>
<div class="card">
<h1>🔗 YouTube OAuth</h1>
<p class="sub">Conectar canal psicologia.doc à Daniela AI</p>
<div class="status" id="status">
  <div class="loading">Verificando autorização...</div>
</div>
<div id="actions"></div>
<p class="info">Projeto: <code>349720923102</code> · Daniela V26.8</p>
</div>
<script>
const EDGE='https://tpjvalzwkqwttvmszvie.supabase.co/functions/v1/daniela-chat';
const CLIENT_ID='349720923102-kd06p9jbqprr6tg1k508ddj666rofdq7.apps.googleusercontent.com';
const REDIRECT_URI=window.location.origin+'/apps/oauth-youtube.html';
const SCOPES=[
  'https://www.googleapis.com/auth/youtube',
  'https://www.googleapis.com/auth/youtube.readonly',
  'https://www.googleapis.com/auth/yt-analytics.readonly',
  'https://www.googleapis.com/auth/yt-analytics-monetary.readonly',
  'https://www.googleapis.com/auth/youtubepartner'
].join(' ');

const st=document.getElementById('status');
const act=document.getElementById('actions');

// Verificar se tem code na URL (callback)
const params=new URLSearchParams(window.location.search);
const code=params.get('code');
const error=params.get('error');

if(error){
  st.innerHTML='<div class="error">Erro: '+error+'<br>Tente novamente.</div>';
  act.innerHTML='<button class="btn" onclick="startAuth()">Tentar novamente</button>';
} else if(code){
  st.innerHTML='<div class="loading">Trocando código por token...</div>';
  exchangeCode(code);
} else {
  st.innerHTML='<div class="loading">Clique abaixo para autorizar o acesso ao canal YouTube</div>';
  act.innerHTML='<button class="btn" onclick="startAuth()">🔑 Autorizar YouTube</button>';
}

function startAuth(){
  const url='https://accounts.google.com/o/oauth2/v2/auth?'+new URLSearchParams({
    client_id:CLIENT_ID,
    redirect_uri:REDIRECT_URI,
    response_type:'code',
    scope:SCOPES,
    access_type:'offline',
    prompt:'consent',
    state:'daniela_youtube'
  }).toString();
  window.location.href=url;
}

async function exchangeCode(code){
  try{
    // Trocar o code por access_token via Edge Function
    const r=await fetch(EDGE,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:[{role:'user',content:'SYSTEM_OAUTH_EXCHANGE:'+JSON.stringify({code,redirect_uri:REDIRECT_URI})}],
        model:'groq:llama-3.1-8b-instant',user_id:'tafita81',session_id:'oauth_'+Date.now()})});
    const d=await r.json();
    if(d.reply && d.reply.includes('OK')){
      st.innerHTML='<div class="success">✅ YouTube conectado com sucesso!<br><br>A Daniela agora tem acesso completo ao canal:<br>• Upload de vídeos<br>• Edição de títulos e descrições<br>• Analytics e receita<br>• Gerenciamento de playlists<br>• Resposta a comentários</div>';
      act.innerHTML='<a class="btn" href="/daniela.html">← Voltar ao Chat</a>';
    } else {
      st.innerHTML='<div class="error">Erro ao trocar token: '+(d.reply||'desconhecido')+'</div>';
      act.innerHTML='<button class="btn" onclick="startAuth()">Tentar novamente</button>';
    }
  }catch(e){
    st.innerHTML='<div class="error">Erro: '+e.message+'</div>';
    act.innerHTML='<button class="btn" onclick="startAuth()">Tentar novamente</button>';
  }
}
</script>
</body>
</html>
