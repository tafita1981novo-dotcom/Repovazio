<html><head><title>Calculadora Científica</title></head><body><h1>Calculadora Científica</h1><form><input type='text' id='display'><br><button onclick='display.value=""'>C</button><button onclick='display.value+="*"'>*</button><button onclick='display.value+="/"'>/</button><br><button onclick='display.value+="+"'>+</button><button onclick='display.value+="-"'>-</button><button onclick='display.value+="^"'>^</button><br><button onclick='display.value=eval(display.value)'>=</button></form></body></html>
