<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Calculadora Científica</title>
<style>
  body { font-family: Arial, sans-serif; background: #282c34; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
  .calculator { background: #3b3f47; padding: 20px; border-radius: 10px; box-shadow: 0 0 15px #000; width: 320px; }
  input[type=text] { width: 100%; height: 40px; font-size: 1.5em; text-align: right; margin-bottom: 10px; border-radius: 5px; border: none; padding: 5px 10px; }
  button { width: 60px; height: 50px; font-size: 1.2em; margin: 5px 3px; border-radius: 5px; border: none; cursor: pointer; background: #5a5f6a; color: white; }
  button:hover { background: #7a7f8a; }
  .row { display: flex; justify-content: space-between; }
</style>
</head>
<body>
<div class="calculator">
  <input type="text" id="display" disabled />
  <div class="row">
    <button onclick="clearDisplay()">C</button>
    <button onclick="backspace()">⌫</button>
    <button onclick="appendOperator('(')">(</button>
    <button onclick="appendOperator(')')">)</button>
  </div>
  <div class="row">
    <button onclick="appendNumber('7')">7</button>
    <button onclick="appendNumber('8')">8</button>
    <button onclick="appendNumber('9')">9</button>
    <button onclick="appendOperator('/')">÷</button>
  </div>
  <div class="row">
    <button onclick="appendNumber('4')">4</button>
    <button onclick="appendNumber('5')">5</button>
    <button onclick="appendNumber('6')">6</button>
    <button onclick="appendOperator('*')">×</button>
  </div>
  <div class="row">
    <button onclick="appendNumber('1')">1</button>
    <button onclick="appendNumber('2')">2</button>
    <button onclick="appendNumber('3')">3</button>
    <button onclick="appendOperator('-')">−</button>
  </div>
  <div class="row">
    <button onclick="appendNumber('0')">0</button>
    <button onclick="appendOperator('.')">.</button>
    <button onclick="calculate()">=</button>
    <button onclick="appendOperator('+')">+</button>
  </div>
  <div class="row">
    <button onclick="appendFunction('Math.sin(')">sin</button>
    <button onclick="appendFunction('Math.cos(')">cos</button>
    <button onclick="appendFunction('Math.tan(')">tan</button>
    <button onclick="appendFunction('Math.log(')">log</button>
  </div>
  <div class="row">
    <button onclick="appendFunction('Math.sqrt(')">√</button>
    <button onclick="appendOperator('^')">^</button>
    <button onclick="appendFunction('Math.exp(')">exp</button>
    <button onclick="appendFunction('Math.abs(')">abs</button>
  </div>
</div>
<script>
  const display = document.getElementById('display');

  function clearDisplay() {
    display.value = '';
  }

  function backspace() {
    display.value = display.value.slice(0, -1);
  }

  function appendNumber(num) {
    display.value += num;
  }

  function appendOperator(op) {
    if (op === '^') {
      display.value += '**';
    } else {
      display.value += op;
    }
  }

  function appendFunction(func) {
    display.value += func;
  }

  function calculate() {
    try {
      // Avalia a expressão no display
      const result = eval(display.value);
      display.value = result;
    } catch (e) {
      display.value = 'Erro';
    }
  }
</script>
</body>
</html>
