<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Calculadora Científica</title>
<style>
  body { font-family: Arial, sans-serif; background: #f0f0f0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
  .calculator { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.2); width: 320px; }
  .display { width: 100%; height: 50px; font-size: 24px; text-align: right; padding: 10px; border: 1px solid #ccc; border-radius: 5px; margin-bottom: 10px; }
  .buttons { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  button { padding: 15px; font-size: 18px; border: none; border-radius: 5px; background: #007bff; color: white; cursor: pointer; }
  button.operator { background: #28a745; }
  button.function { background: #6c757d; }
  button:active { background: #0056b3; }
</style>
</head>
<body>
<div class="calculator">
  <input type="text" class="display" id="display" disabled />
  <div class="buttons">
    <button class="function" onclick="clearDisplay()">C</button>
    <button class="function" onclick="deleteLast()">DEL</button>
    <button class="function" onclick="toggleSign()">±</button>
    <button class="operator" onclick="appendOperator('/')">÷</button>
    <button class="operator" onclick="appendOperator('*')">×</button>

    <button onclick="appendNumber('7')">7</button>
    <button onclick="appendNumber('8')">8</button>
    <button onclick="appendNumber('9')">9</button>
    <button class="operator" onclick="appendOperator('-')">−</button>
    <button class="operator" onclick="appendOperator('+')">+</button>

    <button onclick="appendNumber('4')">4</button>
    <button onclick="appendNumber('5')">5</button>
    <button onclick="appendNumber('6')">6</button>
    <button class="function" onclick="appendFunction('Math.sin(')">sin</button>
    <button class="function" onclick="appendFunction('Math.cos(')">cos</button>

    <button onclick="appendNumber('1')">1</button>
    <button onclick="appendNumber('2')">2</button>
    <button onclick="appendNumber('3')">3</button>
    <button class="function" onclick="appendFunction('Math.tan(')">tan</button>
    <button class="function" onclick="appendFunction('Math.log(')">log</button>

    <button onclick="appendNumber('0')">0</button>
    <button onclick="appendNumber('.')">.</button>
    <button class="function" onclick="appendFunction('Math.sqrt(')">√</button>
    <button class="function" onclick="appendFunction('Math.pow(')">xʸ</button>
    <button class="operator" onclick="calculate()">=</button>
  </div>
</div>
<script>
  const display = document.getElementById('display');

  function appendNumber(num) {
    display.value += num;
  }

  function appendOperator(op) {
    if (display.value === '') return;
    const lastChar = display.value.slice(-1);
    if ('+-/*'.includes(lastChar)) {
      display.value = display.value.slice(0, -1) + op;
    } else {
      display.value += op;
    }
  }

  function appendFunction(func) {
    display.value += func;
  }

  function clearDisplay() {
    display.value = '';
  }

  function deleteLast() {
    display.value = display.value.slice(0, -1);
  }

  function toggleSign() {
    if (display.value === '') return;
    if (display.value.startsWith('-')) {
      display.value = display.value.slice(1);
    } else {
      display.value = '-' + display.value;
    }
  }

  function calculate() {
    try {
      // Fecha todas as funções abertas
      let expression = display.value;
      const openParens = (expression.match(/\(/g) || []).length;
      const closeParens = (expression.match(/\)/g) || []).length;
      expression += ')'.repeat(openParens - closeParens);
      const result = eval(expression);
      display.value = result;
    } catch (e) {
      display.value = 'Erro';
    }
  }
</script>
</body>
</html>
