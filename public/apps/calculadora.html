<html><body><form><input type='text' id='num1'><br><input type='text' id='num2'><br><select id='operador'><option value='+'>+</option><option value='-'>-</option><option value='*'>*</option><option value='/'>/</option></select><br><button type='submit'>Calcular</button></form><script>document.querySelector('form').addEventListener('submit', function(e) { e.preventDefault(); var num1 = parseFloat(document.getElementById('num1').value); var num2 = parseFloat(document.getElementById('num2').value); var operador = document.getElementById('operador').value; if (operador == '+') { document.getElementById('resultado').innerHTML = num1 + num2; } else if (operador == '-') { document.getElementById('resultado').innerHTML = num1 - num2; } else if (operador == '*') { document.getElementById('resultado').innerHTML = num1 * num2; } else if (operador == '/') { document.getElementById('resultado').innerHTML = num1 / num2; } });</script><p id='resultado'></p></body></html>
