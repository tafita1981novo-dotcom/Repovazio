<html><body><h1>Calculadora</h1><form><input type='number' id='numero1'><input type='operator' id='operador'><input type='number' id='numero2'><button type='submit'>Calcular</button></form><p id='resultado'></p><script>function calcular(){var num1 = document.getElementById('numero1').value, operador = document.getElementById('operador').value, num2 = document.getElementById('numero2').value;switch(operador){case '+':document.getElementById('resultado').innerHTML = parseFloat(num1) + parseFloat(num2);break;case '-':document.getElementById('resultado').innerHTML = parseFloat(num1) - parseFloat(num2);break;case '*':document.getElementById('resultado').innerHTML = parseFloat(num1) * parseFloat(num2);break;case '/':document.getElementById('resultado').innerHTML = parseFloat(num1) / parseFloat(num2);break;}}document.getElementById('form').addEventListener('submit', function(event){event.preventDefault();calcular();});}</script></body></html>
