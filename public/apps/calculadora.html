<html><body><h1>Calculadora</h1><input type='number' id='num1' placeholder='Número 1'><br><input type='number' id='num2' placeholder='Número 2'><br><button onclick='calcular()'>Calcular</button><p id='resultado'></p><script>function calcular(){var num1 = parseInt(document.getElementById('num1').value);var num2 = parseInt(document.getElementById('num2').value);document.getElementById('resultado').innerHTML = num1 + num2;}</script></body></html>
