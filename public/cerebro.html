<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🧠 Cérebro Quântico — psicologia.doc</title>
<style>
:root {
  --bg:#06060F; --violet:#7C3AED; --crimson:#E11D48;
  --gold:#F59E0B; --surface:#0F0F1A; --border:#1E1E3A;
  --text:#E2E8F0; --muted:#64748B;
}
* { box-sizing:border-box; margin:0; padding:0 }
body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif;
       min-height:100vh; padding:20px }
.header { text-align:center; padding:30px 0 20px; border-bottom:1px solid var(--border) }
.psi { font-size:3rem; color:var(--violet) }
h1 { font-size:1.8rem; color:var(--text); margin:10px 0 5px }
.subtitle { color:var(--muted); font-size:.9rem }
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
              gap:15px; margin:25px 0 }
.stat-card { background:var(--surface); border:1px solid var(--border);
             border-radius:12px; padding:20px; text-align:center }
.stat-num { font-size:2.5rem; font-weight:700; color:var(--violet) }
.stat-label { color:var(--muted); font-size:.8rem; margin-top:5px }
.section { margin:20px 0 }
.section h2 { color:var(--gold); font-size:1rem; margin-bottom:12px;
              display:flex; align-items:center; gap:8px }
.cats-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:8px }
.cat-row { background:var(--surface); border:1px solid var(--border); border-radius:8px;
           padding:10px 14px; display:flex; justify-content:space-between; align-items:center }
.cat-name { font-size:.85rem }
.cat-badge { background:var(--violet); color:#fff; border-radius:20px;
             padding:2px 10px; font-size:.75rem; font-weight:600 }
.api-list { display:grid; gap:6px }
.api-row { background:var(--surface); border-left:3px solid var(--violet);
           border-radius:0 8px 8px 0; padding:10px 14px; display:flex;
           justify-content:space-between; align-items:center; flex-wrap:wrap; gap:6px }
.api-name { font-weight:600; font-size:.9rem }
.api-cat { color:var(--muted); font-size:.75rem }
.api-tags { display:flex; gap:4px; flex-wrap:wrap }
.tag { background:var(--border); color:var(--muted); border-radius:4px;
       padding:1px 6px; font-size:.7rem }
.tag.no-auth { background:#134E4A; color:#5EEAD4 }
.tag.core { background:#3B0764; color:#C084FC }
.search-bar { width:100%; background:var(--surface); border:1px solid var(--border);
              color:var(--text); padding:12px 16px; border-radius:10px;
              font-size:1rem; margin-bottom:16px; outline:none }
.search-bar:focus { border-color:var(--violet) }
.filter-bar { display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap }
.filter-btn { background:var(--surface); border:1px solid var(--border); color:var(--muted);
              padding:6px 14px; border-radius:20px; cursor:pointer; font-size:.8rem;
              transition:.2s }
.filter-btn.active { background:var(--violet); border-color:var(--violet); color:#fff }
.loading { text-align:center; color:var(--muted); padding:40px }
.dot { color:var(--gold) }
.copy-btn { background:var(--violet); color:#fff; border:none; border-radius:6px;
            padding:8px 16px; cursor:pointer; font-size:.8rem; margin-top:10px }
.brain-card { background:var(--surface); border:1px solid var(--violet); border-radius:12px;
              padding:20px; font-family:monospace; font-size:.75rem; white-space:pre-wrap;
              color:#94A3B8; max-height:300px; overflow-y:auto; margin-top:10px }
</style>
</head>
<body>
<div class="header">
  <div class="psi">ψ</div>
  <h1>Cérebro Quântico de APIs</h1>
  <div class="subtitle">psicologia.doc · @psidanielacoelho · Sempre crescendo</div>
</div>

<div id="stats-grid" class="stats-grid">
  <div class="stat-card"><div class="stat-num" id="s-total">…</div><div class="stat-label">APIs Mapeadas</div></div>
  <div class="stat-card"><div class="stat-num" id="s-noauth" style="color:#5EEAD4">…</div><div class="stat-label">Sem Auth (CI/CD)</div></div>
  <div class="stat-card"><div class="stat-num" id="s-alta" style="color:#F59E0B">…</div><div class="stat-label">Alta Relevância ★★★</div></div>
  <div class="stat-card"><div class="stat-num" id="s-cats" style="color:#E11D48">…</div><div class="stat-label">Categorias</div></div>
  <div class="stat-card"><div class="stat-num" id="s-fontes" style="color:#06B6D4">…</div><div class="stat-label">Fontes</div></div>
  <div class="stat-card"><div class="stat-num" id="s-tested" style="color:#22C55E">…</div><div class="stat-label">Testadas ✅</div></div>
</div>

<div class="section">
  <h2>📋 Contexto para Novo Chat</h2>
  <button class="copy-btn" onclick="copyCard()">📋 Copiar Cartão do Cérebro</button>
  <div class="brain-card" id="brain-card">Carregando...</div>
</div>

<div class="section">
  <h2>🔍 Buscar APIs</h2>
  <input class="search-bar" id="search" placeholder="buscar: tts, quotes, psychology, pt-br..." oninput="filterApis()">
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all',this)">Todas</button>
    <button class="filter-btn" onclick="setFilter('none',this)">Sem Auth</button>
    <button class="filter-btn" onclick="setFilter('3',this)">Alta Relevância ★★★</button>
    <button class="filter-btn" onclick="setFilter('core',this)">Core Pipeline</button>
  </div>
  <div id="api-list" class="api-list"><div class="loading">Carregando cérebro quântico...</div></div>
</div>

<div class="section">
  <h2>📊 Categorias</h2>
  <div id="cats-grid" class="cats-grid"></div>
</div>

<script>
const SB = "https://tpjvalzwkqwttvmszvie.supabase.co";
const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRwanZhbHp3a3F3dHR2bXN6dmllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTQ5MjE3MDQsImV4cCI6MjAzMDQ5NzcwNH0.A4D9SdJD_bpGwZ2r_OOZRZ4IjLXjGimQ0TaHJkFcWQg";
let allApis = [], activeFilter = "all";

async function load() {
  const r = await fetch(`${SB}/rest/v1/api_brain?select=name,category,subcategory,auth_type,relevance,rate_limit,tags,use_case&order=relevance.desc,name.asc&limit=2000`, 
    {headers:{"apikey":KEY,"Authorization":"Bearer "+KEY}});
  allApis = await r.json();
  
  // Stats
  document.getElementById("s-total").textContent  = allApis.length;
  document.getElementById("s-noauth").textContent = allApis.filter(a=>a.auth_type=="none").length;
  document.getElementById("s-alta").textContent   = allApis.filter(a=>a.relevance==3).length;
  const cats = [...new Set(allApis.map(a=>a.category))];
  document.getElementById("s-cats").textContent   = cats.length;
  const fontes = [...new Set(allApis.map(a=>a.source).filter(Boolean))];
  document.getElementById("s-fontes").textContent = fontes.length;
  
  // Tested (separate query)
  const r2 = await fetch(`${SB}/rest/v1/api_brain?select=working&tested=eq.true&working=eq.true&limit=200`,
    {headers:{"apikey":KEY,"Authorization":"Bearer "+KEY}});
  const t = await r2.json();
  document.getElementById("s-tested").textContent = t.length;
  
  // Categories
  const catCount = {};
  allApis.forEach(a => catCount[a.category] = (catCount[a.category]||0)+1);
  const sortedCats = Object.entries(catCount).sort((a,b)=>b[1]-a[1]);
  document.getElementById("cats-grid").innerHTML = sortedCats.map(([c,n])=>
    `<div class="cat-row"><span class="cat-name">${c}</span><span class="cat-badge">${n}</span></div>`
  ).join("");
  
  // Brain card
  const topCats = sortedCats.slice(0,10).map(([c,n])=>`  ${c.padEnd(30)} ${n} APIs`).join("\n");
  const card = `╔══════════════════════════════════════════════╗
║  🧠 CÉREBRO QUÂNTICO psicologia.doc          ║
╚══════════════════════════════════════════════╝
PROJETO: psicologia.doc (@psidanielacoelho)
SUPABASE: tpjvalzwkqwttvmszvie | GITHUB: tafita81/Repovazio

API BRAIN (banco vivo):
  ✅ ${allApis.length} APIs mapeadas
  ✅ ${allApis.filter(a=>a.auth_type=="none").length} sem autenticação
  ✅ ${allApis.filter(a=>a.relevance==3).length} alta relevância ★★★
  ✅ ${cats.length} categorias | ${fontes.length} fontes

SQL QUERY: SELECT * FROM find_api(\'psychology\', no_auth:=true);
PYTHON:    Brain.search(\'quotes\', no_auth=True)
VIEW:      SELECT * FROM v_apis_psico;

PIPELINE:
  LLM: NVIDIA DeepSeek V4 → Groq Llama 3.3 → OpenAI
  TTS: Chatterbox (Short) | Edge TTS Thalita (Long)
  IMG: Pollinations FLUX sequential (free, unlimited)
  VIDEO: FFmpeg Ken Burns | Remotion React

TOP CATEGORIAS:
${topCats}

CANAL ATIVO: UCyCkIpsVgME9yCj_oXJFheA
⛔ NUNCA: UCSH63tBfY6wEIdkC4u4zKdg (bloqueado 2026-05-07)
═════════════════════════════════════════════`;
  document.getElementById("brain-card").textContent = card;
  
  renderApis(allApis);
}

function renderApis(apis) {
  const list = document.getElementById("api-list");
  if(!apis.length){list.innerHTML="<div class=loading>Nenhuma API encontrada</div>";return;}
  list.innerHTML = apis.slice(0,200).map(a => {
    const tags = (a.tags||[]).map(t => 
      t=="no-auth"?`<span class="tag no-auth">sem auth</span>`:
      t=="core"?`<span class="tag core">CORE</span>`:
      `<span class="tag">${t}</span>`
    ).join("");
    return `<div class="api-row">
      <div>
        <div class="api-name">${a.name}</div>
        <div class="api-cat">${a.category}${a.subcategory?" · "+a.subcategory:""}</div>
        ${a.use_case?`<div style="color:#94A3B8;font-size:.75rem;margin-top:2px">${a.use_case}</div>`:""}
      </div>
      <div class="api-tags">${tags}${a.relevance==3?"<span class='tag core'>★★★</span>":""}</div>
    </div>`;
  }).join("") + (apis.length>200?`<div class="loading">+ ${apis.length-200} mais...</div>`:"");
}

function filterApis() {
  const q = document.getElementById("search").value.toLowerCase();
  let filtered = allApis;
  if(activeFilter=="none") filtered = filtered.filter(a=>a.auth_type=="none");
  if(activeFilter=="3") filtered = filtered.filter(a=>a.relevance==3);
  if(activeFilter=="core") filtered = filtered.filter(a=>(a.tags||[]).includes("core"));
  if(q) filtered = filtered.filter(a=>
    a.name.toLowerCase().includes(q)||
    a.category.toLowerCase().includes(q)||
    (a.subcategory||"").toLowerCase().includes(q)||
    (a.use_case||"").toLowerCase().includes(q)||
    (a.tags||[]).some(t=>t.includes(q))
  );
  renderApis(filtered);
}

function setFilter(f,btn) {
  activeFilter = f;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  filterApis();
}

function copyCard() {
  const card = document.getElementById("brain-card").textContent;
  navigator.clipboard.writeText(card).then(()=>{
    const btn = document.querySelector(".copy-btn");
    btn.textContent = "✅ Copiado!";
    setTimeout(()=>btn.textContent="📋 Copiar Cartão do Cérebro",2000);
  });
}

load();
</script>
</body></html>
